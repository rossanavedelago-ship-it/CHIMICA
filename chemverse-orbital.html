<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chemverse — Tavola Periodica</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Rajdhani',sans-serif;font-weight:500;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;background:#0a0a0a;border-bottom:1px solid #222;flex-shrink:0}
#back-btn{background:#1a1a2e;border:1px solid #444;color:#0ff;padding:3px 10px;font-size:11px;cursor:pointer;border-radius:3px;font-family:'Chakra Petch',sans-serif;letter-spacing:0.04em}
#back-btn:hover{background:#222}
#pt-title{color:#ddd;font-size:13px;letter-spacing:0.18em;font-weight:700;font-family:'Chakra Petch',sans-serif}
#synth-label{font-size:10px;color:#555;letter-spacing:0.1em}
#periodic-section{flex-shrink:0;padding:4px 6px 2px;background:#050505}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:1px;max-width:100%}
.el{font-size:9px;padding:3px 2px;border:1px solid #333;cursor:pointer;text-align:center;line-height:1.25;border-radius:1px;transition:filter 0.15s;user-select:none;min-width:0;display:flex;align-items:baseline;justify-content:center;gap:2px}
.el:hover{filter:brightness(1.5);border-color:#0ff}
.el.active{border:1px solid #0ff;box-shadow:0 0 4px #0ff}
.el.cat-highlight{border:2px solid #fff;box-shadow:0 0 7px rgba(255,255,255,0.85);position:relative;z-index:2}
@keyframes bondBlink {
  0%, 100% { outline-color:#facc15; box-shadow:0 0 6px 1px rgba(250,204,21,0.85); }
  50% { outline-color:transparent; box-shadow:none; }
}
.el.bond-compatible{outline:3px solid #facc15;outline-offset:-3px;box-shadow:0 0 6px 1px rgba(250,204,21,0.85);position:relative;z-index:1;animation:bondBlink 0.35s ease-in-out 2}
.el .sym{font-size:10.5px;font-weight:bold;font-family:'Chakra Petch',sans-serif}
.el .num{font-size:7px;color:rgba(255,255,255,0.6);font-family:'Rajdhani',sans-serif}
.spacer{background:transparent;border:none;cursor:default}
.cat-alkali{background:#4a1010;color:#ff8888}
.cat-alkaline{background:#3a2a05;color:#ffcc66}
.cat-transition{background:#1a2a1a;color:#88cc88}
.cat-post{background:#1a1a3a;color:#8888ff}
.cat-metalloid{background:#2a1a2a;color:#cc88cc}
.cat-nonmetal{background:#0a2a1a;color:#44ffaa}
.cat-halogen{background:#1a2a2a;color:#44dddd}
.cat-noble{background:#2a1a3a;color:#aa88ff}
.cat-lanthanide{background:#2a0a2a;color:#dd88ff}
.cat-actinide{background:#2a1a0a;color:#ffaa44}
.cat-unknown{background:#1a1a1a;color:#888}
#legend{display:flex;gap:12px;padding:4px 6px;background:#050505;border-top:1px solid #111;font-size:11px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:1px 4px;border-radius:3px;transition:background 0.15s}
.leg-item:hover{background:#141414}
.leg-item.leg-active{background:#1a1a1a}
.leg-item.leg-active .leg-dot{box-shadow:0 0 5px 1px #fff}
.leg-item.leg-active span{font-weight:700}
.leg-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,0.3)}
#main{display:flex;flex:1;min-height:0;overflow:hidden;position:relative}
#sidebar{width:185px;flex-shrink:0;background:#080808;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;overflow-y:auto;padding:8px}
#ab-tabs{display:none;gap:4px;margin-bottom:8px}
.ab-tab{flex:1;padding:5px 2px;font-size:10px;border:1px solid #333;background:#111;color:#888;cursor:pointer;border-radius:2px;font-family:'Chakra Petch',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.ab-tab.active{background:#0a3a3a;color:#0ff;border-color:#0ff}
#atom-info{background:#111;border:1px solid #222;border-radius:3px;padding:8px;margin-bottom:8px}
#atom-info-header{display:flex;align-items:center;gap:4px;font-size:9px;color:#555;margin-bottom:6px;letter-spacing:0.1em;font-family:'Chakra Petch',sans-serif}
#atom-symbol-big{font-size:32px;font-weight:700;color:#fff;line-height:1;font-family:'Chakra Petch',sans-serif;letter-spacing:0.01em}
#atom-name{font-size:13px;color:#aaa}
#atom-config{font-size:10px;color:#777;margin-top:6px;line-height:1.6;display:flex;flex-wrap:wrap;gap:3px 9px;font-family:'Rajdhani',sans-serif;font-weight:600}
.cfg-term{white-space:nowrap}
#orbitals-label{font-size:9px;color:#555;letter-spacing:0.1em;margin-bottom:6px;font-family:'Chakra Petch',sans-serif}
#orbital-filter{display:flex;gap:4px;margin-bottom:8px}
.filter-btn{flex:1;padding:4px 2px;font-size:10px;border:1px solid #333;background:#111;color:#888;cursor:pointer;border-radius:2px;font-family:'Chakra Petch',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.filter-btn.active{background:#0a3a3a;color:#0ff;border-color:#0ff}
#orbital-list{display:flex;flex-direction:column;gap:2px}
.orb-row{display:flex;align-items:center;gap:6px;padding:4px 4px;border-radius:2px}
.orb-row:hover{background:#111}
.orb-check{width:14px;height:14px;accent-color:#0ff;cursor:pointer;flex-shrink:0}
.orb-color{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.orb-name{font-size:14px;color:#f2f2f2;font-weight:600;flex:1}
.orb-electrons{font-size:13px;color:#b8b8b8;font-weight:600;margin-left:auto}
.orb-sub{padding-left:18px}
.orb-sub .orb-name{font-size:13px;color:#d5d5d5;font-weight:500}
#canvas-area{flex:1;min-width:0;min-height:0;position:relative;background:#000;overflow:hidden}
#viewers-wrapper{display:flex;width:100%;height:100%;min-width:0;min-height:0}
.viewer-pane{position:relative;flex:1;min-width:0;min-height:0;height:100%;overflow:hidden}
#pane-a{border-right:none}
#pane-b{border-left:none}
.viewer-pane canvas{display:block}
#split-divider{flex:0 0 6px;width:6px;height:100%;background:#0a0a0a;border-left:1px solid #1a1a2e;border-right:1px solid #1a1a2e;cursor:col-resize;display:none;position:relative;z-index:6}
#split-divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:34px;background:#0ff;border-radius:2px;opacity:0.5;transition:opacity 0.15s}
#split-divider:hover::after,#split-divider.dragging::after{opacity:1}
#split-divider.dragging{background:#111}
.pane-label{position:absolute;top:10px;left:10px;font-family:'Chakra Petch',sans-serif;font-size:11px;letter-spacing:0.1em;color:#0ff;background:rgba(0,0,0,0.6);border:1px solid #0ff;border-radius:3px;padding:3px 10px;cursor:pointer;z-index:5;transition:all 0.15s}
.pane-label:hover{background:rgba(0,255,255,0.15)}
.pane-label.pane-label-active{background:#0ff;color:#000;font-weight:700}
#rotate-toggle-btn.rotation-stopped{color:#ffaa44;border-color:#ffaa44}
#rotate-toggle-btn.rotation-stopped:hover{background:rgba(255,170,68,0.15)}
canvas{display:block}
#view-toggle{position:absolute;top:10px;right:10px;display:flex;gap:0;z-index:10}
.view-btn{padding:5px 14px;font-size:11px;border:1px solid #0ff;background:transparent;color:#0ff;cursor:pointer;font-family:'Chakra Petch',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.view-btn[data-view-mode="bohr"]{border-radius:20px 0 0 20px}
.view-btn[data-view-mode="cloud"]{border-radius:0 20px 20px 0}
.view-btn.active{background:#0ff;color:#000}
#legame-btn{border-color:#ffd700;color:#ffd700}
#legame-btn.active{background:#ffd700;color:#3a2a00}
#cloud-controls{position:absolute;top:40px;right:10px;background:#111;border:1px solid #333;border-radius:4px;padding:10px;width:160px;display:none;z-index:10}
#bg-swatches{position:absolute;bottom:10px;right:10px;background:#111;border:1px solid #333;border-radius:6px;padding:9px;width:160px;display:none;z-index:10;flex-wrap:wrap;gap:7px}
#bg-swatches.show{display:flex}
#bg-swatches-label{width:100%;font-size:9px;color:#888;letter-spacing:0.08em;margin-bottom:2px;font-family:'Chakra Petch',sans-serif}
.bg-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform 0.1s,border-color 0.1s;flex-shrink:0}
.bg-swatch:hover{transform:scale(1.15)}
.bg-swatch.bg-swatch-selected{border-color:#0ff;box-shadow:0 0 5px #0ff}
#cloud-controls.show{display:block}
.ctrl-label{font-size:10px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.ctrl-slider{width:100%;accent-color:#0ff;margin-bottom:10px}
#loading-msg{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid #333;border-radius:20px;padding:8px 20px;font-size:11px;color:#888;pointer-events:none;opacity:0;transition:opacity 0.3s}
#loading-msg.show{opacity:1}
/* ── FLAT STYLE THEME ─────────────────────────────────────────────────────
   Same layout/logic, just re-skinned: a single solid background (chosen from
   a small swatch palette) instead of black, and bold, borderless, saturated
   periodic-table cells instead of the muted realistic palette. */
:root{
  --flat-bg:#0e6b78;
  --flat-panel:#0a505a;
  --flat-border:#12808f;
  --flat-text:#ffffff;
  --flat-text-dim:#dffcff;
}
body.theme-flat{background:var(--flat-bg);color:var(--flat-text)}
body.theme-flat #topbar{background:var(--flat-panel);border-bottom:1px solid var(--flat-border)}
body.theme-flat #periodic-section{background:var(--flat-bg)}
body.theme-flat #legend{background:var(--flat-bg);border-top:1px solid var(--flat-border)}
body.theme-flat #sidebar{background:var(--flat-panel);border-right:1px solid var(--flat-border)}
body.theme-flat #canvas-area{background:var(--flat-bg)}
body.theme-flat #atom-info{background:var(--flat-panel);border:1px solid var(--flat-border)}
body.theme-flat #pt-title,body.theme-flat #synth-label{color:var(--flat-text-dim)}
body.theme-flat #atom-name,body.theme-flat #atom-config,body.theme-flat .orb-name,body.theme-flat .orb-electrons,body.theme-flat #orbitals-label,body.theme-flat .cfg-term{color:var(--flat-text)}
body.theme-flat .orb-electrons{color:var(--flat-text-dim)}

body.theme-flat .el{border:none;border-radius:6px}
body.theme-flat .el:hover{filter:brightness(1.15);border-color:transparent;box-shadow:0 0 0 2px var(--flat-text)}
body.theme-flat .el.active{border:none;box-shadow:0 0 0 2px var(--flat-text),0 0 10px var(--flat-text)}
body.theme-flat .el.cat-highlight{border:none;box-shadow:0 0 0 2px var(--flat-text),0 0 10px var(--flat-text)}
body.theme-flat .el .num{color:rgba(255,255,255,0.85)}

body.theme-flat .cat-alkali{background:#ff5b5b;color:#fff}
body.theme-flat .cat-alkaline{background:#ffb020;color:#fff}
body.theme-flat .cat-transition{background:#34d399;color:#0a3a2a}
body.theme-flat .cat-post{background:#6c8cff;color:#fff}
body.theme-flat .cat-metalloid{background:#d16bd1;color:#fff}
body.theme-flat .cat-nonmetal{background:#22e0a0;color:#0a3a2a}
body.theme-flat .cat-halogen{background:#22d3ee;color:#08414a}
body.theme-flat .cat-noble{background:#a78bfa;color:#fff}
body.theme-flat .cat-lanthanide{background:#f472b6;color:#fff}
body.theme-flat .cat-actinide{background:#fb923c;color:#fff}
body.theme-flat .cat-unknown{background:#c3ccd4;color:#333}

body.theme-flat .leg-item:hover{background:rgba(128,128,128,0.15)}
body.theme-flat .leg-item.leg-active{background:rgba(128,128,128,0.25)}
body.theme-flat #view-toggle .view-btn{border-color:var(--flat-text);color:var(--flat-text)}
body.theme-flat #view-toggle .view-btn.active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #compare-btn.active,body.theme-flat #style-btn.active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #cloud-controls{background:var(--flat-panel);border-color:var(--flat-border)}
body.theme-flat #split-divider{background:var(--flat-panel);border-left-color:var(--flat-border);border-right-color:var(--flat-border)}
body.theme-flat .pane-label{border-color:var(--flat-text);color:var(--flat-text)}
body.theme-flat .pane-label.pane-label-active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #rotate-toggle-btn.rotation-stopped{color:#ffaa44;border-color:#ffaa44}
body.theme-flat #bg-swatches{background:var(--flat-panel);border-color:var(--flat-border)}
body.theme-flat #ctrl-label,body.theme-flat .ctrl-label{color:var(--flat-text-dim)}
</style>
</head>
<body>

<div id="topbar">
  <button id="back-btn">← ChemVerse</button>
  <span id="pt-title">T A V O L A &nbsp; P E R I O D I C A</span>
  <span id="synth-label">• sintetico</span>
</div>

<div id="periodic-section">
  <div class="pt-grid" id="pt-grid"></div>
  <div style="height:4px"></div>
  <div class="pt-grid" id="pt-grid-lana" style="grid-template-columns:repeat(15,1fr);max-width:calc(15 * (100%/18));margin-left:calc(3 * (100%/18))"></div>
</div>

<div id="legend">
  <div class="leg-item" data-cat="alkali"><div class="leg-dot" style="background:#ff8888"></div><span style="color:#ff8888">Alcalini</span></div>
  <div class="leg-item" data-cat="alkaline"><div class="leg-dot" style="background:#ffcc66"></div><span style="color:#ffcc66">Alcalino-terrosi</span></div>
  <div class="leg-item" data-cat="transition"><div class="leg-dot" style="background:#88cc88"></div><span style="color:#88cc88">Metalli di transizione</span></div>
  <div class="leg-item" data-cat="post"><div class="leg-dot" style="background:#8888ff"></div><span style="color:#8888ff">Post-transizione</span></div>
  <div class="leg-item" data-cat="metalloid"><div class="leg-dot" style="background:#cc88cc"></div><span style="color:#cc88cc">Metalloidi</span></div>
  <div class="leg-item" data-cat="nonmetal"><div class="leg-dot" style="background:#44ffaa"></div><span style="color:#44ffaa">Non metalli</span></div>
  <div class="leg-item" data-cat="halogen"><div class="leg-dot" style="background:#44dddd"></div><span style="color:#44dddd">Alogeni</span></div>
  <div class="leg-item" data-cat="noble"><div class="leg-dot" style="background:#aa88ff"></div><span style="color:#aa88ff">Gas nobili</span></div>
  <div class="leg-item" data-cat="lanthanide"><div class="leg-dot" style="background:#dd88ff"></div><span style="color:#dd88ff">Lantanidi</span></div>
  <div class="leg-item" data-cat="actinide"><div class="leg-dot" style="background:#ffaa44"></div><span style="color:#ffaa44">Attinidi</span></div>
  <div class="leg-item" data-cat="unknown"><div class="leg-dot" style="background:#888"></div><span style="color:#888">Proprietà ignote</span></div>
</div>

<div id="main">
  <div id="sidebar">
    <div id="ab-tabs">
      <button class="ab-tab active" id="tab-a" onclick="switchActiveViewer('A')">Atomo A</button>
      <button class="ab-tab" id="tab-b" onclick="switchActiveViewer('B')">Atomo B</button>
    </div>
    <div id="atom-info">
      <div id="atom-info-header">⊙ L'ATOMO</div>
      <div id="atom-symbol-big">H</div>
      <div id="atom-name">Idrogeno <span style="font-size:10px;color:#555">Z=1</span></div>
      <div id="atom-config">1s¹</div>
    </div>
    <div id="orbitals-label">ORBITALI</div>
    <div id="orbital-filter">
      <button class="filter-btn active" onclick="setPreset('all', this)">Tutti</button>
      <button class="filter-btn" onclick="setPreset('valence', this)">Valenza</button>
      <button class="filter-btn" onclick="setPreset('none', this)">Nessuno</button>
    </div>
    <div id="orbital-list"></div>
  </div>

  <div id="canvas-area">
    <div id="viewers-wrapper">
      <div id="pane-a" class="viewer-pane"><canvas id="c"></canvas><div class="pane-label pane-label-active" id="pane-label-a" style="display:none" onclick="switchActiveViewer('A')">A</div></div>
      <div id="split-divider"></div>
      <div id="pane-b" class="viewer-pane" style="display:none"><canvas id="c2"></canvas><div class="pane-label" id="pane-label-b" onclick="switchActiveViewer('B')">B</div></div>
      <div class="pane-label" id="rotate-toggle-btn" style="top:44px" onclick="toggleRotation()">Stop</div>
    </div>
    <div id="view-toggle">
      <button class="view-btn" data-view-mode="bohr" onclick="setView('bohr')">Bohr</button>
      <button class="view-btn active" data-view-mode="lines" onclick="setView('lines')">Linee</button>
      <button class="view-btn" data-view-mode="cloud" onclick="setView('cloud')">Nuvola</button>
      <button class="view-btn" id="compare-btn" onclick="toggleCompare()" style="margin-left:8px;border-radius:20px">⇄ Confronta</button>
      <button class="view-btn" id="legame-btn" onclick="toggleBond()" style="margin-left:8px;border-radius:20px;display:none">⚛ Legame</button>
      <button class="view-btn" id="style-btn" onclick="toggleStyle()" style="margin-left:8px;border-radius:20px">🎨 FLAT</button>
    </div>
    <div id="cloud-controls">
      <div class="ctrl-label"><span>Grandezza punti</span><span id="size-val">0.3</span></div>
      <input type="range" class="ctrl-slider" id="size-slider" min="0.1" max="2" step="0.1" value="0.3">
      <div class="ctrl-label"><span>Intensità</span><span id="int-val">2.90</span></div>
      <input type="range" class="ctrl-slider" id="int-slider" min="0.5" max="9" step="0.1" value="2.9">
    </div>
    <div id="bg-swatches">
      <div id="bg-swatches-label">SFONDO</div>
    </div>
    <div id="loading-msg">Caricamento orbitali...</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="chemverse-engine.js"></script>
<script>
// ── ELEMENT DATA ──────────────────────────────────────────────────────────────

// Electron configurations


// Groups a per-orbital electron config into per-shell (principal quantum
// number n) totals — e.g. {1s:2,2s:2,2p:4} → {1:2, 2:6} — used by the
// classic Bohr-model view, which shows shells rather than sublevels.

// A "part key" is an orbital string ("3p") or orbital sub-level ("3p|x",
// "4d|xy") — this extracts its shell (principal quantum number). The
// 'bohr:' prefix check is legacy/defensive: Bohr view now uses these same
// keys, but nothing generates the old shell-only format anymore.

// ── SIMPLIFIED OCTET-RULE BONDING (for the "Legame" feature) ────────────────
// This is a deliberately simplified, pedagogical model — not a full
// valence-bond-theory engine — meant to give a reasonable yes/no answer for
// whether two atoms' outer shells can complete each other's octet (or duet,
// for shell 1). It covers the two most common textbook cases:
//   - covalent: both atoms need to GAIN the same number of electrons, so
//     that many shared pairs satisfy both at once (e.g. H+H, O+O, H+Cl).
//   - ionic: one atom needs to LOSE exactly what the other needs to GAIN
//     (e.g. Na+Cl), assuming (as is true for main-group elements) that the
//     shell below is already complete once the outer shell is emptied.
// Noble gases (already at capacity) never bond. This is intentionally scoped
// to exactly two atoms for now.


// Outlines every periodic-table cell whose element would actually satisfy
// the octet rule together with refCfg (same check used to decide whether
// Legame fuses the two outer shells) — only meaningful while Legame is
// active. Pass null to just clear it.

// ── PERIODIC TABLE LAYOUT ─────────────────────────────────────────────────────

// ── REUSABLE: PERIODIC TABLE BUILDER ─────────────────────────────────────────
// Renders the full periodic table (main grid + lanthanide/actinide row) into
// the given container elements, using the shared ELEMENTS data and catClass
// map above. Takes no dependency on this page's specific viewers/sidebar:
// `onSelect(atomicNumber)` is called whenever the person clicks an element,
// so any host page can wire it up to whatever it wants to do with that pick.
// This makes it a drop-in piece other projects can lift out as-is, together
// with ELEMENTS/catClass and the .el/.cat-*/.pt-grid CSS rules above.

buildPeriodicTable(
  document.getElementById('pt-grid'),
  document.getElementById('pt-grid-lana'),
  (n)=>{
    activeViewer.selectElement(n);
    if(bondMode){
      buildBondLayer();
      updateCompatibleHighlight(activeViewer.currentCfg);
    }
  }
);

// Renderer/camera/mouse-controls/resize are created per-viewer inside
// createViewer() further below, so that two independent atoms (A and B) can
// be shown side by side when compare mode is active.


// Orbital colors

// p sub-orbital colors (x,y,z)

// d sub-orbital definitions, labels and colors

// Current display mode ('lines' or 'cloud') — shared by both viewers.
let viewMode='lines';

// Global point-cloud density multiplier (controlled by the "Intensità" slider).
// 1.0 = the baseline density the shapes were originally tuned for.
let cloudDensity=1.0;


// Radial profile of a lobe: rounded off at BOTH the near end (t=0, close to the
// nucleus) and the far end (t=1) — no sharp cusp/point at either end — while the
// bulge is still biased toward the outer part of the lobe, so it "widens
// progressively" moving away from the nucleus rather than being a symmetric blob.

// Teardrop-shaped wire lobe, detached from the nucleus, widening progressively.

// Electron dot on orbit

// Line/wire opacity is boosted for the Flat style, so shapes read as bold and
// solid-feeling rather than delicate technical wireframes.

// Current cloud dot size/opacity, read straight from the sliders (falling
// back to their default position if not yet in the DOM). Used both to build
// brand-new cloud points AND to live-update existing ones — a single source
// of truth, so no rebuild path can ever reset points back to a stale default.
function currentCloudSize(){
  const el=document.getElementById('size-slider');
  const sz=el?parseFloat(el.value):0.3;
  return sz*(visualStyle==='flat'?0.2:0.13); // calibrated so the slider's default (0.3) gives a reasonably small starting dot size
}
function currentCloudOpacity(){
  const el=document.getElementById('int-slider');
  const intens=el?parseFloat(el.value):2.9;
  return Math.min(1, intens*0.16);
}

// Cloud points for a spherical shell (s orbitals / fallback) — denser near the
// inner edge of the shell band, fading out toward the outer edge.

// Teardrop-shaped point cloud — constant point density per slice ALONG the axis,
// so the wide part of the drop (bigger cross-section) naturally looks sparser.

// Cloud points scattered in a torus (dz² equatorial ring)




// The real chemistry electron-filling order (Aufbau). This is the single
// source of truth for "how far out" an orbital sits, used both here (for
// Linee/Nuvola radii) and later for the Bohr view's ring slots — so within
// a shell, p is always drawn bigger than the s before it, 3d bigger than
// the 4s that fills before it, etc., matching the real configuration order
// rather than just shell number.

// Orbital radii for Linee/Nuvola, increasing monotonically along AUFBAU_ORDER.
// Orbital radii for Linee/Nuvola now live in chemverse-engine.js.


// In cloud mode, a fixed point count spread over an ever-larger spherical
// shell (as the shell radius grows for outer orbitals) looks progressively
// sparser and less defined — surface area grows with r², point count didn't.
// In Flat style specifically (where the shapes are meant to read as bold and
// clear) we compensate by scaling the point count with r², using the
// innermost s-shell (1s) as the "already well-defined" reference density —
// and slightly beyond r² so bigger shells end up looking at least as crisp.



// Builds one classic-Bohr-model shell: a flat circular ring (lying in the
// XY-plane, like Saturn's rings) plus its electrons evenly spaced around it,
// orbiting in that same plane.

// Ring radius is based on each orbital's position in the real chemistry
// filling order (Aufbau), NOT on shell number + type. This matters because
// shell number alone doesn't reflect energy order: 3d sits AFTER 4s, 4d
// sits AFTER 5s, 4f sits AFTER 6s but BEFORE 5d, etc. A shell-based radius
// (like the old model) inevitably makes some higher-shell orbital collide
// with a lower-shell one that's actually drawn further out. Giving every
// orbital in this sequence its own well-separated "slot" guarantees no two
// orbitals ever overlap, matching how electron shells actually fill.
// BOHR_SLOT_INDEX population now lives in chemverse-engine.js.

// Radius for one Bohr-view ring, given a part key ("3s", "3p|x", "4d|xy"...).

// Bohr-view rendering for one orbital/sub-level key: always a plain flat
// ring (never the lobed p/d shapes used in Linee/Nuvola) — all sub-levels of
// the SAME orbital share that orbital's one color, so "3p_x/y/z" all render
// in the same hue rather than three different ones.

// ── "LEGAME" BOND SCENE ──────────────────────────────────────────────────────
// A standalone, self-contained scene (independent from the per-viewer atom
// layer system above) that draws two atoms side by side, close together, in
// the classic Bohr style — and, if their outer shells satisfy the octet rule
// together, replaces their outer rings with one shared ring encircling both.
// bondElectrons/bondLayerGroup/bondAnim now live in chemverse-engine.js.

// Builds a nucleus instantly (no fly-in animation — this is a quick derived
// view, not a fresh atom "formation" moment).

// One individual (non-fused) shell ring, local to a single atom's sub-group.

// All the orbital/sub-level part keys for a given electron config — the same
// set the sidebar list would show (main s/f orbitals, plus individual p/d
// sub-levels). Used by the bond scene so it preserves the exact same detail
// level as the main Bohr view.

// A point on the fused ring's smooth elliptical outline. The ellipse is
// sized so its horizontal extent reaches just past each atom's own leftover
// content (capA on the left, capB on the right) — its center therefore
// isn't necessarily at the midpoint between the two nuclei if the atoms are
// different sizes, and its vertical extent clears whichever atom is taller.
// t goes from 0 to 1 around the whole closed loop.

// The radius of the largest orbital an atom keeps individually visible once
// bonded (i.e. everything except the outer shell, which fades into the
// fused ring) — used to size the fused ellipse so it clears each atom's own
// remaining shells without engulfing the OTHER atom's much smaller (or
// larger) leftover shells too.

// The shared elliptical ring that encircles both nuclei (and whatever inner
// shells they kept) once bonded — one smooth oval, sized to comfortably
// contain each atom's own actual size on its own side.

// Rebuilds the whole bond scene from scratch inside viewerA's atomGroup,
// using whatever elements are currently selected in A and B. Sets up an
// animated approach (see bondAnim / updateBondAnimation): the atoms always
// start apart and glide together, settling at the same "just adjacent, never
// overlapping" distance whether they end up bonding or not. If bonding is
// possible, once they arrive the outer orbital(s) — sub-levels included —
// cross-fade into a single shared belt that hugs each atom's own remaining
// shells individually; inner orbitals always keep their full sub-level
// detail. The whole scene is then uniformly scaled down if needed so it
// comfortably fits the view regardless of atom size.

// Advances the approach + (if bonding) crossfade animation. Called every
// frame from animateAll() while a bond scene exists and is still animating.

// cfg is the config object of the atom this layer belongs to (electron counts
// per orbital) — passed explicitly rather than read off a global, since two
// independent atoms (A/B) may be on screen at once.

// Update cloud point sizes/opacity across every viewer (cheap — live on 'input')
function updateCloudParams(){
  const sz=parseFloat(document.getElementById('size-slider').value);
  const intens=parseFloat(document.getElementById('int-slider').value);
  document.getElementById('size-val').textContent=sz.toFixed(1);
  document.getElementById('int-val').textContent=intens.toFixed(2);
  const size=currentCloudSize(), opacity=currentCloudOpacity();
  for(let v of [viewerA, viewerB]){
    if(!v) continue;
    for(let layer of v.layers){
      for(let o of layer.orbitalObjects){
        o.traverse(c=>{
          if(c.isPoints){
            c.material.size=size;
            c.material.opacity=opacity;
          }
        });
      }
    }
  }
}

// Actually regenerate the point clouds with more/fewer points (real density,
// not just opacity). Expensive-ish, so only triggered when the slider drag ends,
// and only meaningful in cloud view mode.
function regenerateCloudDensity(){
  if(viewMode!=='cloud') return;
  const intens=parseFloat(document.getElementById('int-slider').value);
  cloudDensity=0.75+(intens/9)*0.55; // gentle density range — enough to feel "fuller" at high intensity without reading as a size change
  for(let v of [viewerA, viewerB]){
    if(!v || !v.currentLayer) continue;
    const layer=v.currentLayer;
    const keys=Object.keys(layer.rendered);
    if(keys.length===0) continue;
    for(let k of keys) removePart(layer,k);
    for(let k of keys) addPart(layer,k,'cloud',v.currentCfg);
  }
  updateCloudParams(); // the newly-rebuilt points start at their default size — reapply the person's actual size/opacity settings
}

document.getElementById('size-slider').addEventListener('input', updateCloudParams);
document.getElementById('int-slider').addEventListener('input', updateCloudParams);
document.getElementById('int-slider').addEventListener('change', regenerateCloudDensity);

// ── VIEWER FACTORY ───────────────────────────────────────────────────────────
// Everything needed to display ONE independent atom: its own renderer, scene,
// camera, mouse-drag rotation, atom layers, and the currently-selected element.
// Two of these (viewerA / viewerB) can exist at once for side-by-side compare.

// Approximate neutron count for a schematic nucleus (illustrative, not an isotope table):
// the neutron/proton ratio grows roughly from 1.0 (light elements) to ~1.6 (heavy elements).

// ── ORBITAL CHECKBOX LIST (reflects/controls the current ACTIVE viewer) ─────
function updateOrbitalList(cfg, renderedKeys){
  const list=document.getElementById('orbital-list');
  list.innerHTML='';

  const orbKeys=Object.keys(cfg).filter(o=>cfg[o]>0);
  const maxE={s:2,p:6,d:10,f:14};

  for(let orb of orbKeys){
    const count=cfg[orb];
    const color=ORB_COLORS[orb]||0xffffff;
    const hexColor='#'+color.toString(16).padStart(6,'0');
    const t=orb[1];
    const mainChecked=renderedKeys ? renderedKeys.has(orb) : true;

    const row=document.createElement('div');
    row.className='orb-row';
    row.innerHTML=`
      <input type="checkbox" class="orb-check" ${mainChecked?'checked':''} data-orb="${orb}">
      <div class="orb-color" style="background:${hexColor}"></div>
      <span class="orb-name">${orb}</span>
      <span class="orb-electrons">${count}/${maxE[t]} e⁻</span>
    `;
    list.appendChild(row);
    const mainCb=row.querySelector('.orb-check');
    mainCb.addEventListener('change', function(){
      // toggling the main level cascades the same value to all its sub-levels
      document.querySelectorAll(`.orb-sub-check[data-orb="${orb}"]`).forEach(sc=>{ sc.checked=this.checked; });
      activeViewer.rebuildCurrentLayer(false);
    });

    let subs=null, subColors=null, subLabel=k=>k;
    if(t==='p'){ subs=P_SUBS; subColors=SUB_COLORS; }
    else if(t==='d'){ subs=D_SUB_DEFS.map(d=>d.key); subColors=D_SUB_COLORS; subLabel=k=>D_SUB_LABELS[k]; }

    if(subs && count>0){
      const nShow=Math.min(subs.length, Math.ceil(count/2));
      for(let i=0;i<nShow;i++){
        const key=subs[i];
        const subChecked=renderedKeys ? renderedKeys.has(orb+'|'+key) : true;
        const sub=document.createElement('div');
        sub.className='orb-row orb-sub';
        const sc=subColors[key];
        const shex='#'+sc.toString(16).padStart(6,'0');
        sub.innerHTML=`
          <input type="checkbox" class="orb-check orb-sub-check" ${subChecked?'checked':''} data-orb="${orb}" data-sub="${key}">
          <div class="orb-color" style="background:${shex};width:7px;height:7px"></div>
          <span class="orb-name">${orb}_${subLabel(key)}</span>
        `;
        list.appendChild(sub);
        sub.querySelector('.orb-check').addEventListener('change', ()=>activeViewer.rebuildCurrentLayer(false));
      }
    }
  }
}

// Read checkbox state from the DOM → { orb: {checked, subs:Set|null} }
function getVisibility(){
  const map={};
  document.querySelectorAll('#orbital-list .orb-check').forEach(cb=>{
    const orb=cb.dataset.orb;
    const sub=cb.dataset.sub;
    if(!map[orb]) map[orb]={checked:false, subs:null};
    if(sub){
      if(!map[orb].subs) map[orb].subs=new Set();
      if(cb.checked) map[orb].subs.add(sub);
    } else {
      map[orb].checked=cb.checked;
    }
  });
  return map;
}

// Desired set of part-keys ("3s", "3p|x", "4d|xy", ...). For p/d orbitals each
// sub-level checkbox is authoritative on its own: a child is shown whenever ITS
// checkbox is checked, independently of the parent's state. The parent checkbox
// is only a convenience that cascades its value down to its children on click.
function desiredParts(vis){
  const parts=new Set();
  for(let orb of Object.keys(vis)){
    const v=vis[orb];
    if(v.subs){
      for(let s of v.subs) parts.add(orb+'|'+s);
    } else if(v.checked){
      parts.add(orb);
    }
  }
  return parts;
}

function renderedKeysOf(viewer){
  return new Set(viewer.currentLayer ? Object.keys(viewer.currentLayer.rendered) : []);
}

// Reflects a viewer's current element/config into the shared sidebar header
// and highlights it on the periodic table.
function refreshSidebarInfo(viewer){
  const el=viewer.currentElement;
  if(!el) return;
  document.getElementById('atom-symbol-big').textContent=el.sym;
  document.getElementById('atom-name').innerHTML=`${el.name} <span style="font-size:10px;color:#555">Z=${el.n}</span>`;
  document.getElementById('atom-config').innerHTML=configStr(viewer.currentCfg).split(' ').map(term=>`<span class="cfg-term">${term}</span>`).join('');
  document.querySelectorAll('.el.active').forEach(e=>e.classList.remove('active'));
  const elDiv=document.querySelector(`.el[data-n="${el.n}"]`);
  if(elDiv) elDiv.classList.add('active');
}

// Re-renders every viewer's currently-visible parts in the new style. Uses
// each viewer's own `rendered` keys as the source of truth (not the DOM), so
// this works correctly for the inactive viewer too, whose checkboxes aren't
// on screen. Bohr, Lines and Cloud all share the exact same orbital/sub-level
// key format (only the geometry addPart builds for a key differs), so no
// key translation is needed when switching between them.
function setView(mode){
  viewMode=mode;
  if(mode==='bohr'){
    autoRotate=false;
    const rotBtn=document.getElementById('rotate-toggle-btn');
    rotBtn.textContent='Gira';
    rotBtn.classList.add('rotation-stopped');
    for(let v of [viewerA, viewerB]){
      if(v){ v.rotX=0; v.rotY=0; }
    }
  }
  document.querySelectorAll('.view-btn').forEach(b=>{
    if(b.id==='compare-btn'||b.id==='style-btn') return;
    b.classList.toggle('active', b.dataset.viewMode===mode);
  });
  const cc=document.getElementById('cloud-controls');
  if(mode==='cloud') cc.classList.add('show'); else cc.classList.remove('show');

  for(let v of [viewerA, viewerB]){
    if(!v || !v.currentLayer) continue;
    const layer=v.currentLayer;
    const keys=Object.keys(layer.rendered);
    if(keys.length===0) continue;

    for(let k of keys) removePart(layer,k);
    layer.buildGen++; // invalidate any in-flight staggered queue from a previous action
    for(let k of keys){
      try{ addPart(layer,k,mode, v.currentCfg); }
      catch(e){ console.error('setView: failed to add part', k, e); }
    }
  }

  updateLegameVisibility();
  if(bondMode) buildBondLayer(); // still bonded and still in Bohr — just refresh visuals
  if(mode==='cloud') updateCloudParams(); // freshly rebuilt points start at their default size — reapply the person's actual settings
}

// "Tutti" / "Valenza" / "Nessuno" — act on the currently ACTIVE viewer.
function setPreset(mode, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  const cfg=activeViewer.currentCfg;
  const orbKeys=Object.keys(cfg).filter(o=>cfg[o]>0);
  const maxN=orbKeys.length?Math.max(...orbKeys.map(o=>parseInt(o[0]))):null;

  document.querySelectorAll('#orbital-list .orb-check').forEach(cb=>{
    const orb=cb.dataset.orb;
    if(mode==='none'){ cb.checked=false; }
    else if(mode==='all'){ cb.checked=true; }
    else if(mode==='valence'){ cb.checked=(keyShellNumber(orb)===maxN); }
  });
  activeViewer.rebuildCurrentLayer(false);
}

// ── LEGEND CLICK → HIGHLIGHT CATEGORY ────────────────────────────────────────

// ── A/B TABS & COMPARE MODE ──────────────────────────────────────────────────
let viewerA, viewerB=null, activeViewer, compareMode=false;
let electronsFrozen=false; // required by the shared engine; this project never pauses motion, so always false
let bondMode=false;
let visualStyle='flat'; // 'realistic' | 'flat' — Flat is the default look the project opens in

// Auto-rotation is shared by both viewers (A and B rotate/stop together).
// Manual drag-rotation with the mouse always still works either way.
let autoRotate=true;
function toggleRotation(){
  autoRotate=!autoRotate;
  const btn=document.getElementById('rotate-toggle-btn');
  btn.textContent = autoRotate ? 'Stop' : 'Gira';
  btn.classList.toggle('rotation-stopped', !autoRotate);

  // In Bohr style, stopping also snaps to a frontal (top-down) view, so the
  // flat rings are seen face-on as full circles rather than mid-tilt — the
  // person can still freely re-tilt it afterward with the mouse.
  if(!autoRotate && viewMode==='bohr'){
    for(let v of [viewerA, viewerB]){
      if(v){ v.rotX=0; v.rotY=0; }
    }
  }
}

// Switches between the two visual representations — same atom, same
// selection, same everything, just re-skinned instantly in place (no
// nucleus re-formation animation).
function toggleStyle(){
  visualStyle = visualStyle==='realistic' ? 'flat' : 'realistic';
  document.body.classList.toggle('theme-flat', visualStyle==='flat');
  const btn=document.getElementById('style-btn');
  btn.classList.toggle('active', visualStyle==='flat');
  btn.textContent = visualStyle==='flat' ? '🎨 FLAT' : '🎨 REAL';
  document.getElementById('bg-swatches').classList.toggle('show', visualStyle==='flat');
  for(let v of [viewerA, viewerB]){
    if(v && v.currentElement) v.restyleInPlace();
  }
  if(bondMode) buildBondLayer();
}

// ── FLAT-STYLE BACKGROUND COLOR PICKER ───────────────────────────────────────
// BG_PALETTE and applyBgColor now live in chemverse-engine.js.
buildBgSwatches(document.getElementById('bg-swatches'), 'chemverse-orbital-bg');

function switchActiveViewer(which){
  const target=which==='A'?viewerA:viewerB;
  if(!target || activeViewer===target) return;
  activeViewer=target;
  document.getElementById('tab-a').classList.toggle('active', which==='A');
  document.getElementById('tab-b').classList.toggle('active', which==='B');
  document.getElementById('pane-label-a').classList.toggle('pane-label-active', which==='A');
  document.getElementById('pane-label-b').classList.toggle('pane-label-active', which==='B');
  refreshSidebarInfo(target);
  updateOrbitalList(target.currentCfg, renderedKeysOf(target));
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(bondMode) updateCompatibleHighlight(target.currentCfg);
}

// ── DRAGGABLE SPLIT DIVIDER (compare mode) ──────────────────────────────────
let splitRatio=0.5; // fraction of the wrapper's width given to pane A

function applySplit(){
  if(!compareMode) return;
  const wrapper=document.getElementById('viewers-wrapper');
  const paneA=document.getElementById('pane-a');
  const dividerW=6;
  const totalW=wrapper.clientWidth;
  const usable=Math.max(0,totalW-dividerW);
  const aW=Math.round(usable*splitRatio);
  paneA.style.flex='0 0 '+aW+'px';
  resizeBothSoon();
}

function resizeBothSoon(){
  requestAnimationFrame(()=>{
    viewerA.resize();
    if(viewerB) viewerB.resize();
  });
}

(function initDivider(){
  const divider=document.getElementById('split-divider');
  let dragging=false;
  divider.addEventListener('mousedown', e=>{
    dragging=true;
    divider.classList.add('dragging');
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!dragging) return;
    const wrapper=document.getElementById('viewers-wrapper');
    const rect=wrapper.getBoundingClientRect();
    let ratio=(e.clientX-rect.left)/rect.width;
    ratio=Math.max(0.15,Math.min(0.85,ratio));
    splitRatio=ratio;
    applySplit();
  });
  window.addEventListener('mouseup', ()=>{
    if(dragging){ dragging=false; divider.classList.remove('dragging'); }
  });
})();

function toggleCompare(){
  compareMode=!compareMode;
  document.getElementById('compare-btn').classList.toggle('active', compareMode);
  const paneA=document.getElementById('pane-a');
  const paneB=document.getElementById('pane-b');
  const divider=document.getElementById('split-divider');
  const abTabs=document.getElementById('ab-tabs');
  const labelA=document.getElementById('pane-label-a');

  if(compareMode){
    paneB.style.display='block';
    divider.style.display='block';
    abTabs.style.display='flex';
    labelA.style.display='block';
    splitRatio=0.5;
    applySplit(); // sizes pane A explicitly; pane B (flex:1) fills the rest deterministically
    if(!viewerB){
      viewerB=createViewer(document.getElementById('c2'), paneB);
      viewerB.selectElement(viewerA.currentElement.n);
    }
    applySplit(); // re-apply once B exists, so both are guaranteed correctly sized
  } else {
    paneA.style.flex='';
    paneB.style.display='none';
    divider.style.display='none';
    abTabs.style.display='none';
    labelA.style.display='none';
    activeViewer=viewerA;
    document.getElementById('tab-a').classList.add('active');
    document.getElementById('tab-b').classList.remove('active');
    document.getElementById('pane-label-a').classList.add('pane-label-active');
    document.getElementById('pane-label-b').classList.remove('pane-label-active');
    refreshSidebarInfo(viewerA);
    updateOrbitalList(viewerA.currentCfg, renderedKeysOf(viewerA));
    resizeBothSoon();
  }
  updateLegameVisibility();
}

// ── LEGAME (BOND) TOGGLE ──────────────────────────────────────────────────────
// The "Legame" button only ever makes sense when two atoms are on screen
// (Confronta) in the Bohr view (shells, not sublevels). Whenever either of
// those conditions stops holding, we force bond mode off automatically.
function updateLegameVisibility(){
  const show=compareMode && viewMode==='bohr';
  document.getElementById('legame-btn').style.display = show ? 'inline-block' : 'none';
  if(!show) toggleBond(true);
}

function toggleBond(forceOff){
  if(forceOff && !bondMode) return;
  bondMode = forceOff ? false : !bondMode;
  document.getElementById('legame-btn').classList.toggle('active', bondMode);
  const paneA=document.getElementById('pane-a');
  const paneB=document.getElementById('pane-b');
  const divider=document.getElementById('split-divider');

  if(bondMode){
    divider.style.display='none';
    paneB.style.display='none';
    paneA.style.flex='1 1 auto';
    if(viewerA.currentLayer) viewerA.currentLayer.group.visible=false;
    buildBondLayer();
    updateCompatibleHighlight(viewerA.currentCfg);
    requestAnimationFrame(()=>viewerA.resize());
  } else {
    if(bondLayerGroup){ viewerA.atomGroup.remove(bondLayerGroup); bondLayerGroup=null; }
    bondElectrons=[];
    bondAnim=null;
    updateCompatibleHighlight(null);
    if(viewerA.currentLayer) viewerA.currentLayer.group.visible=true;
    if(compareMode){
      divider.style.display='block';
      paneB.style.display='block';
      applySplit();
    }
  }
}

new ResizeObserver(()=>{ if(compareMode) applySplit(); }).observe(document.getElementById('viewers-wrapper'));

// Extra safety net: some browsers/environments are sluggish to fire
// ResizeObserver on a plain window resize, so also react to it directly.
window.addEventListener('resize', ()=>{
  if(compareMode) applySplit();
  else resizeBothSoon();
});

// ── ANIMATION LOOP (drives both viewers) ─────────────────────────────────────
function animateAll(){
  requestAnimationFrame(animateAll);
  viewerA.render();
  if(viewerB) viewerB.render();
  if(bondMode){
    updateBondAnimation();
    for(let be of bondElectrons){
      if(be.kind==='circle'){
        be.theta+=be.speed*0.02;
        be.mesh.position.set(be.r*Math.cos(be.theta), be.r*Math.sin(be.theta), 0);
      } else if(be.kind==='fused-ellipse'){
        be.t+=be.speed*0.004;
        const p=fusedEllipsePoint(be.t, be.cx, be.a, be.b);
        be.mesh.position.set(p.x, p.y, 0);
      }
    }
  }
}
