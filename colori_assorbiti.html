// Deferred to the next frame: the canvas was just created via innerHTML,
// and reading its size before the browser has laid it out would give a
// stale/zero measurement, leaving the renderer stuck at a tiny default size.
requestAnimationFrame(()=>{
  viewerA=createViewer(document.getElementById('c'), document.getElementById('pane-a'));
  viewerA.camera.position.z=CAM_Z_DEFAULT; // apply the closer default zoom from the start, not just as a later animation target
  viewerA.rotX=0; viewerA.rotY=0; // no default tilt — this scene stays perfectly flat
  // This project keeps the atom fixed — no dragging to rotate it.
  document.getElementById('c').addEventListener('mousedown', e=>e.stopPropagation(), true);
  document.getElementById('c').addEventListener('wheel', e=>e.stopPropagation(), true);
  activeViewer=viewerA;
  animateAll();
  runIntroSequence();
});

// showSequenceBox now lives in chemverse-engine.js.

let seqColor1=null, seqColor2=null, seqColor3=null;

// ── BOX 1 — looping "energy in, jump, energy out" cycle ─────────────────────
// A stylized, non-physical demo: straight horizontal motion instead of the
// orbital-following path used elsewhere, built entirely from the shared
// engine's generalized ray functions (showLightRayTo/showOutwardRayFrom now
// accept explicit start positions/directions) and the new animateLinearMove
// helper — so this whole cycle is itself a reusable pattern, not a one-off.
let box1LoopActive=false;
let currentGrayOrbital=null;   // the gray dashed 2p preview, if one currently exists
let currentColoredRing=null;   // the colored 2p ring mesh, if the electron is currently there
let currentJumpElectron=null;  // the electron currently mid-cycle, even while detached from 2s
let box1Timeouts=[];

function clearBox1Timeouts(){
  for(const t of box1Timeouts) clearTimeout(t);
  box1Timeouts=[];
}

function getJumpElectron(){
  const layer=viewerA.currentLayer;
  if(!layer) return null;
  const rec=layer.rendered['2s'];
  if(!rec || rec.electrons.length<2) return null;
  return rec.electrons[1];
}

function startBox1Loop(){
  box1LoopActive=true;
  runBox1Cycle();
}

function stopBox1Loop(){
  box1LoopActive=false;
  clearBox1Timeouts();
}

function runBox1Cycle(){
  if(!box1LoopActive) return;
  const r2s=bohrKeyRadius('2s');
  const r2p=bohrKeyRadius('2p|x');
  const p2Gap=Math.max(0.1, r2p*0.07);
  const groundPos=new THREE.Vector3(r2s,0,0); // the rightmost point of the 2s ring
  const excitedPos=new THREE.Vector3(r2p+p2Gap,0,0); // the tip of the 2p|x lobe — the lemniscate formula adds the gap here, so this must match exactly to land on the real orbital
  const rayStart=new THREE.Vector3(-5,3.5,0); // arrives from up and to the left

  function buildColored2pTube(){
    const segs=120, pts=[];
    for(let j=0;j<=segs;j++){
      const p=lemniscatePoint(j/segs, r2p, p2Gap);
      pts.push(new THREE.Vector3(p.x, p.y, 0));
    }
    const curve=new THREE.CatmullRomCurve3(pts, true);
    const tube=visualStyle==='flat'?0.03:0.015;
    return new THREE.TubeGeometry(curve, 160, tube, 8, true);
  }

  const layer=viewerA.currentLayer;
  const ed=getJumpElectron();
  if(!ed || !layer) return;
  currentJumpElectron=ed;

  // The electron is pinned at the target FIRST — a real, visible electron
  // is already sitting there for the ray's whole flight, so the ray reads
  // as hitting an actual electron, not conjuring one on impact.
  ed.type='manual';
  ed.mesh.position.copy(groundPos);
  const originRec=layer.rendered['2s'];
  if(originRec){
    const idx=originRec.electrons.indexOf(ed);
    if(idx>=0) originRec.electrons.splice(idx,1);
  }

  showFloatingLabel('box1-label', "L'elettrone riceve energia...");
  showLightRayTo(groundPos.clone(), ()=>{
    if(!box1LoopActive) return;
    hideLightRayInstant(); // the received ray disappears the instant it hits

    // The "invisible" (not-yet-occupied) 2p orbital appears, previewing
    // where the jump is headed — exactly like Stati's empty-orbital preview.
    const grayColor=contrastingGrayColor();
    currentGrayOrbital=buildEmptyPOrbital(layer, '2p', 0, grayColor);
    fadeMaterialsOpacity([currentGrayOrbital.mat], 0, 0.85, 500);

    // The jump itself, timed exactly like a promotion in Stati.
    showFloatingLabel('box1-label', '...salta di livello...');
    const jumpArrow=showDirectionArrowLine(layer.group, groundPos, excitedPos, 0xffe27a);
    animateLinearMove(ed.mesh, groundPos, excitedPos, 2000, ()=>{
      jumpArrow.remove(1000);
      if(!box1LoopActive) return;

      // Lands on the 2p orbital, which turns from gray to colored.
      layer.group.remove(currentGrayOrbital.mesh);
      currentGrayOrbital=null;
      const color2p=ORB_COLORS['2p'];
      currentColoredRing=new THREE.Mesh(buildColored2pTube(), new THREE.MeshBasicMaterial({color:color2p, transparent:true, opacity:0}));
      layer.group.add(currentColoredRing);
      ed.mesh.material.color.set(color2p);
      layer.rendered['2p|x']={meshes:[currentColoredRing], electrons:[{mesh:ed.mesh, orb:'2p|x', a:r2p, gap:p2Gap, rot:0, t:0, speed:0, type:'manual'}]};
      fadeMaterialsOpacity([currentColoredRing.material, ed.mesh.material], 0, 1, 500);
      blinkMaterialsTwice([currentColoredRing.material], 1);
      showFloatingLabel('box1-label', '...diventa instabile...');
      ed.pulsing=true; ed.pulseAmp=0.35; ed.pulseBase=1; // same pulsing mechanic as Stati's excited electron

      // The 2s origin only turns gray if it's now genuinely empty — same
      // rule Stati uses. Beryllium's 2s still has its other electron, so
      // this normally stays colored.
      let originGrayedOut=false;
      if(originRec && originRec.electrons.length===0){
        originGrayedOut=true;
        for(const m of originRec.meshes) layer.group.remove(m);
        delete layer.rendered['2s'];
        const grayS=buildEmptySOrbital(layer, '2s', grayColor);
        fadeMaterialsOpacity([grayS.mat], 0, 0.85, 500);
      }

      const t1=setTimeout(()=>{
        if(!box1LoopActive) return;
        ed.pulsing=false; ed.mesh.scale.setScalar(1);
        showFloatingLabel('box1-label', '...torna allo stato di riposo...');
        // Falls back to the ground orbital, but stays on the right side
        // (groundPos IS the rightmost point of 2s — no separate move needed).
        const fallArrow=showDirectionArrowLine(layer.group, excitedPos, groundPos, 0xffe27a);
        animateLinearMove(ed.mesh, excitedPos, groundPos, 2000, ()=>{
          fallArrow.remove(1000);
          if(!box1LoopActive) return;

          // Settles for a beat before the orbital empties out and the next
          // packet fires — the emission follows the settling, not the landing.
          const t1c=setTimeout(()=>{
            if(!box1LoopActive) return;
            showOutwardRayFrom(groundPos.clone(), null, new THREE.Vector3(1,0,0));
            showFloatingLabel('box1-label', "...e rilascia l'energia che aveva ricevuto");
            document.getElementById('seq-box1-ok').style.visibility='visible';

            // The 2p orbital empties back out (gray again); the 2s origin
            // regains its color (rebuilding it if it had been grayed out).
            layer.group.remove(currentColoredRing);
            currentColoredRing=null;
            delete layer.rendered['2p|x'];
            currentGrayOrbital=buildEmptyPOrbital(layer, '2p', 0, contrastingGrayColor());
            fadeMaterialsOpacity([currentGrayOrbital.mat], 0, 0.85, 500);

            ed.mesh.material.color.set(ORB_COLORS['2s']);
            // (if the origin had been fully grayed out above, a complete
            // rebuild of its colored ring would be needed here too — not
            // exercised for Beryllium, since its 2s always keeps its other
            // electron, but noted for reuse with single-electron origins.)
            const rec2s=layer.rendered['2s'];
            if(rec2s){
              ed.orb='2s';
              ed.r=r2s;
              ed.theta=0;
              ed.type='bohr';
              rec2s.electrons.push(ed);
            }

            // The jump happens once — from here on, all electron motion
            // stops and the atom just keeps emitting, until OK is pressed.
            electronsFrozen=true;
            startEnergyPacketStream();
          }, 2000);
          box1Timeouts.push(t1c);
        });
      }, 2000);
      box1Timeouts.push(t1);
    });
  }, null, rayStart);
}

// ── BOX 2 — the jump settles, energy keeps leaving in repeated bursts ───────
let box2Timeouts=[];
let box2StreamActive=false;

function clearBox2Timeouts(){
  for(const t of box2Timeouts) clearTimeout(t);
  box2Timeouts=[];
}

// Once the jump settles, the whole atom stops (no more orbiting) and the
// electron stays put, but it keeps releasing energy — shown as repeated,
// separate ray bursts (rather than one continuous ray) to read as discrete
// "packets". Once the eye has been revealed, each packet is redirected to
// fly straight to the pupil and disappear there instead of flying off.
function startEnergyPacketStream(){
  if(box2StreamActive) return; // already running — don't start a second overlapping chain
  box2StreamActive=true;
  fireOnePacket();
}

function stopEnergyPacketStream(){
  box2StreamActive=false;
}

let rayTargetsEye=false;

// ── SLOW PULSING RAY (box2 onward) ──────────────────────────────────────────
// A row of dashes drifting slowly to the right, with a single dash lit up
// brighter at a time, sweeping from the first dash to the last, looping.
let pulsingRayActive=false;
let pulsingRayGroup=null;
let pulsingRayDashMats=[];
let pulsingRayFrame=null;
let pulsingRayStopX=null; // world x where the ray should stop (box3: in front of the eye); null = flies indefinitely

function stopPulsingRay(){
  pulsingRayActive=false;
  if(pulsingRayFrame){ cancelAnimationFrame(pulsingRayFrame); pulsingRayFrame=null; }
  if(pulsingRayGroup){
    const layer=viewerA.currentLayer;
    if(layer) layer.group.remove(pulsingRayGroup);
    for(const child of pulsingRayGroup.children) child.geometry.dispose();
    pulsingRayGroup=null;
  }
  pulsingRayDashMats=[];
}

// ── WAVE RAY (box4 onward) — the same energy shown as a continuous wave
// instead of discrete "packet" dashes, traveling from the electron to the
// eye and staying there, phase-animated so it visibly ripples along.
let waveRayActive=false;
let waveRayMesh=null;
let waveRayFrame=null;

function stopWaveRay(){
  waveRayActive=false;
  if(waveRayFrame){ cancelAnimationFrame(waveRayFrame); waveRayFrame=null; }
  if(waveRayMesh){
    const layer=viewerA.currentLayer;
    if(layer) layer.group.remove(waveRayMesh);
    for(const child of waveRayMesh.children) child.geometry.dispose();
    waveRayMesh=null;
  }
}

// ── BRAIN COLOR + PULSE (box6) ───────────────────────────────────────────────
// The 26 paths that make up the brain in the head illustration were tagged
// with class="brain-part" when the SVG was built (identified by their
// original pink/magenta fill, distinct from the skin tone). Each one
// recolors and pulses around its own center — not a single rigid shape, but
// close enough for a synchronized-looking pulse at this scale.
function setBrainColor(colorHex){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts) p.setAttribute('fill', colorHex);
}

function restoreBrainColors(){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts){
    const orig=p.getAttribute('data-orig-fill');
    if(orig) p.setAttribute('fill', orig);
  }
}

function pulseBrainOnce(){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts){
    p.classList.remove('brain-pulse');
    void p.offsetWidth; // restart the animation even if it's still playing
    p.classList.add('brain-pulse');
  }
}


let waveTargetProps={amplitude:0.16, wavelength:0.55, color:new THREE.Color(0xffd76b)};
let waveSnapRequested=false;

function setWaveStyle(amplitude, wavelength, color, instant){
  if(amplitude!==undefined) waveTargetProps.amplitude=amplitude;
  if(wavelength!==undefined) waveTargetProps.wavelength=wavelength;
  if(color!==undefined) waveTargetProps.color=new THREE.Color(color);
  if(instant) waveSnapRequested=true;
}

function startWaveRay(fromX, toX){
  stopWaveRay();
  const layer=viewerA.currentLayer;
  if(!layer) return;
  waveRayActive=true;

  waveProps={amplitude:waveTargetProps.amplitude, wavelength:waveTargetProps.wavelength, color:waveTargetProps.color.getHex()};
  const tubeRadius=0.035;
  const pointsPerDash=4;
  const currentColor=new THREE.Color(waveProps.color);
  const mat=new THREE.MeshBasicMaterial({color:currentColor, transparent:true, opacity:0.9});

  function waveY(x, phase){
    return waveProps.amplitude*Math.sin((x-fromX)/waveProps.wavelength*Math.PI*2 - phase);
  }

  function buildWaveGeometry(phase){
    const group=new THREE.Group();
    // dash size scales with the current wavelength — a tight, high-frequency
    // wave needs much smaller dashes to still read clearly as a wave shape
    const dashLen=Math.max(0.008, waveProps.wavelength*0.05);
    const gapLen=Math.max(0.006, waveProps.wavelength*0.04);
    let x=fromX;
    while(x<toX){
      const dashEnd=Math.min(x+dashLen, toX);
      const pts=[];
      for(let i=0;i<=pointsPerDash;i++){
        const px=x+(dashEnd-x)*(i/pointsPerDash);
        pts.push(new THREE.Vector3(px, waveY(px,phase), 0));
      }
      if(pts.length>=2){
        const curve=new THREE.CatmullRomCurve3(pts);
        const geo=new THREE.TubeGeometry(curve, pointsPerDash, tubeRadius, 6, false);
        group.add(new THREE.Mesh(geo, mat));
      }
      x+=dashLen+gapLen;
    }
    return group;
  }

  waveRayMesh=buildWaveGeometry(0);
  waveRayMesh.position.y=0;
  layer.group.add(waveRayMesh);

  const startTime=performance.now();
  (function step(){
    if(!waveRayActive) return;
    const elapsed=(performance.now()-startTime)/1000;
    const phase=elapsed*3.2; // travel speed of the ripple

    // smoothly drift the live properties toward whatever was last requested
    // — unless an instant snap was requested, which jumps straight there
    if(waveSnapRequested){
      waveProps.amplitude=waveTargetProps.amplitude;
      waveProps.wavelength=waveTargetProps.wavelength;
      currentColor.copy(waveTargetProps.color);
      waveSnapRequested=false;
    } else {
      waveProps.amplitude+=(waveTargetProps.amplitude-waveProps.amplitude)*0.015;
      waveProps.wavelength+=(waveTargetProps.wavelength-waveProps.wavelength)*0.015;
      currentColor.lerp(waveTargetProps.color, 0.015);
    }
    waveProps.color=currentColor.getHex();
    mat.color.copy(currentColor);

    const oldMesh=waveRayMesh;
    waveRayMesh=buildWaveGeometry(phase);
    waveRayMesh.position.y=0;
    layer.group.add(waveRayMesh);
    layer.group.remove(oldMesh);
    for(const child of oldMesh.children) child.geometry.dispose();
    waveRayFrame=requestAnimationFrame(step);
  })();
}

function startPulsingRay(stopX){
  stopPulsingRay();
  const layer=viewerA.currentLayer;
  if(!layer) return;
  pulsingRayActive=true;
  pulsingRayStopX=(stopX===undefined)?null:stopX;
  pulsingRayGroup=new THREE.Group();
  pulsingRayGroup.position.y=0; // starts exactly at the electron's height, no gap
  layer.group.add(pulsingRayGroup);

  const r2s=bohrKeyRadius('2s');
  const originX=r2s;
  const dashLen=0.28, gapLen=0.14, radius=0.042;
  const targetX=(pulsingRayStopX!==null) ? pulsingRayStopX : originX+7; // longer flow
  const totalSpan=Math.max(dashLen, targetX-originX);
  const dashCount=Math.max(2, Math.round(totalSpan/(dashLen+gapLen)));
  const goldColor=new THREE.Color(0xffd700), orangeColor=new THREE.Color(0xff8c00);
  pulsingRayDashMats=[];
  for(let i=0;i<dashCount;i++){
    const x0=originX+i*(dashLen+gapLen);
    const x1=Math.min(x0+dashLen, targetX);
    if(x1<=x0) break;
    const geo=new THREE.TubeGeometry(new THREE.LineCurve3(new THREE.Vector3(x0,0,0), new THREE.Vector3(x1,0,0)), 2, radius, 8, false);
    const mat=new THREE.MeshBasicMaterial({color:goldColor.clone(), transparent:true, opacity:0.25});
    pulsingRayGroup.add(new THREE.Mesh(geo, mat));
    pulsingRayDashMats.push(mat);
  }

  const pulseCycleMs=2200; // time for one full left-to-right sweep

  (function step(){
    if(!pulsingRayActive) return;
    const now=performance.now();

    const t=(now/pulseCycleMs)%1;
    const activeIdx=Math.floor(t*pulsingRayDashMats.length);
    for(let i=0;i<pulsingRayDashMats.length;i++){
      const isActive=(i===activeIdx);
      pulsingRayDashMats[i].opacity=isActive?1:0.25;
      pulsingRayDashMats[i].color.copy(isActive?orangeColor:goldColor);
    }

    pulsingRayFrame=requestAnimationFrame(step);
  })();
}

const EYE_WORLD_TARGET=new THREE.Vector3(6.5,0,0); // roughly where the eye overlay sits once zoomed/panned — pulled back again, still overshooting the head at 7.6

function fireOnePacket(){
  if(!box2StreamActive) return;
  const r2s=bohrKeyRadius('2s');
  const origin=new THREE.Vector3(r2s,0,0);
  if(rayTargetsEye){
    showLightRayTo(EYE_WORLD_TARGET.clone(), ()=>{
      hideLightRayInstant(); // absorbed by the eye — doesn't travel any further
    }, null, origin);
  } else {
    showOutwardRayFrom(origin, null, new THREE.Vector3(1,0,0));
  }
  const t=setTimeout(fireOnePacket, 1600);
  box2Timeouts.push(t);
}

function settleJumpAtGround(){
  stopBox1Loop();
  hideLightRayInstant();
  hideFloatingLabel('box1-label');
  electronsFrozen=true; // the whole atom settles into stillness
  const layer=viewerA.currentLayer;
  const ed=currentJumpElectron || getJumpElectron();

  // Clean up anything left over from an interrupted cycle: a gray preview
  // orbital, a colored 2p ring, or the electron still parked in 2p|x.
  if(layer){
    if(currentGrayOrbital){
      layer.group.remove(currentGrayOrbital.mesh);
      currentGrayOrbital=null;
    }
    if(currentColoredRing){
      layer.group.remove(currentColoredRing);
      currentColoredRing=null;
    }
    delete layer.rendered['2p|x'];
  }

  if(ed){
    const r2s=bohrKeyRadius('2s');
    ed.type='bohr';
    ed.theta=0;
    ed.mesh.position.set(r2s,0,0);
    ed.mesh.material.color.set(ORB_COLORS['2s']); // in case it was mid-jump and still colored as 2p
    const rec2s=layer && layer.rendered['2s'];
    if(rec2s && rec2s.electrons.indexOf(ed)===-1){
      ed.orb='2s'; ed.r=r2s;
      rec2s.electrons.push(ed); // put it back if the interruption caught it mid-flight, detached from 2s
    }
  }
  currentJumpElectron=null;
  startEnergyPacketStream();
}

// ── CAMERA ZOOM + PAN (frames only the left portion of the atom) ────────────
const CAM_Z_DEFAULT=9.5, CAM_X_DEFAULT=0;
const CAM_Z_ZOOMED=6.5, CAM_X_ZOOMED=3.2;

function animateCamera(targetZ, targetX, duration, onDone){
  const cam=viewerA.camera;
  const startZ=cam.position.z, startX=cam.position.x;
  const t0=performance.now();
  (function step(){
    const now=performance.now();
    const t=Math.min(1,(now-t0)/duration);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.position.z=startZ+(targetZ-startZ)*ease;
    cam.position.x=startX+(targetX-startX)*ease;
    if(t<1) requestAnimationFrame(step);
    else if(onDone) onDone();
  })();
}

// ── BOX NAVIGATION ────────────────────────────────────────────────────────
function advanceToBox2(){
  document.getElementById('seq-box1-ok').style.visibility='hidden';
  document.getElementById('seq-box2-ok').style.visibility='hidden';
  document.getElementById('seq-box2-back').style.visibility='visible';
  showSequenceBox('seq-box2', '…che può essere emessa solo in <b style="color:#c0392b">"PACCHETTI"</b>, che si chiamano <b style="color:#c0392b">QUANTI</b>', seqColor2);
  showFloatingLabel('box1-label', "l'energia viaggia divisa in tanti pacchetti...", '#fff', '38%', '8%');
  // the box1 loop keeps running for another 2 seconds after box2 appears —
  // it settles on its own, no button needed
  const t=setTimeout(()=>{
    settleJumpAtGround();
    stopEnergyPacketStream();
    hideLightRayInstant();
    startPulsingRay(); // slower ray, dashes pulsing one at a time, from here on
    showFloatingLabel('box1-label', "l'energia viaggia divisa in tanti pacchetti...", '#fff', '38%', '8%');
    setTimeout(()=>{ document.getElementById('seq-box2-ok').style.visibility='visible'; }, 3000);
  }, 2000);
  box2Timeouts.push(t);
}

function backFromBox2(){
  clearBox2Timeouts();
  stopEnergyPacketStream();
  stopBox1Loop(); // in case the loop was still mid-flight (backed out before it settled)
  stopPulsingRay();
  hideLightRayInstant();
  electronsFrozen=false;
  document.getElementById('seq-box2').classList.remove('show');
  document.getElementById('seq-box1-ok').style.visibility='visible';
  startBox1Loop();
}

function advanceToBox3(){
  document.getElementById('seq-box2-ok').style.visibility='hidden';
  document.getElementById('seq-box2-back').style.visibility='hidden';
  document.getElementById('seq-box3-ok').style.visibility='hidden';
  document.getElementById('seq-box3-back').style.visibility='visible';
  animateCamera(CAM_Z_ZOOMED, CAM_X_ZOOMED, 1800, ()=>{

}

function backFromBox3(){

  startPulsingRay(); // rebuilds back to the unbounded box2 span
  document.getElementById('eye-head').style.opacity='0';
  document.getElementById('fotoni-label').style.opacity='0';
  document.getElementById('seq-box3').classList.remove('show');

}

// Box5: a big zoom onto the middle of the wave's path — only a sliver of
// the orbital (with its electron) stays visible on the left, and a sliver
// of the face (with the eye) on the right. The wave itself doesn't change
// at all, it just keeps flowing — only the camera framing (and, as a
// best-effort approximation, the size of the 2D head overlay) change.
// NOTE: the head is a flat CSS/SVG overlay, not part of the 3D scene, so it
// can't zoom in perfect lockstep with the camera — shrinking it is the
// closest approximation available without rebuilding it as a 3D element.
let box5Timeouts=[];
function clearBox5Timeouts(){
  for(const t of box5Timeouts) clearTimeout(t);
  box5Timeouts=[];
}

function advanceToBox5(isReturning){
  document.getElementById('seq-box4-ok').style.visibility='hidden';
  document.getElementById('seq-box4-back').style.visibility='hidden';
  document.getElementById('seq-box5-back').style.visibility='visible';
  showSequenceBox('seq-box5', 'La frequenza dell\'onda dipende da quanta energia è stata rilasciata', seqColor2);
  const r2s=bohrKeyRadius('2s');
  const midX=(r2s+EYE_WORLD_TARGET.x)/2;
  animateCamera(1.6, midX, 1800);
  document.getElementById('eye-head').style.opacity='0';
  document.getElementById('seq-box5-ok').style.visibility=isReturning?'visible':'hidden';

  clearBox5Timeouts();
  const FIXED_AMPLITUDE=0.16; // the wave's height never changes — only how many fit in the same space
  const steps=[
    ["se l'energia è bassa, le onde sono poco frequenti...", 0.9, 0xd94439],  // red, long wavelength = few waves
    ["...se l'energia sale, le onde sono più frequenti...", 0.4, 0x6fae86],   // green, shorter wavelength = more waves
    ["se l'energia è alta, la frequenza dell'onda è alta", 0.15, 0x6fa3d4],   // blue, very short wavelength = many waves
  ];
  let stepIdx=0;
  let firstStep=true;
  let okRevealed=!!isReturning;
  function runStep(){
    const [text, wavelength, color]=steps[stepIdx];
    showFloatingLabel('box1-label', text, '#fff', '45%', '30%');
    setWaveStyle(FIXED_AMPLITUDE, wavelength, color, firstStep);
    firstStep=false;
    if(stepIdx===2 && !okRevealed){
      okRevealed=true;
      const okT=setTimeout(()=>{ document.getElementById('seq-box5-ok').style.visibility='visible'; }, 3000);
      box5Timeouts.push(okT);
    }
    stepIdx=(stepIdx+1)%steps.length;
    const t=setTimeout(runStep, 5000);
    box5Timeouts.push(t);
  }
  runStep();
}

// ── BOX 7: many atoms, then the pear ────────────────────────────────────────
// Simplified atoms (a nucleus + one orbiting electron, not the full Bohr
// engine) — building several full multi-orbital atoms would be very heavy;
// this keeps the idea readable while staying light enough to animate freely.
let miniAtoms=[];
let miniWaves=[];
let pearGroup=null;
let sunRaysClusterShift=0; // tracks how far the sun rays were shifted for box8's leftward atom cluster, so it can be reversed
let pearStem=null;
let pearDots=[];
let sunRays=[];
let box7AnimFrame=null;
let box7Timeouts=[];
let scenePhase='atom'; // 'atom' | 'pear'

function clearBox7Timeouts(){
  for(const t of box7Timeouts) clearTimeout(t);
  box7Timeouts=[];
}

function makeMiniAtom(cx, cy, scale, color1s, color2s, nucleusColor){
  const group=new THREE.Group();
  buildStaticNucleus(4, group); // Beryllium, Z=4 — the same real nucleus builder the main atom uses
  if(nucleusColor!==undefined){
    for(let i=1;i<group.children.length;i++){
      const child=group.children[i];
      if(child.geometry && child.geometry.type==='SphereGeometry' && child.material) child.material.color.set(nucleusColor);
    }
  }

  const r1s=bohrKeyRadius('1s'), r2s=bohrKeyRadius('2s');
  const tube=0.02;
  function addRing(r, color, count){
    const ring=new THREE.Mesh(new THREE.TorusGeometry(r, tube, 8, 48), new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.7}));
    group.add(ring);
    const eds=[];
    for(let i=0;i<count;i++){
      const e=makeElectron(color);
      group.add(e);
      eds.push({mesh:e, r, theta:(i/count)*Math.PI*2, speed:0.35+0.15*Math.random()});
    }
    return eds;
  }
  const electrons=[...addRing(r1s, color1s!==undefined?color1s:0x00ffff, 2), ...addRing(r2s, color2s!==undefined?color2s:0xff4488, 2)];

  group.position.set(cx,cy,0);
  group.scale.setScalar(scale);
  return {group, electrons};
}

function makeThinWave(fromX, fromY, toX, toY, scaleMult){
  scaleMult=scaleMult||1;
  const mat=new THREE.MeshBasicMaterial({color:0xffd76b, transparent:true, opacity:0.75});
  const amplitude=0.03*scaleMult, wavelength=0.22*scaleMult, tubeRadius=0.012*scaleMult, dashLen=0.02*scaleMult, gapLen=0.018*scaleMult;
  const dx=toX-fromX, dy=toY-fromY, dist=Math.hypot(dx,dy);
  function basePos(t){
    // X advances linearly, but Y converges to the target early (eased),
    // so multiple waves from spread-out origins funnel into a tight bundle
    // well before reaching the eye, instead of arriving as parallel spread lines
    const easedT=1-Math.pow(1-t,3);
    return {x:fromX+dx*t, y:fromY+dy*easedT};
  }
  function build(phase){
    const group=new THREE.Group();
    let d=0;
    while(d<dist){
      const dEnd=Math.min(d+dashLen,dist);
      const pts=[];
      for(let i=0;i<=3;i++){
        const dd=d+(dEnd-d)*(i/3);
        const t=dd/dist;
        const base=basePos(t);
        // local tangent direction, for the perpendicular ripple
        const t2=Math.min(1,t+0.01);
        const base2=basePos(t2);
        const tdx=base2.x-base.x, tdy=base2.y-base.y;
        const tlen=Math.hypot(tdx,tdy)||1;
        const perpX=-tdy/tlen, perpY=tdx/tlen;
        const ripple=amplitude*Math.sin(dd/wavelength*Math.PI*2 - phase);
        const px=base.x+perpX*ripple, py=base.y+perpY*ripple;
        pts.push(new THREE.Vector3(px,py,0));
      }
      if(pts.length>=2){
        const curve=new THREE.CatmullRomCurve3(pts);
        group.add(new THREE.Mesh(new THREE.TubeGeometry(curve,3,tubeRadius,5,false), mat));
      }
      d+=dashLen+gapLen;
    }
    return group;
  }
  return {build, mesh:null};
}

function advanceToBox7(){
  document.getElementById('seq-box6-ok').style.visibility='hidden';
  document.getElementById('seq-box6-back').style.visibility='hidden';
  document.getElementById('seq-box7-ok').style.visibility='hidden';
  document.getElementById('seq-box7-back').style.visibility='visible';
  document.getElementById('brain-color-label').style.opacity='0';
  hideFloatingLabel('box1-label');
  stopWaveRay(); // box6's own wave was never explicitly stopped — it kept rendering underneath everything from here on
  showSequenceBox('seq-box7', 'Questi salti orbitali degli elettroni sono continui e incessanti', seqColor1);
  clearBox6Timeouts();

  const layer=viewerA.currentLayer;
  if(!layer) return;
  scenePhase='atom';

  // the single main atom is fully replaced by five identical ones — the head stays exactly as it is
  layer.group.visible=false;

  // five mini atoms, packed close together (practically touching), all the same size
  const r2s=bohrKeyRadius('2s');
  const miniScale=0.36;
  const outerR=r2s*miniScale; // each mini atom's own outer (2s) ring radius, in world units
  const centerCx=r2s*0.45;
  const offsets=[[0,0]];
  const daisyRotation=Math.PI/7; // rotated off-axis so no petal lines up horizontally with the center — otherwise those atoms' rays toward the eye overlap
  for(let i=0;i<6;i++){
    const ang=i*Math.PI/3+daisyRotation;
    offsets.push([Math.cos(ang)*outerR*2, Math.sin(ang)*outerR*2]);
  } // a daisy pattern: one center atom + six around it, touching
  miniAtoms=[];
  miniWaves=[];
  for(const [ox,oy] of offsets){
    const cx=centerCx+ox, cy=oy;
    const ma=makeMiniAtom(cx,cy,miniScale);
    layer.group.parent.add(ma.group); // added to the scene directly, not part of the (now hidden) main atom
    miniAtoms.push(ma);
    // the ray starts at the outer edge of the atom's own outermost ring, not at the nucleus
    const dx=EYE_WORLD_TARGET.x-cx, dy=0-cy;
    const dist=Math.hypot(dx,dy);
    const startX=cx+dx/dist*outerR, startY=cy+dy/dist*outerR;
    const w=makeThinWave(startX,startY,EYE_WORLD_TARGET.x,0);
    w.mesh=w.build(0);
    layer.group.parent.add(w.mesh);
    miniWaves.push(w);
  }

  const startTime=performance.now();
  (function step(){
    if(scenePhase!=='atom') return;
    const now=performance.now();
    for(const ma of miniAtoms){
      for(const ed of ma.electrons){
        ed.theta+=ed.speed*0.055;
        ed.mesh.position.set(Math.cos(ed.theta)*ed.r, Math.sin(ed.theta)*ed.r, 0);
      }
    }
    const phase=(now-startTime)/1000*3;
    for(const w of miniWaves){
      const old=w.mesh;
      w.mesh=w.build(phase);
      old.parent.add(w.mesh);
      old.parent.remove(old);
      for(const c of old.children) c.geometry.dispose();
    }
    box7AnimFrame=requestAnimationFrame(step);
  })();

  showFloatingLabel('box1-label', 'gli elettroni saltano su e giù continuamente', '#fff', '30%', '10%');
  const okT=setTimeout(()=>{ document.getElementById('seq-box7-ok').style.visibility='visible'; }, 2000);
  box7Timeouts.push(okT);
}

function clearMiniAtomsAndWaves(){
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(parent){
    for(const ma of miniAtoms){
      parent.remove(ma.group);
      ma.group.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); });
    }
    for(const w of miniWaves){
      parent.remove(w.mesh);
      for(const c of w.mesh.children) c.geometry.dispose();
    }
  }
  miniAtoms=[];
  miniWaves=[];
}

function startPearScene(){
  document.getElementById('seq-box7-ok').style.visibility='hidden';
  hideFloatingLabel('box1-label');
  document.getElementById('brain-color-label').style.opacity='0';
  scenePhase='pear';
  clearMiniAtomsAndWaves();
  const layer=viewerA.currentLayer;
  if(!layer) return;
  layer.group.visible=false; // the single atom is fully replaced by the pear now

  // the head comes back with its normal (pink) brain, not whatever color box6 left it at
  document.getElementById('eye-head').style.opacity='1';
  restoreBrainColors();

  const parent=layer.group.parent;
  const r2s=bohrKeyRadius('2s');
  const pearCx=r2s*0.45;
  const pearCy=-0.1;

  // A real traced pear outline (from an uploaded reference image), used
  // directly instead of a hand-built approximation.
  const pearPts=[[-0.1351,2.0250],[-0.0406,1.9697],[0.0309,1.8492],[0.0765,1.7222],[0.0895,1.6246],[0.0733,1.3674],[0.2327,1.3315],[0.3109,1.2990],[0.4444,1.1981],[0.5355,1.0808],[0.5648,1.0321],[0.6072,0.9279],[0.6592,0.6608],[0.7146,0.4786],[0.7765,0.3517],[0.8026,0.3028],[0.8513,0.2182],[0.8872,0.1596],[0.9751,0.0228],[1.0238,-0.0651],[1.0695,-0.1335],[1.0890,-0.1661],[1.1476,-0.2865],[1.1931,-0.4037],[1.2323,-0.5404],[1.2616,-0.7683],[1.2420,-1.0581],[1.2224,-1.1460],[1.1574,-1.3185],[1.0598,-1.4878],[0.9262,-1.6474],[0.8220,-1.7418],[0.6462,-1.8590],[0.5681,-1.8947],[0.4379,-1.9533],[0.1709,-2.0153],[-0.1156,-2.0218],[-0.3598,-1.9761],[-0.5258,-1.9175],[-0.6234,-1.8720],[-0.7081,-1.8232],[-0.8416,-1.7254],[-0.9392,-1.6343],[-1.0402,-1.5139],[-1.1151,-1.3967],[-1.1345,-1.3674],[-1.1606,-1.3022],[-1.1802,-1.2600],[-1.2323,-1.1135],[-1.2616,-0.9376],[-1.2290,-0.5307],[-1.1574,-0.3125],[-1.1183,-0.2279],[-1.0499,-0.1107],[-0.9783,0.0163],[-0.8905,0.1530],[-0.8579,0.2083],[-0.7960,0.3125],[-0.7406,0.4232],[-0.6691,0.6186],[-0.6333,0.8335],[-0.6137,0.9050],[-0.5812,0.9800],[-0.5551,1.0483],[-0.4933,1.1460],[-0.4444,1.1981],[-0.3272,1.2893],[-0.1580,1.3543],[-0.0537,1.4194],[-0.0635,1.5887],[-0.0863,1.6539],[-0.1253,1.7321],[-0.1840,1.8232],[-0.2458,1.9046],[-0.2360,1.9697],[-0.1644,2.0218]]; // scaled up ~1.35x from the original traced size
  const shapePts=pearPts.map(([x,y])=>new THREE.Vector2(x,y));
  const pearShape=new THREE.Shape();
  pearShape.moveTo(shapePts[0].x, shapePts[0].y);
  for(let i=1;i<shapePts.length;i++) pearShape.lineTo(shapePts[i].x, shapePts[i].y);
  pearShape.closePath();
  const pearMat=new THREE.MeshBasicMaterial({color:0xa8c93a, transparent:true, opacity:0.92});
  pearGroup=new THREE.Mesh(new THREE.ShapeGeometry(pearShape, 32), pearMat);
  pearGroup.position.set(pearCx, pearCy, 0);
  parent.add(pearGroup);

  // Point-in-polygon test against the pear's own outline (sampled finely),
  // so the atoms filling it are only ever placed truly inside the shape.
  const outline=[];
  for(let i=0;i<=200;i++){
    const pt=pearShape.getPoint(i/200);
    outline.push(pt);
  }
  function insidePear(x,y){
    let inside=false;
    for(let i=0,j=outline.length-1;i<outline.length;j=i++){
      const xi=outline[i].x, yi=outline[i].y, xj=outline[j].x, yj=outline[j].y;
      const intersect=((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi);
      if(intersect) inside=!inside;
    }
    return inside;
  }

  pearDots=[];
  sunRays=[];

  // Phase 2: after 3s, zoom in on the pear, reveal the atoms floating
  // inside it, and start the (dashed, less-tilted) sunlight
  function revealPearAtoms(){
    const spacing=0.13;
    const ringMat=new THREE.MeshBasicMaterial({color:0x2e8b4f, transparent:true, opacity:0.85});
    for(let gx=-1.35; gx<=1.35; gx+=spacing){
      for(let gy=-2.1; gy<=2.1; gy+=spacing){
        const jx=gx+(Math.random()-0.5)*spacing*0.4;
        const jy=gy+(Math.random()-0.5)*spacing*0.4;
        if(!insidePear(jx,jy)) continue;
        const px=pearCx+jx, py=pearCy+jy;
        const dotGroup=new THREE.Group();
        const ringR=0.045;
        const ringPts=[];
        for(let i=0;i<=24;i++){
          const a=i/24*Math.PI*2;
          ringPts.push(new THREE.Vector3(Math.cos(a)*ringR, Math.sin(a)*ringR, 0));
        }
        const ring=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts), ringMat);
        const nucleus=new THREE.Mesh(new THREE.CircleGeometry(0.016,8), new THREE.MeshBasicMaterial({color:0x000000}));
        nucleus.position.z=0.001;
        const electron=new THREE.Mesh(new THREE.CircleGeometry(0.010,8), new THREE.MeshBasicMaterial({color:0x1d7a3f}));
        electron.position.set(ringR,0,0.002);
        dotGroup.add(ring, nucleus, electron);
        dotGroup.position.set(px,py,0.01);
        parent.add(dotGroup);
        pearDots.push({mesh:dotGroup, baseX:px, baseY:py, seed:Math.random()*1000, electron, orbitTheta:Math.random()*Math.PI*2, orbitR:ringR, orbitSpeed:1.5+Math.random()});
      }
    }
  }

  function startSunRays(){
    const rayMat=new THREE.MeshBasicMaterial({color:0xffe27a, transparent:true, opacity:0.7});
    const rayAngle=Math.atan2(-1, -0.75); // less tilted than before — steeper, more downward
    const rayDirX=Math.cos(rayAngle), rayDirY=Math.sin(rayAngle);
    const dashLen=0.08, gapLen=0.05, totalLen=0.7;
    for(let i=0;i<28;i++){
      const startX=pearCx+1.0-i*0.05, startY=2.0-((i%4)*0.15);
      const rayGroup=new THREE.Group();
      let d=0;
      while(d<totalLen){
        const dEnd=Math.min(d+dashLen, totalLen);
        const x0=startX+rayDirX*d, y0=startY+rayDirY*d;
        const x1=startX+rayDirX*dEnd, y1=startY+rayDirY*dEnd;
        const geo=new THREE.TubeGeometry(new THREE.LineCurve3(new THREE.Vector3(x0,y0,0), new THREE.Vector3(x1,y1,0)), 2, 0.008, 5, false);
        rayGroup.add(new THREE.Mesh(geo, rayMat));
        d+=dashLen+gapLen;
      }
      parent.add(rayGroup);
      sunRays.push({mesh:rayGroup, startX, startY, dirX:rayDirX, dirY:rayDirY, phase:Math.random()*2, baseOffsetX:0});
    }
  }

  startSunRays(); // starts immediately, alongside the plain pear — not waiting for the zoom-in

  const t1=setTimeout(()=>{
    animateCamera(0.95, pearCx, 1800); // zoom further in on the pear
    revealPearAtoms();
    const t2=setTimeout(()=>{
      document.getElementById('seq-box7-ok').style.visibility='visible';
    }, 3000);
    box7Timeouts.push(t2);
  }, 3000);
  box7Timeouts.push(t1);

  (function step(){
    if(scenePhase!=='pear') return;
    const now=performance.now()/1000;
    for(const d of pearDots){
      d.mesh.position.x=d.baseX+Math.sin(now*3+d.seed)*0.012;
      d.mesh.position.y=d.baseY+Math.cos(now*3.3+d.seed)*0.012;
      d.orbitTheta+=d.orbitSpeed*0.02;
      d.electron.position.set(Math.cos(d.orbitTheta)*d.orbitR, Math.sin(d.orbitTheta)*d.orbitR, 0.002);
    }
    for(const r of sunRays){
      const t=((now+r.phase)*0.6)%1.6;
      r.mesh.position.x=r.baseOffsetX+r.dirX*t*0.5;
      r.mesh.position.y=r.dirY*t*0.5;
      r.mesh.traverse(obj=>{ if(obj.material) obj.material.opacity=t<1.2?0.7:0.7*(1.6-t)/0.4; });
    }
    // a ray "hits" whichever atom it currently happens to be passing near —
    // briefly flashing it, rather than a precise physical collision
    for(const d of pearDots) d.mesh.children[0].material.opacity=0.85;
    for(const r of sunRays){
      const midX=r.startX+r.dirX*0.35+r.mesh.position.x;
      const midY=r.startY+r.dirY*0.35+r.mesh.position.y;
      for(const d of pearDots){
        const dx=d.mesh.position.x-midX, dy=d.mesh.position.y-midY;
        if(dx*dx+dy*dy<0.015) d.mesh.children[0].material.opacity=1;
      }
    }
    box7AnimFrame=requestAnimationFrame(step);
  })();
}

function stopBox7Scene(){
  scenePhase='none';
  if(box7AnimFrame){ cancelAnimationFrame(box7AnimFrame); box7AnimFrame=null; }
  clearBox7Timeouts();
  hideFloatingLabel('box1-label');
  clearMiniAtomsAndWaves();
  const layer=viewerA.currentLayer;
  if(layer){
    layer.group.scale.setScalar(1);
    layer.group.visible=true;
    const parent=layer.group.parent;
    if(pearGroup){ parent.remove(pearGroup); pearGroup.geometry.dispose(); pearGroup=null; }
    if(pearStem){ parent.remove(pearStem); pearStem.geometry.dispose(); pearStem=null; }
    for(const d of pearDots){
      parent.remove(d.mesh);
      for(const c of d.mesh.children) c.geometry.dispose();
    }
    pearDots=[];
    for(const r of sunRays){
      parent.remove(r.mesh);
      for(const c of r.mesh.children) c.geometry.dispose();
    }
    sunRays=[];
    if(appleGroup){ parent.remove(appleGroup); appleGroup.geometry.dispose(); appleGroup=null; }
    for(const d of appleDots){
      parent.remove(d.mesh);
      for(const c of d.mesh.children) c.geometry.dispose();
    }
    appleDots=[];
  }
  document.getElementById('seq-box8').classList.remove('show');
  document.getElementById('seq-box8-wrap').classList.add('seq-hidden');
  document.getElementById('seq-box9').classList.remove('show');
}

function backFromBox7(){
  stopBox7Scene();
  document.getElementById('seq-box7').classList.remove('show');
  finishBox5(true); // properly resumes box6's own color cycle — isReturning=true shows OK immediately
}

// Box7's OK button does two different things depending on where the scene
// currently is: first it starts the pear, later (once the pear's own
// sequence has finished) it advances to box8 instead.
function handleBox7OK(){
  if(scenePhase==='atom'){
    startPearScene();
  } else if(scenePhase==='pear'){
    advanceToBox8();
  }
}

function advanceToBox8(isReturning){
  document.getElementById('seq-box7-ok').style.visibility='hidden';
  document.getElementById('seq-box7-back').style.visibility='hidden';
  document.getElementById('seq-box4-wrap').classList.add('seq-hidden');
  document.getElementById('seq-box8-wrap').classList.remove('seq-hidden');
  document.getElementById('seq-box8-back').style.visibility='visible';
  document.getElementById('seq-box8-ok').style.visibility=isReturning?'visible':'hidden';
  showSequenceBox('seq-box8', 'Gli oggetti sembrano fermi, ma gli atomi degli elettroni saltano continuamente da un orbitale all\'altro', seqColor2);
  if(!isReturning) setTimeout(()=>{ document.getElementById('seq-box8-ok').style.visibility='visible'; }, 3000);

  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(!parent) return;

  // zoom in further on the pear — its green fills the background, showing
  // we're still "inside" the fruit from box7
  const r2s=bohrKeyRadius('2s');
  const pearCx=r2s*0.45;
  animateCamera(0.5, pearCx, 1800);

  // hide the small pear-filling atoms — only the pear's green shape stays,
  // as the backdrop for the seven bigger atoms re-appearing. The sun rays
  // keep going, now aimed at these instead.
  for(const d of pearDots) d.mesh.visible=false;

  // re-show the seven atoms from box7, shifted left so they don't sit under
  // the head — scaled down to compensate for the closer camera (0.5 vs
  // box7's 6.5), so they appear the same size on screen as they did in box7
  scenePhase='box8atoms';
  const miniScale=0.36*(0.5/CAM_Z_ZOOMED);
  const outerR=r2s*miniScale;
  const clusterCx=pearCx-outerR*3.2; // shifted left, clear of the head on the right
  const clusterShift=clusterCx-pearCx;
  sunRaysClusterShift=clusterShift;
  for(const r of sunRays) r.baseOffsetX+=clusterShift;
  const offsets=[[0,0]];
  const daisyRotation=Math.PI/7; // rotated off-axis so no petal lines up horizontally with the center — otherwise those atoms' rays toward the eye overlap
  for(let i=0;i<6;i++){
    const ang=i*Math.PI/3+daisyRotation;
    offsets.push([Math.cos(ang)*outerR*2, Math.sin(ang)*outerR*2]);
  } // a daisy pattern: one center atom + six around it, touching
  const zoomRatio=0.5/CAM_Z_ZOOMED;
  const box8EyeTargetX=pearCx+(EYE_WORLD_TARGET.x-CAM_X_ZOOMED)*zoomRatio;
  miniAtoms=[];
  miniWaves=[];
  const greenColor=0x0f4d24;
  for(const [ox,oy] of offsets){
    const cx=clusterCx+ox, cy=oy;
    const ma=makeMiniAtom(cx,cy,miniScale,greenColor,greenColor,0x0f4d24); // rings and nucleus both green here
    parent.add(ma.group);
    miniAtoms.push(ma);
    // the same thin light waves as box7, flowing from each atom to the eye
    const dx=box8EyeTargetX-cx, dy=0-cy;
    const dist=Math.hypot(dx,dy);
    const startX=cx+dx/dist*outerR, startY=cy+dy/dist*outerR;
    const w=makeThinWave(startX,startY,box8EyeTargetX,0,zoomRatio);
    w.mesh=w.build(0);
    parent.add(w.mesh);
    miniWaves.push(w);
  }

  const waveStartTime=performance.now();
  (function step(){
    if(scenePhase!=='box8atoms') return;
    for(const ma of miniAtoms){
      for(const ed of ma.electrons){
        ed.theta+=ed.speed*0.055;
        ed.mesh.position.set(Math.cos(ed.theta)*ed.r, Math.sin(ed.theta)*ed.r, 0);
      }
    }
    const phase=(performance.now()-waveStartTime)/1000*3;
    for(const w of miniWaves){
      const old=w.mesh;
      w.mesh=w.build(phase);
      old.parent.add(w.mesh);
      old.parent.remove(old);
      for(const c of old.children) c.geometry.dispose();
    }
    const now=performance.now()/1000;
    for(const r of sunRays){
      const t=((now+r.phase)*0.6)%1.6;
      r.mesh.position.x=r.baseOffsetX+r.dirX*t*0.5;
      r.mesh.position.y=r.dirY*t*0.5;
      r.mesh.traverse(obj=>{ if(obj.material) obj.material.opacity=t<1.2?0.7:0.7*(1.6-t)/0.4; });
    }
    for(const ma of miniAtoms) ma.group.scale.setScalar(miniScale);
    for(const r of sunRays){
      const midX=r.startX+r.dirX*0.35+r.mesh.position.x;
      const midY=r.startY+r.dirY*0.35+r.mesh.position.y;
      for(const ma of miniAtoms){
        const dx=ma.group.position.x-midX, dy=ma.group.position.y-midY;
        if(dx*dx+dy*dy<0.01) ma.group.scale.setScalar(miniScale*1.3);
      }
    }
    box7AnimFrame=requestAnimationFrame(step);
  })();
}

function backFromBox8(){
  scenePhase='pear';
  for(const r of sunRays) r.baseOffsetX-=sunRaysClusterShift;
  sunRaysClusterShift=0;
  if(box7AnimFrame){ cancelAnimationFrame(box7AnimFrame); box7AnimFrame=null; }
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(parent){
    for(const ma of miniAtoms){
      parent.remove(ma.group);
      ma.group.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); });
    }
    for(const w of miniWaves){
      parent.remove(w.mesh);
      for(const c of w.mesh.children) c.geometry.dispose();
    }
  }
  miniAtoms=[];
  miniWaves=[];
  for(const d of pearDots) d.mesh.visible=true;
  for(const r of sunRays) r.mesh.visible=true;
  document.getElementById('seq-box8').classList.remove('show');
  document.getElementById('seq-box8-wrap').classList.add('seq-hidden');
  document.getElementById('seq-box4-wrap').classList.remove('seq-hidden');
  document.getElementById('seq-box7-ok').style.visibility='visible';
  document.getElementById('seq-box7-back').style.visibility='visible';
  const r2s=bohrKeyRadius('2s');
  const pearCx=r2s*0.45;
  animateCamera(0.95, pearCx, 1200);
  // resume the pear's own animation loop
  (function step(){
    if(scenePhase!=='pear') return;
    const now=performance.now()/1000;
    for(const d of pearDots){
      d.mesh.position.x=d.baseX+Math.sin(now*3+d.seed)*0.012;
      d.mesh.position.y=d.baseY+Math.cos(now*3.3+d.seed)*0.012;
      d.orbitTheta+=d.orbitSpeed*0.02;
      d.electron.position.set(Math.cos(d.orbitTheta)*d.orbitR, Math.sin(d.orbitTheta)*d.orbitR, 0.002);
    }
    for(const r of sunRays){
      const t=((now+r.phase)*0.6)%1.6;
      r.mesh.position.x=r.baseOffsetX+r.dirX*t*0.5;
      r.mesh.position.y=r.dirY*t*0.5;
      r.mesh.traverse(obj=>{ if(obj.material) obj.material.opacity=t<1.2?0.7:0.7*(1.6-t)/0.4; });
    }
    // a ray "hits" whichever atom it currently happens to be passing near —
    // briefly flashing it, rather than a precise physical collision
    for(const d of pearDots) d.mesh.children[0].material.opacity=0.85;
    for(const r of sunRays){
      const midX=r.startX+r.dirX*0.35+r.mesh.position.x;
      const midY=r.startY+r.dirY*0.35+r.mesh.position.y;
      for(const d of pearDots){
        const dx=d.mesh.position.x-midX, dy=d.mesh.position.y-midY;
        if(dx*dx+dy*dy<0.015) d.mesh.children[0].material.opacity=1;
      }
    }
    box7AnimFrame=requestAnimationFrame(step);
  })();
}

// Box8's OK does two different things depending on the phase: first it
// enlarges the pear again (atoms spinning, like box7's pear reveal), then
// — once that's settled back to the wider view — a second click moves on.


function advanceToBox9(){
  document.getElementById('seq-box8-ok').style.visibility='hidden';
  document.getElementById('seq-box8-back').style.visibility='hidden';
  document.getElementById('seq-box8-wrap').classList.add('seq-hidden');
  document.getElementById('seq-box9-wrap').classList.remove('seq-hidden');
  showSequenceBox('seq-box9', 'Ogni oggetto ha atomi diversi, che emettono frequenze di energia diverse...', seqColor3);
  document.getElementById('seq-box9-back').style.visibility='visible';
  setTimeout(()=>{ document.getElementById('seq-box9-ok').style.visibility='visible'; }, 2500);

  // stop box8's animation loop and remove its seven atoms + waves — box9 doesn't show them
  scenePhase='none';
  for(const r of sunRays) r.baseOffsetX-=sunRaysClusterShift; // box8 shifted these left for its own atoms — undo that for the apple
  sunRaysClusterShift=0;
  if(box7AnimFrame){ cancelAnimationFrame(box7AnimFrame); box7AnimFrame=null; }
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(parent){
    for(const ma of miniAtoms){
      parent.remove(ma.group);
      ma.group.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); });
    }
    for(const w of miniWaves){
      parent.remove(w.mesh);
      for(const c of w.mesh.children) c.geometry.dispose();
    }
  }
  miniAtoms=[];
  miniWaves=[];

  // the apple should appear at a normal, un-zoomed size — box8 was very close in (z=0.5)
  animateCamera(CAM_Z_ZOOMED, CAM_X_ZOOMED, 1500);

  const t=setTimeout(revealApple, 2000);
  box7Timeouts.push(t);
}

function stubBox9OK(){
  document.getElementById('seq-box9-ok').style.visibility='hidden';
  document.getElementById('seq-box9-back').style.visibility='hidden';

  // the apple (or pear, whichever is currently shown) disappears
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(parent){
    if(appleGroup) appleGroup.visible=false;
    for(const d of appleDots) d.mesh.visible=false;
    if(pearGroup) pearGroup.visible=false;
    if(pearStem) pearStem.visible=false;
    for(const d of pearDots) d.mesh.visible=false;
    for(const r of sunRays) r.mesh.visible=false;
  }
  document.getElementById('eye-head').style.opacity='0';
  scenePhase='none';

  document.getElementById('final-message-body').innerHTML='I COLORI SONO L\'ENERGIA RILASCIATA DAL CONTINUO SALTO DI ORBITALE DEGLI ELETTRONI';
  document.getElementById('final-message-text').style.background=seqColor1;
  document.getElementById('final-message').classList.add('show');
}

function exitFinalMessage(){
  document.getElementById('final-message').classList.remove('show');
  if(appleGroup) appleGroup.visible=true;
  for(const d of appleDots) d.mesh.visible=true;
  for(const r of sunRays) r.mesh.visible=true;
  document.getElementById('eye-head').style.opacity='1';
  scenePhase='apple';
  document.getElementById('seq-box9-ok').style.visibility='visible';
  document.getElementById('seq-box9-back').style.visibility='visible';
}

// The apple's own real traced outline (from an uploaded reference image),
// built the same way the pear was.
let appleGroup=null;
let appleDots=[];

function revealApple(){
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(!parent) return;

  // the pear (shape + its filling atoms) steps aside for the apple
  if(pearGroup) pearGroup.visible=false;
  if(pearStem) pearStem.visible=false;
  for(const d of pearDots) d.mesh.visible=false;

  const r2s=bohrKeyRadius('2s');
  const appleCx=r2s*0.45;
  const appleCy=-0.1;

  const applePts=[[0.5778,1.5000],[0.3911,1.4300],[0.2743,1.3482],[0.1809,1.2549],[0.0992,1.0914],[0.0759,0.9864],[0.0759,0.9397],[0.0525,0.9397],[0.0409,1.0447],[-0.0058,1.2432],[-0.0525,1.3833],[-0.0875,1.3949],[-0.2276,1.3249],[-0.2276,1.2665],[-0.1576,1.1615],[-0.0642,0.9514],[-0.0292,0.8463],[-0.0175,0.7763],[-0.1693,0.8113],[-0.3327,0.8930],[-0.4494,0.9163],[-0.5895,0.9163],[-0.7529,0.8696],[-0.8813,0.7996],[-1.0214,0.6712],[-1.1031,0.5778],[-1.2082,0.3911],[-1.2549,0.2743],[-1.2899,0.1809],[-1.3132,0.0642],[-1.3132,-0.2393],[-1.2432,-0.5078],[-1.1732,-0.7179],[-1.0914,-0.8813],[-1.0214,-1.0214],[-0.9163,-1.1732],[-0.8113,-1.2899],[-0.6946,-1.3949],[-0.5778,-1.4650],[-0.4611,-1.5000],[-0.2043,-1.5000],[-0.0759,-1.4416],[0.0525,-1.4416],[0.2043,-1.5000],[0.4377,-1.5000],[0.5895,-1.4416],[0.7062,-1.3716],[0.8230,-1.2665],[0.9047,-1.1848],[0.9981,-1.0447],[1.0681,-0.9280],[1.1381,-0.7879],[1.2082,-0.6128],[1.2782,-0.3794],[1.3132,-0.2160],[1.3132,0.0175],[1.2782,0.1926],[1.2082,0.3677],[1.1265,0.5078],[1.0331,0.6245],[0.9747,0.6946],[0.8230,0.8113],[0.6946,0.8696],[0.5545,0.9047],[0.3677,0.9047],[0.2276,0.8463],[0.0759,0.7879],[0.0759,0.8696],[0.1809,0.8930],[0.2977,0.9397],[0.3911,0.9864],[0.4377,1.0214],[0.4377,1.0447],[0.4611,1.0447],[0.4611,1.0681],[0.4844,1.0681],[0.5778,1.2082],[0.6245,1.3599],[0.6362,1.4183],[0.6362,1.5000]];
  const shapePts=applePts.map(([x,y])=>new THREE.Vector2(x,y));
  const appleShape=new THREE.Shape();
  appleShape.moveTo(shapePts[0].x, shapePts[0].y);
  for(let i=1;i<shapePts.length;i++) appleShape.lineTo(shapePts[i].x, shapePts[i].y);
  appleShape.closePath();
  const appleMat=new THREE.MeshBasicMaterial({color:0xd23c3c, transparent:true, opacity:0.92});
  appleGroup=new THREE.Mesh(new THREE.ShapeGeometry(appleShape, 32), appleMat);
  appleGroup.position.set(appleCx, appleCy, 0);
  parent.add(appleGroup);

  const outline=[];
  for(let i=0;i<=200;i++) outline.push(appleShape.getPoint(i/200));
  function insideApple(x,y){
    // shrink slightly inward (toward the shape's own center) so a dot's own
    // radius never pokes past the visible edge, even when its center tests inside
    const sx=x*0.80, sy=y*0.80;
    let inside=false;
    for(let i=0,j=outline.length-1;i<outline.length;j=i++){
      const xi=outline[i].x, yi=outline[i].y, xj=outline[j].x, yj=outline[j].y;
      const intersect=((yi>sy)!==(yj>sy)) && (sx < (xj-xi)*(sy-yi)/(yj-yi)+xi);
      if(intersect) inside=!inside;
    }
    return inside;
  }

  appleDots=[];
  const ringMat=new THREE.MeshBasicMaterial({color:0x8b1a1a, transparent:true, opacity:0.85});
  const spacing=0.13;
  for(let gx=-1.35; gx<=1.35; gx+=spacing){
    for(let gy=-1.55; gy<=1.55; gy+=spacing){
      const jx=gx+(Math.random()-0.5)*spacing*0.4;
      const jy=gy+(Math.random()-0.5)*spacing*0.4;
      if(!insideApple(jx,jy)) continue;
      const px=appleCx+jx, py=appleCy+jy;
      const dotGroup=new THREE.Group();
      const ringR=0.045;
      const ringPts=[];
      for(let i=0;i<=24;i++){
        const a=i/24*Math.PI*2;
        ringPts.push(new THREE.Vector3(Math.cos(a)*ringR, Math.sin(a)*ringR, 0));
      }
      const ring=new THREE.Line(new THREE.BufferGeometry().setFromPoints(ringPts), ringMat);
      const nucleus=new THREE.Mesh(new THREE.CircleGeometry(0.016,8), new THREE.MeshBasicMaterial({color:0x000000}));
      nucleus.position.z=0.001;
      const electron=new THREE.Mesh(new THREE.CircleGeometry(0.010,8), new THREE.MeshBasicMaterial({color:0x8b1a1a}));
      electron.position.set(ringR,0,0.002);
      dotGroup.add(ring, nucleus, electron);
      dotGroup.position.set(px,py,0.01);
      parent.add(dotGroup);
      appleDots.push({mesh:dotGroup, baseX:px, baseY:py, seed:Math.random()*1000, electron, orbitTheta:Math.random()*Math.PI*2, orbitR:ringR, orbitSpeed:1.5+Math.random()});
    }
  }

  scenePhase='apple';
  (function step(){
    if(scenePhase!=='apple') return;
    const now=performance.now()/1000;
    for(const d of appleDots){
      d.mesh.position.x=d.baseX+Math.sin(now*3+d.seed)*0.012;
      d.mesh.position.y=d.baseY+Math.cos(now*3.3+d.seed)*0.012;
      d.orbitTheta+=d.orbitSpeed*0.02;
      d.electron.position.set(Math.cos(d.orbitTheta)*d.orbitR, Math.sin(d.orbitTheta)*d.orbitR, 0.002);
    }
    for(const r of sunRays){
      const t=((now+r.phase)*0.6)%1.6;
      r.mesh.position.x=r.baseOffsetX+r.dirX*t*0.5;
      r.mesh.position.y=r.dirY*t*0.5;
      r.mesh.traverse(obj=>{ if(obj.material) obj.material.opacity=t<1.2?0.7:0.7*(1.6-t)/0.4; });
    }
    for(const d of appleDots) d.mesh.children[0].material.opacity=0.85;
    for(const r of sunRays){
      const midX=r.startX+r.dirX*0.35+r.mesh.position.x;
      const midY=r.startY+r.dirY*0.35+r.mesh.position.y;
      for(const d of appleDots){
        const dx=d.mesh.position.x-midX, dy=d.mesh.position.y-midY;
        if(dx*dx+dy*dy<0.015) d.mesh.children[0].material.opacity=1;
      }
    }
    box7AnimFrame=requestAnimationFrame(step);
  })();
}

function clearAppleScene(){
  scenePhase='pear';
  const layer=viewerA.currentLayer;
  const parent=layer && layer.group.parent;
  if(parent){
    if(appleGroup){ parent.remove(appleGroup); appleGroup.geometry.dispose(); appleGroup=null; }
    for(const d of appleDots){
      parent.remove(d.mesh);
      for(const c of d.mesh.children) c.geometry.dispose();
    }
    appleDots=[];
  }
  if(pearGroup) pearGroup.visible=true;
  if(pearStem) pearStem.visible=true;
  for(const d of pearDots) d.mesh.visible=true;
}

function backFromBox9(){
  clearAppleScene();
  document.getElementById('seq-box9').classList.remove('show');
  document.getElementById('seq-box9-wrap').classList.add('seq-hidden');
  advanceToBox8(true); // rebuilds the seven atoms and shows OK immediately
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Beryllium only ever needs these two orbitals — shown explicitly and
// immediately (no staggering) once the nucleus has finished forming, rather
// than relying on the generic desiredParts()/staggered-reveal flow.
function ensureBothOrbitalsShown(){
  const layer=viewerA.currentLayer;
  if(!layer || !layer.nucleusReady){
    setTimeout(ensureBothOrbitalsShown, 150);
    return;
  }
  viewerA.applyPartsSet(new Set(['1s','2s']), false);
}

function runIntroSequence(){
  const bgHex=(getComputedStyle(document.documentElement).getPropertyValue('--flat-bg')||BG_PALETTE[0]).trim();
  const [bgHue]=hexToHsl(bgHex);
  const color1raw=nearestPaletteColor((bgHue+180)%360);
  const color2raw=nearestPaletteColor((bgHue+90)%360, [color1raw]);
  const color3raw=nearestPaletteColor((bgHue+270)%360, [color1raw, color2raw]);
  seqColor1=muteColor(color1raw);
  seqColor2=muteColor(color2raw);
  seqColor3=muteColor(color3raw);

  viewerA.selectElement(4); // Beryllium
  ensureBothOrbitalsShown();

  setTimeout(()=>{
    // This file picks up exactly where colori.html's box2 leaves off — settle
    // the atom into that same resting state, then go straight to box3.
    settleJumpAtGround();
    document.getElementById('seq-box3-ok').style.visibility='hidden';
    animateCamera(CAM_Z_ZOOMED, CAM_X_ZOOMED, 1800, ()=>{
      showSequenceBox('seq-box3', 'L\'energia che il nostro occhio riesce a vedere è <b>LUCE</b>.<br>I pezzetti (quanti) di luce si chiamano <b style="color:#c0392b">FOTONI</b>', seqColor3);
      document.getElementById('eye-head').style.opacity='1';
      stopEnergyPacketStream();
      startPulsingRay(EYE_WORLD_TARGET.x);
      document.getElementById('fotoni-label').style.opacity='1';
      setTimeout(()=>{ document.getElementById('seq-box3-ok').style.visibility='visible'; }, 3000);
    });
  }, 800);
}
