<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Stato fondamentale e stato eccitato — Chemverse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#fff;font-family:'Manrope',sans-serif;font-weight:400;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;justify-content:space-between;padding:26px 24px;background:#0a0a0a;border-bottom:1px solid #222;flex-shrink:0}
#back-btn{background:#1a1a2e;border:1px solid #444;color:#0ff;padding:5px 12px;font-size:14px;cursor:pointer;border-radius:3px;font-family:'Manrope',sans-serif;letter-spacing:0.04em}
#back-btn:hover{background:#222}
#pt-title{color:#ddd;font-size:24px;letter-spacing:0.02em;font-weight:700;font-family:'Unbounded',sans-serif}
#synth-label{font-size:10px;color:#555;letter-spacing:0.1em}
#periodic-section{flex-shrink:0;padding:20px 6px 22px;background:#050505}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:1px;max-width:100%}
.el{font-size:9px;padding:3px 2px;border:1px solid #333;cursor:pointer;text-align:center;line-height:1.25;border-radius:1px;transition:filter 0.15s;user-select:none;min-width:0;display:flex;align-items:baseline;justify-content:center;gap:2px}
.el:hover{filter:brightness(1.5);border-color:#0ff}
.el.active{border:1px solid #0ff;box-shadow:0 0 4px #0ff}
.el.cat-highlight{border:2px solid #fff;box-shadow:0 0 7px rgba(255,255,255,0.85);position:relative;z-index:2}
.el.bond-compatible{outline:3px solid #facc15;outline-offset:-3px;box-shadow:0 0 6px 1px rgba(250,204,21,0.85);position:relative;z-index:1}
.el .sym{font-size:10.5px;font-weight:bold;font-family:'Manrope',sans-serif}
.el .num{font-size:7px;color:rgba(255,255,255,0.6);font-family:'Manrope',sans-serif}
.spacer{background:transparent;border:none;cursor:default}
.cat-alkali{background:#4a1010;color:#ff8888}
.cat-alkaline{background:#3a2a05;color:#ffcc66}
.cat-transition{background:#1a2a1a;color:#88cc88}
.cat-post{background:#1a1a3a;color:#8888ff}
.cat-metalloid{background:#2a1a2a;color:#cc88cc}
.cat-nonmetal{background:#0a2a1a;color:#44ffaa}
.cat-halogen{background:#1a2a2a;color:#44dddd}
.cat-noble{background:#2a1a3a;color:#aa88ff}
.cat-lanthanide{background:#2a0a2a;color:#dd88ff}
.cat-actinide{background:#2a1a0a;color:#ffaa44}
.cat-unknown{background:#1a1a1a;color:#888}
#legend{display:flex;gap:12px;padding:4px 6px;background:#050505;border-top:1px solid #111;font-size:11px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:4px;cursor:pointer;padding:1px 4px;border-radius:3px;transition:background 0.15s}
.leg-item:hover{background:#141414}
.leg-item.leg-active{background:#1a1a1a}
.leg-item.leg-active .leg-dot{box-shadow:0 0 5px 1px #fff}
.leg-item.leg-active span{font-weight:700}
.leg-dot{width:9px;height:9px;border-radius:50%;border:1px solid rgba(255,255,255,0.3)}
#main{display:flex;flex:1;min-height:0;overflow:hidden;position:relative}
#sidebar{width:185px;flex-shrink:0;background:#080808;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;overflow-y:auto;padding:8px}
#ab-tabs{display:none;gap:4px;margin-bottom:8px}
.ab-tab{flex:1;padding:5px 2px;font-size:10px;border:1px solid #333;background:#111;color:#888;cursor:pointer;border-radius:2px;font-family:'Manrope',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.ab-tab.active{background:#0a3a3a;color:#0ff;border-color:#0ff}
#atom-info{background:#111;border:1px solid #222;border-radius:3px;padding:8px;margin-bottom:8px}
#atom-info-header{display:flex;align-items:center;gap:4px;font-size:9px;color:#555;margin-bottom:6px;letter-spacing:0.1em;font-family:'Manrope',sans-serif}
#atom-symbol-big{font-size:44px;font-weight:700;color:#fff;line-height:1;font-family:'Manrope',sans-serif;letter-spacing:0.01em}
#atom-name{font-size:19px;color:#aaa}
#atom-config{font-size:15px;color:#777;margin-top:6px;line-height:1.6;display:flex;flex-wrap:wrap;gap:3px 9px;font-family:'Manrope',sans-serif;font-weight:600}
.cfg-term{white-space:nowrap}
#orbitals-label{font-size:13px;color:#555;letter-spacing:0.1em;margin-bottom:6px;font-family:'Manrope',sans-serif}
#orbital-filter{display:flex;gap:4px;margin-bottom:8px}
.filter-btn{flex:1;padding:6px 2px;font-size:14px;border:1px solid #333;background:#111;color:#888;cursor:pointer;border-radius:2px;font-family:'Manrope',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.filter-btn.active{background:#0a3a3a;color:#0ff;border-color:#0ff}
#orbital-list{display:flex;flex-direction:column;gap:2px}
.orb-row{display:flex;align-items:center;gap:6px;padding:4px 4px;border-radius:2px}
.orb-row:hover{background:#111}
.orb-check{width:14px;height:14px;accent-color:#0ff;cursor:pointer;flex-shrink:0}
.orb-color{width:11px;height:11px;border-radius:50%;flex-shrink:0}
.orb-name{font-size:18px;color:#f2f2f2;font-weight:600;flex:1}
.orb-electrons{font-size:17px;color:#b8b8b8;font-weight:600;margin-left:auto}
.orb-sub{padding-left:18px}
.orb-sub .orb-name{font-size:13px;color:#d5d5d5;font-weight:500}
#canvas-area{flex:1;min-width:0;min-height:0;position:relative;background:#000;overflow:hidden}
#viewers-wrapper{display:flex;width:100%;height:100%;min-width:0;min-height:0}
.viewer-pane{position:relative;flex:1;min-width:0;min-height:0;height:100%;overflow:hidden}
#pane-a{border-right:none}
#pane-b{border-left:none}
.viewer-pane canvas{display:block}
#split-divider{flex:0 0 6px;width:6px;height:100%;background:#0a0a0a;border-left:1px solid #1a1a2e;border-right:1px solid #1a1a2e;cursor:col-resize;display:none;position:relative;z-index:6}
#split-divider::after{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:2px;height:34px;background:#0ff;border-radius:2px;opacity:0.5;transition:opacity 0.15s}
#split-divider:hover::after,#split-divider.dragging::after{opacity:1}
#split-divider.dragging{background:#111}
.pane-label{position:absolute;top:10px;left:10px;font-family:'Manrope',sans-serif;font-size:11px;letter-spacing:0.1em;color:#0ff;background:rgba(0,0,0,0.6);border:1px solid #0ff;border-radius:3px;padding:3px 10px;cursor:pointer;z-index:5;transition:all 0.15s}
.pane-label:hover{background:rgba(0,255,255,0.15)}
.pane-label.pane-label-active{background:#0ff;color:#000;font-weight:700}
#rotate-toggle-btn.rotation-stopped{color:#ffaa44;border-color:#ffaa44}
#rotate-toggle-btn.rotation-stopped:hover{background:rgba(255,170,68,0.15)}
canvas{display:block}
#view-toggle{position:absolute;top:10px;right:10px;display:flex;gap:0;z-index:10}
.view-btn{padding:5px 14px;font-size:11px;border:1px solid #0ff;background:transparent;color:#0ff;cursor:pointer;font-family:'Manrope',sans-serif;letter-spacing:0.03em;transition:all 0.15s}
.view-btn[data-view-mode="bohr"]{border-radius:20px 0 0 20px}
.view-btn[data-view-mode="cloud"]{border-radius:0 20px 20px 0}
.view-btn.active{background:#0ff;color:#000}
#legame-btn{border-color:#ffd700;color:#ffd700}
#legame-btn.active{background:#ffd700;color:#3a2a00}
#cloud-controls{position:absolute;top:40px;right:10px;background:#111;border:1px solid #333;border-radius:4px;padding:10px;width:160px;display:none;z-index:10}
#bg-swatches{position:fixed;bottom:10px;right:10px;background:#111;border:1px solid #333;border-radius:6px;padding:9px;width:160px;display:none;z-index:10;flex-wrap:wrap;gap:7px}
#bg-swatches.show{display:flex}
#bg-swatches-label{width:100%;font-size:9px;color:#888;letter-spacing:0.08em;margin-bottom:2px;font-family:'Manrope',sans-serif}
.bg-swatch{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.25);transition:transform 0.1s,border-color 0.1s;flex-shrink:0}
.bg-swatch:hover{transform:scale(1.15)}
.bg-swatch.bg-swatch-selected{border-color:#0ff;box-shadow:0 0 5px #0ff}
#cloud-controls.show{display:block}
.ctrl-label{font-size:10px;color:#888;margin-bottom:4px;display:flex;justify-content:space-between}
.ctrl-slider{width:100%;accent-color:#0ff;margin-bottom:10px}
#loading-msg{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);border:1px solid #333;border-radius:20px;padding:8px 20px;font-size:11px;color:#888;pointer-events:none;opacity:0;transition:opacity 0.3s}
#loading-msg.show{opacity:1}
/* ── FLAT STYLE THEME ─────────────────────────────────────────────────────
   Same layout/logic, just re-skinned: a single solid background (chosen from
   a small swatch palette) instead of black, and bold, borderless, saturated
   periodic-table cells instead of the muted realistic palette. */
:root{
  --flat-bg:#0e6b78;
  --flat-panel:#0a505a;
  --flat-border:#12808f;
  --flat-text:#ffffff;
  --flat-text-dim:#dffcff;
}
body.theme-flat{background:var(--flat-bg);color:var(--flat-text)}
body.theme-flat #topbar{background:var(--flat-panel);border-bottom:1px solid var(--flat-border)}
body.theme-flat #periodic-section{background:var(--flat-bg)}
body.theme-flat #legend{background:var(--flat-bg);border-top:1px solid var(--flat-border)}
body.theme-flat #sidebar{background:var(--flat-panel);border-right:1px solid var(--flat-border)}
body.theme-flat #canvas-area{background:var(--flat-bg)}
body.theme-flat #atom-info{background:var(--flat-panel);border:1px solid var(--flat-border)}
body.theme-flat #pt-title,body.theme-flat #synth-label{color:var(--flat-text-dim)}
body.theme-flat #atom-name,body.theme-flat #atom-config,body.theme-flat .orb-name,body.theme-flat .orb-electrons,body.theme-flat #orbitals-label,body.theme-flat .cfg-term,body.theme-flat #atom-symbol-big{color:var(--flat-text)}
body.theme-flat .orb-electrons{color:var(--flat-text-dim)}

body.theme-flat .el{border:none;border-radius:6px}
body.theme-flat .el:hover{filter:brightness(1.15);border-color:transparent;box-shadow:0 0 0 2px var(--flat-text)}
body.theme-flat .el.active{border:none;box-shadow:0 0 0 2px var(--flat-text),0 0 10px var(--flat-text)}
body.theme-flat .el.cat-highlight{border:none;box-shadow:0 0 0 2px var(--flat-text),0 0 10px var(--flat-text)}
body.theme-flat .el .num{color:rgba(255,255,255,0.85)}

body.theme-flat .cat-alkali{background:#ff5b5b;color:#fff}
body.theme-flat .cat-alkaline{background:#ffb020;color:#fff}
body.theme-flat .cat-transition{background:#34d399;color:#0a3a2a}
body.theme-flat .cat-post{background:#6c8cff;color:#fff}
body.theme-flat .cat-metalloid{background:#d16bd1;color:#fff}
body.theme-flat .cat-nonmetal{background:#22e0a0;color:#0a3a2a}
body.theme-flat .cat-halogen{background:#22d3ee;color:#08414a}
body.theme-flat .cat-noble{background:#a78bfa;color:#fff}
body.theme-flat .cat-lanthanide{background:#f472b6;color:#fff}
body.theme-flat .cat-actinide{background:#fb923c;color:#fff}
body.theme-flat .cat-unknown{background:#c3ccd4;color:#333}

body.theme-flat .leg-item:hover{background:rgba(128,128,128,0.15)}
body.theme-flat .leg-item.leg-active{background:rgba(128,128,128,0.25)}
body.theme-flat #view-toggle .view-btn{border-color:var(--flat-text);color:var(--flat-text)}
body.theme-flat #view-toggle .view-btn.active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #compare-btn.active,body.theme-flat #style-btn.active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #cloud-controls{background:var(--flat-panel);border-color:var(--flat-border)}
body.theme-flat #split-divider{background:var(--flat-panel);border-left-color:var(--flat-border);border-right-color:var(--flat-border)}
body.theme-flat .pane-label{border-color:var(--flat-text);color:var(--flat-text)}
body.theme-flat .pane-label.pane-label-active{background:var(--flat-text);color:var(--flat-panel)}
body.theme-flat #rotate-toggle-btn.rotation-stopped{color:#ffaa44;border-color:#ffaa44}
body.theme-flat #bg-swatches{background:var(--flat-panel);border-color:var(--flat-border)}
body.theme-flat #ctrl-label,body.theme-flat .ctrl-label{color:var(--flat-text-dim)}
</style>
</head>
<body>

<div id="topbar">
  <button id="back-btn" onclick="handleBackButton()">← Torna</button>
  <span id="pt-title">STATO FONDAMENTALE E STATO ECCITATO</span>
  <span id="synth-label">• atomo</span>
</div>

<div id="periodic-section" class="seq-hidden">
  <div id="choose-element-title">Scegli un elemento</div>
  <div class="pt-grid" id="pt-grid" style="grid-template-columns:repeat(10,1fr);max-width:calc(10 * 62px);gap:6px;margin:0 auto"></div>
  <div id="energy-panel">
    <div id="energy-control">
      <div id="energy-label">ENERGIA<br>DEL FOTONE</div>
      <input type="range" id="energy-slider" min="1" max="10" value="5" step="1">
      <button id="fire-btn" onclick="fireEnergyAtAtom()">⚡ Spara</button>
    </div>
  </div>
</div>
<style>
  #choose-element-title{text-align:center;font-family:'Unbounded',sans-serif;font-weight:700;font-size:19px;color:var(--flat-text,#ddd);margin-bottom:16px}
  #energy-panel{max-width:560px;margin:20px auto 0;display:flex;flex-direction:column;align-items:center;gap:8px}
  #energy-label{font-family:'Manrope',sans-serif;font-weight:800;font-size:11px;letter-spacing:0.1em;line-height:1.4;color:var(--flat-text,#ddd);white-space:nowrap}
  #energy-control{display:flex;align-items:center;gap:16px;width:100%}
  #energy-slider{flex:1;-webkit-appearance:none;appearance:none;height:10px;border-radius:6px;background:linear-gradient(90deg,#ff3b3b,#ff9d3b,#ffe33b,#3bff6e,#3bcaff,#8f3bff);outline:none;cursor:pointer}
  #energy-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--flat-thumb,#fff);border:3px solid var(--flat-thumb-border,#222);cursor:pointer}
  #energy-slider::-moz-range-thumb{width:22px;height:22px;border-radius:50%;background:var(--flat-thumb,#fff);border:3px solid var(--flat-thumb-border,#222);cursor:pointer}
  #fire-btn{font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;color:#0a0a0a;background:#ffd700;border:none;border-radius:10px;padding:11px 18px;cursor:pointer;white-space:nowrap}
  #fire-btn:hover{background:#ffe340}
  #fire-btn:disabled{opacity:0.5;cursor:default}
</style>
<style>
  #pt-grid .el{height:52px;border-radius:6px}
  #pt-grid .el .sym{font-size:16px}
  #pt-grid .el .num{font-size:9px}
  .seq-hidden{display:none !important}
  #seq-column{width:340px;flex-shrink:0;padding:24px 20px 24px;overflow-y:auto;overflow-x:hidden;max-height:100vh}
  #seq-boxes{display:flex;flex-direction:column;gap:10px}
  #seq-box5-wrap{display:flex;flex-direction:column;gap:10px}
  .seq-box{position:relative;max-width:300px;padding:13px 38px 13px 16px;border-radius:12px;font-family:'Manrope',sans-serif;font-weight:700;font-size:17px;line-height:1.32;color:#0a0a0a;opacity:0;transition:opacity 1.3s ease,transform 1.3s ease}
  #seq-box1{transform:translateY(-160px)}
  #seq-box1.show{opacity:1;transform:translateY(0)}
  #seq-box2{transform:translateY(160px)}
  #seq-box2.show{opacity:1;transform:translateY(0)}
  #seq-box3{transform:translateY(160px)}
  #seq-box3.show{opacity:1;transform:translateY(0)}
  #seq-box4{transform:translateY(160px)}
  #seq-box4.show{opacity:1;transform:translateY(0)}
  #seq-box5{transform:translateY(-160px)}
  #seq-box5.show{opacity:1;transform:translateY(0)}
  #seq-box6{transform:translateY(160px)}
  #seq-box6.show{opacity:1;transform:translateY(0)}
  #seq-box7{transform:translateY(160px)}
  #seq-box7.show{opacity:1;transform:translateY(0)}
  #seq-box8{transform:translateY(160px)}
  #seq-box8.show{opacity:1;transform:translateY(0)}
  #seq-box9{transform:translateY(160px)}
  #seq-box9.show{opacity:1;transform:translateY(0)}
  .seq-ok-btn{position:absolute;bottom:10px;right:10px;background:#fff;color:#0a0a0a;border:none;border-radius:7px;padding:5px 14px;font-family:'Manrope',sans-serif;font-weight:700;font-size:12px;cursor:pointer}
  .seq-ok-btn:hover{background:#f0f0f0}
  .seq-back-btn{position:absolute;bottom:10px;right:60px;background:rgba(255,255,255,0.35);color:#0a0a0a;border:none;border-radius:7px;width:28px;height:24px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .seq-back-btn:hover{background:rgba(255,255,255,0.55)}
  #seq-end-screen{position:fixed;top:80px;bottom:0;left:0;width:340px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:26px;padding:0 20px;z-index:15}
  .seq-end-card{display:flex;flex-direction:column;align-items:center;gap:10px;cursor:pointer;background:none;border:none;padding:0;font:inherit}
  .seq-end-iconbox{width:108px;height:108px;border-radius:22px;display:flex;align-items:center;justify-content:center;transition:transform 0.15s ease,box-shadow 0.15s ease}
  .seq-end-card:hover .seq-end-iconbox{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.45)}
  .seq-end-iconbox svg{width:62px;height:62px;display:block}
  .seq-end-label{color:var(--flat-text,#fff);font-family:'Manrope',sans-serif;font-weight:700;font-size:13px;text-align:center;letter-spacing:0.01em;max-width:180px}
</style>
<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="seqIconShadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="2" dy="3" stdDeviation="0.7" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
</svg>

<div id="main">
  <div id="seq-column">
    <div id="seq-boxes">
      <div class="seq-box" id="seq-box1">
        <div class="seq-box-text" id="seq-box1-text"></div>
        <button class="seq-ok-btn" id="seq-box1-ok" onclick="advanceToBox2()">OK</button>
      </div>
      <div class="seq-box" id="seq-box2">
        <div class="seq-box-text" id="seq-box2-text"></div>
        <button class="seq-ok-btn" id="seq-box2-ok" onclick="advanceToBox3()">OK</button>
      </div>
      <div class="seq-box" id="seq-box3">
        <div class="seq-box-text" id="seq-box3-text"></div>
        <button class="seq-ok-btn" id="seq-box3-ok" onclick="advanceToBox4()">OK</button>
      </div>
      <div class="seq-box" id="seq-box4">
        <div class="seq-box-text" id="seq-box4-text"></div>
        <button class="seq-back-btn" id="seq-box4-back" onclick="backFromBox4()" title="Indietro">↩</button>
        <button class="seq-ok-btn" id="seq-box4-ok" onclick="advanceToBox5()">OK</button>
      </div>
    </div>
    <div id="seq-box5-wrap" class="seq-hidden">
      <div class="seq-box" id="seq-box5">
        <div class="seq-box-text" id="seq-box5-text"></div>
        <button class="seq-back-btn" id="seq-box5-back" onclick="backFromBox5()" title="Indietro">↩</button>
        <button class="seq-ok-btn" id="seq-box5-ok" onclick="skipToExcitedState()">OK</button>
      </div>
      <div class="seq-box" id="seq-box6">
        <div class="seq-box-text" id="seq-box6-text"></div>
        <button class="seq-back-btn" id="seq-box6-back" onclick="backFromBox6()" title="Indietro">↩</button>
        <button class="seq-ok-btn" id="seq-box6-ok" onclick="advanceToBox7()">OK</button>
      </div>
      <div class="seq-box" id="seq-box7">
        <div class="seq-box-text" id="seq-box7-text"></div>
      </div>
      <div class="seq-box" id="seq-box8">
        <div class="seq-box-text" id="seq-box8-text"></div>
        <button class="seq-back-btn" id="seq-box8-back" onclick="backFromBox8()" title="Indietro">↩</button>
        <button class="seq-ok-btn" id="seq-box8-ok" onclick="skipToReleaseEnergy()">OK</button>
      </div>
      <div class="seq-box" id="seq-box9">
        <div class="seq-box-text" id="seq-box9-text"></div>
        <button class="seq-back-btn" id="seq-box9-back" onclick="backFromBox9()" title="Indietro">↩</button>
        <button class="seq-ok-btn" id="seq-box9-ok" onclick="showEndScreen()">OK</button>
      </div>
      <div id="seq-end-screen" class="seq-hidden">
        <button class="seq-end-card" id="seq-end-btn1" onclick="restartFromBeginning()">
          <div class="seq-end-iconbox">

function getConfig(Z){
  const order=['1s','2s','2p','3s','3p','4s','3d','4p','5s','4d','5p','6s','4f','5d','6p','7s','5f','6d','7p'];
  const max={s:2,p:6,d:10,f:14};
  let rem=Z, cfg={};
  for(let orb of order){
    if(rem<=0) break;
    const type=orb[1];
    const fill=Math.min(rem,max[type]);
    cfg[orb]=fill;
    rem-=fill;
  }
  return cfg;
}

function configStr(cfg){
  const sup=['⁰','¹','²','³','⁴','⁵','⁶','⁷','⁸','⁹','¹⁰','¹¹','¹²','¹³','¹⁴'];
  return Object.entries(cfg).map(([o,n])=>o+sup[n]).join(' ');
}

function computeShellCounts(cfg){
  const shells={};
  for(let orb of Object.keys(cfg)){
    if(cfg[orb]<=0) continue;
    const n=parseInt(orb[0]);
    shells[n]=(shells[n]||0)+cfg[orb];
  }
  return shells;
}

function keyShellNumber(key){
  return key.startsWith('bohr:') ? parseInt(key.slice(5)) : parseInt(key[0]);
}


// ── SIMPLIFIED OCTET-RULE BONDING (for the "Legame" feature) ────────────────

function bondingProfile(cfg){
  const shells=computeShellCounts(cfg);
  const ns=Object.keys(shells).map(Number);
  const maxN=Math.max(...ns);
  const v=shells[maxN];
  const capacity=maxN===1?2:8;
  if(v>=capacity) return {type:'inert', shellN:maxN};
  if(maxN===1) return {type:'gain', amount:capacity-v, shellN:maxN}; // H: can only gain, no lower shell to expose
  const toGain=capacity-v, toLose=v;
  if(toLose<=toGain) return {type:'lose', amount:toLose, shellN:maxN};
  return {type:'gain', amount:toGain, shellN:maxN};
}

function canFormBond(cfgA, cfgB){
  const a=bondingProfile(cfgA), b=bondingProfile(cfgB);
  if(a.type==='inert'||b.type==='inert') return null;
  if(a.type==='gain'&&b.type==='gain'&&a.amount===b.amount&&a.amount>0){
    return {kind:'covalent', shellA:a.shellN, shellB:b.shellN};
  }
  if(a.type==='lose'&&b.type==='gain'&&a.amount===b.amount&&a.amount>0){
    return {kind:'ionic', shellA:a.shellN, shellB:b.shellN};
  }
  if(b.type==='lose'&&a.type==='gain'&&b.amount===a.amount&&b.amount>0){
    return {kind:'ionic', shellA:a.shellN, shellB:b.shellN};
  }
  return null;
}

function updateCompatibleHighlight(refCfg){
  document.querySelectorAll('.el.bond-compatible').forEach(e=>e.classList.remove('bond-compatible'));

}

    if(el.cat==='lanthanide'&&el.n!==57){lana.push(el);continue;}
    if(el.cat==='actinide'&&el.n!==89){acta.push(el);continue;}
    if(el.group&&el.period){
      cells[el.period-1][el.group-1]=el;
    }
  }
  for(let r=0;r<7;r++){
    for(let c=0;c<18;c++){
      const el=cells[r][c];
      const div=document.createElement('div');
      if(el){
        div.className='el '+catClass[el.cat];
        div.innerHTML=`<span class="sym">${el.sym}</span><span class="num">${el.n}</span>`;
        div.title=el.name;
        div.dataset.n=el.n;
        div.onclick=()=>onSelect(el.n);
      } else {
        if(r===5&&c===2){
          div.className='el cat-lanthanide';
          div.style.opacity='0.4';
          div.innerHTML='<span class="sym" style="font-size:6px">La-Lu</span><span class="num">57-71</span>';
        } else if(r===6&&c===2){
          div.className='el cat-actinide';
          div.style.opacity='0.4';
          div.innerHTML='<span class="sym" style="font-size:6px">Ac-Lr</span><span class="num">89-103</span>';
        } else {
          div.className='spacer el';
          div.style.visibility='hidden';
        }
      }
      gridEl.appendChild(div);
    }
  }
  const lans=ELEMENTS.filter(e=>e.cat==='lanthanide');
  const acts=ELEMENTS.filter(e=>e.cat==='actinide');
  for(let el of [...lans, ...acts]){
    const div=document.createElement('div');
    div.className='el '+catClass[el.cat];
    div.innerHTML=`<span class="sym">${el.sym}</span><span class="num">${el.n}</span>`;
    div.title=el.name; div.dataset.n=el.n;
    div.onclick=()=>onSelect(el.n);
    gridLanaEl.appendChild(div);
  }
}

function buildElementRow(gridEl, elementsList, onSelect){
  for(let el of elementsList){
    const div=document.createElement('div');
    div.className='el '+catClass[el.cat];
    div.innerHTML=`<span class="sym">${el.sym}</span><span class="num">${el.n}</span>`;
    div.title=el.name;
    div.dataset.n=el.n;

}
