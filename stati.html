// Approximate neutron count for a schematic nucleus (illustrative, not an isotope table):
// the neutron/proton ratio grows roughly from 1.0 (light elements) to ~1.6 (heavy elements).

// ── ORBITAL CHECKBOX LIST (reflects/controls the current ACTIVE viewer) ─────
function updateOrbitalList(cfg, renderedKeys){
  const list=document.getElementById('orbital-list');
  list.innerHTML='';

  const orbKeys=Object.keys(cfg).filter(o=>cfg[o]>0);
  const maxE={s:2,p:6,d:10,f:14};

  for(let orb of orbKeys){
    const count=cfg[orb];
    const color=ORB_COLORS[orb]||0xffffff;
    const hexColor='#'+color.toString(16).padStart(6,'0');
    const t=orb[1];
    const mainChecked=renderedKeys ? renderedKeys.has(orb) : true;

    const row=document.createElement('div');
    row.className='orb-row';
    row.innerHTML=`
      <input type="checkbox" class="orb-check" ${mainChecked?'checked':''} data-orb="${orb}">
      <div class="orb-color" style="background:${hexColor}"></div>
      <span class="orb-name">${orb}</span>
      <span class="orb-electrons">${count}/${maxE[t]} e⁻</span>
    `;
    list.appendChild(row);
    const mainCb=row.querySelector('.orb-check');
    mainCb.addEventListener('change', function(){
      // toggling the main level cascades the same value to all its sub-levels
      document.querySelectorAll(`.orb-sub-check[data-orb="${orb}"]`).forEach(sc=>{ sc.checked=this.checked; });
      activeViewer.rebuildCurrentLayer(false);
    });

    let subs=null, subColors=null, subLabel=k=>k;
    if(t==='p'){ subs=P_SUBS; subColors=SUB_COLORS; }
    else if(t==='d'){ subs=D_SUB_DEFS.map(d=>d.key); subColors=D_SUB_COLORS; subLabel=k=>D_SUB_LABELS[k]; }

    if(subs && count>0){
      const nShow=Math.min(subs.length, count); // Hund's rule: orbitals fill singly before pairing
      for(let i=0;i<nShow;i++){
        const key=subs[i];
        const subChecked=renderedKeys ? renderedKeys.has(orb+'|'+key) : true;
        const sub=document.createElement('div');
        sub.className='orb-row orb-sub';
        const sc=subColors[key];
        const shex='#'+sc.toString(16).padStart(6,'0');
        sub.innerHTML=`
          <input type="checkbox" class="orb-check orb-sub-check" ${subChecked?'checked':''} data-orb="${orb}" data-sub="${key}">
          <div class="orb-color" style="background:${shex};width:7px;height:7px"></div>
          <span class="orb-name">${orb}_${subLabel(key)}</span>
        `;
        list.appendChild(sub);
        sub.querySelector('.orb-check').addEventListener('change', ()=>activeViewer.rebuildCurrentLayer(false));
      }
    }
  }
}

// Read checkbox state from the DOM → { orb: {checked, subs:Set|null} }
function getVisibility(){
  const map={};
  document.querySelectorAll('#orbital-list .orb-check').forEach(cb=>{
    const orb=cb.dataset.orb;
    const sub=cb.dataset.sub;
    if(!map[orb]) map[orb]={checked:false, subs:null};
    if(sub){
      if(!map[orb].subs) map[orb].subs=new Set();
      if(cb.checked) map[orb].subs.add(sub);
    } else {
      map[orb].checked=cb.checked;
    }
  });
  return map;
}

// Desired set of part-keys ("3s", "3p|x", "4d|xy", ...). For p/d orbitals each
// sub-level checkbox is authoritative on its own: a child is shown whenever ITS
// checkbox is checked, independently of the parent's state. The parent checkbox
// is only a convenience that cascades its value down to its children on click.
function desiredParts(vis){
  const parts=new Set();
  for(let orb of Object.keys(vis)){
    const v=vis[orb];
    if(v.subs){
      for(let s of v.subs) parts.add(orb+'|'+s);
    } else if(v.checked){
      parts.add(orb);
    }
  }
  return parts;
}

function renderedKeysOf(viewer){
  return new Set(viewer.currentLayer ? Object.keys(viewer.currentLayer.rendered) : []);
}

// Reflects a viewer's current element/config into the shared sidebar header
// and highlights it on the periodic table.
function refreshSidebarInfo(viewer){
  const el=viewer.currentElement;
  if(!el) return;
  document.getElementById('atom-symbol-big').textContent=el.sym;
  document.getElementById('atom-name').innerHTML=`${el.name} <span style="font-size:10px;color:#555">Z=${el.n}</span>`;
  document.getElementById('atom-config').innerHTML=configStr(viewer.currentCfg).split(' ').map(term=>`<span class="cfg-term">${term}</span>`).join('');
  document.querySelectorAll('.el.active').forEach(e=>e.classList.remove('active'));
  const elDiv=document.querySelector(`.el[data-n="${el.n}"]`);
  if(elDiv) elDiv.classList.add('active');
}

// Re-renders every viewer's currently-visible parts in the new style. Uses
// each viewer's own `rendered` keys as the source of truth (not the DOM), so
// this works correctly for the inactive viewer too, whose checkboxes aren't
// on screen. Bohr, Lines and Cloud all share the exact same orbital/sub-level
// key format (only the geometry addPart builds for a key differs), so no
// key translation is needed when switching between them.
function setView(mode){
  viewMode=mode;
  if(mode==='bohr'){
    autoRotate=false;
    const rotBtn=document.getElementById('rotate-toggle-btn');
    rotBtn.textContent='Gira';
    rotBtn.classList.add('rotation-stopped');
    for(let v of [viewerA, viewerB]){
      if(v){ v.rotX=0; v.rotY=0; }
    }
  }
  document.querySelectorAll('.view-btn').forEach(b=>{
    if(b.id==='compare-btn'||b.id==='style-btn') return;
    b.classList.toggle('active', b.dataset.viewMode===mode);
  });
  const cc=document.getElementById('cloud-controls');
  if(mode==='cloud') cc.classList.add('show'); else cc.classList.remove('show');

  for(let v of [viewerA, viewerB]){
    if(!v || !v.currentLayer) continue;
    const layer=v.currentLayer;
    const keys=Object.keys(layer.rendered);
    if(keys.length===0) continue;

    for(let k of keys) removePart(layer,k);
    layer.buildGen++; // invalidate any in-flight staggered queue from a previous action
    for(let k of keys){
      try{ addPart(layer,k,mode, v.currentCfg); }
      catch(e){ console.error('setView: failed to add part', k, e); }
    }
  }

  updateLegameVisibility();
  if(bondMode) buildBondLayer(); // still bonded and still in Bohr — just refresh visuals
  if(mode==='cloud') updateCloudParams(); // freshly rebuilt points start at their default size — reapply the person's actual settings
}

// "Tutti" / "Valenza" / "Nessuno" — act on the currently ACTIVE viewer.
function setPreset(mode, btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');

  const cfg=activeViewer.currentCfg;
  const orbKeys=Object.keys(cfg).filter(o=>cfg[o]>0);
  const maxN=orbKeys.length?Math.max(...orbKeys.map(o=>parseInt(o[0]))):null;

  document.querySelectorAll('#orbital-list .orb-check').forEach(cb=>{
    const orb=cb.dataset.orb;
    if(mode==='none'){ cb.checked=false; }
    else if(mode==='all'){ cb.checked=true; }
    else if(mode==='valence'){ cb.checked=(keyShellNumber(orb)===maxN); }
  });
  activeViewer.rebuildCurrentLayer(false);
}

let viewerA, viewerB=null, activeViewer, compareMode=false;
let bondMode=false;
let visualStyle='flat'; // 'realistic' | 'flat' — Flat is the default look the project opens in

// Auto-rotation is shared by both viewers (A and B rotate/stop together).
// Manual drag-rotation with the mouse always still works either way.
let autoRotate=false;
function toggleRotation(){
  autoRotate=!autoRotate;
  const btn=document.getElementById('rotate-toggle-btn');
  btn.textContent = autoRotate ? 'Stop' : 'Gira';
  btn.classList.toggle('rotation-stopped', !autoRotate);

  // In Bohr style, stopping also snaps to a frontal (top-down) view, so the
  // flat rings are seen face-on as full circles rather than mid-tilt — the
  // person can still freely re-tilt it afterward with the mouse.
  if(!autoRotate && viewMode==='bohr'){
    for(let v of [viewerA, viewerB]){
      if(v){ v.rotX=0; v.rotY=0; }
    }
  }
}

// Switches between the two visual representations — same atom, same
// selection, same everything, just re-skinned. Both currently-shown atoms
// (A, and B if compare mode is on) replay their nucleus-formation animation
// in the new style, then restore exactly the orbitals that were visible.
function toggleStyle(){
  visualStyle = visualStyle==='realistic' ? 'flat' : 'realistic';
  document.body.classList.toggle('theme-flat', visualStyle==='flat');

}

function switchActiveViewer(which){

// ── DRAGGABLE SPLIT DIVIDER (compare mode) ──────────────────────────────────
let splitRatio=0.5; // fraction of the wrapper's width given to pane A

function applySplit(){
  if(!compareMode) return;
  const wrapper=document.getElementById('viewers-wrapper');
  const paneA=document.getElementById('pane-a');
  const dividerW=6;
  const totalW=wrapper.clientWidth;
  const usable=Math.max(0,totalW-dividerW);
  const aW=Math.round(usable*splitRatio);
  paneA.style.flex='0 0 '+aW+'px';
  resizeBothSoon();
}

function resizeBothSoon(){
  requestAnimationFrame(()=>{
    viewerA.resize();
    if(viewerB) viewerB.resize();
  });
}

function toggleCompare(){
  compareMode=!compareMode;
  document.getElementById('compare-btn').classList.toggle('active', compareMode);
  const paneA=document.getElementById('pane-a');
  const paneB=document.getElementById('pane-b');
  const divider=document.getElementById('split-divider');
  const abTabs=document.getElementById('ab-tabs');
  const labelA=document.getElementById('pane-label-a');

  if(compareMode){
    paneB.style.display='block';
    divider.style.display='block';
    abTabs.style.display='flex';
    labelA.style.display='block';
    splitRatio=0.5;
    applySplit(); // sizes pane A explicitly; pane B (flex:1) fills the rest deterministically
    if(!viewerB){
      viewerB=createViewer(document.getElementById('c2'), paneB);
      viewerB.selectElement(viewerA.currentElement.n);
    }
    applySplit(); // re-apply once B exists, so both are guaranteed correctly sized
  } else {
    paneA.style.flex='';
    paneB.style.display='none';
    divider.style.display='none';
    abTabs.style.display='none';
    labelA.style.display='none';
    activeViewer=viewerA;
    document.getElementById('tab-a').classList.add('active');
    document.getElementById('tab-b').classList.remove('active');
    document.getElementById('pane-label-a').classList.add('pane-label-active');
    document.getElementById('pane-label-b').classList.remove('pane-label-active');
    refreshSidebarInfo(viewerA);
    updateOrbitalList(viewerA.currentCfg, renderedKeysOf(viewerA));
    resizeBothSoon();
  }

}

// The "Legame" button only ever makes sense when two atoms are on screen

function toggleBond(forceOff){

// ── ANIMATION LOOP (drives both viewers) ─────────────────────────────────────
function animateAll(){
  requestAnimationFrame(animateAll);
  viewerA.render();
  if(viewerB) viewerB.render();
  updateLightRayTracking();
  if(bondMode){
    updateBondAnimation();
    for(let be of bondElectrons){
      if(be.kind==='circle'){
        be.theta+=be.speed*0.02;
        be.mesh.position.set(be.r*Math.cos(be.theta), be.r*Math.sin(be.theta), 0);
      } else if(be.kind==='fused-ellipse'){
        be.t+=be.speed*0.004;
        const p=fusedEllipsePoint(be.t, be.cx, be.a, be.b);
        be.mesh.position.set(p.x, p.y, 0);
      }
    }
  }
}

// ── INTRO SEQUENCE ────────────────────────────────────────────────────────────
// Starts on an empty screen (just title + background picker). Box 1 slides
// down from above into the top-left corner; the atom then appears (electrons
// held still, sidebar config still hidden); box 2 slides up from below to
// rest under box 1; then the electrons start moving. More steps to follow.
let electronsFrozen=true;



// Picks the palette swatch whose hue is closest to a target hue — used to
// find a color that reads as "complementary" to the current background,
// without inventing a color outside the established palette.

// Softens a punchy palette color into something calmer for the message
// boxes — less saturated, pulled toward a mid-light tone.

function showSequenceBox(id, html, color){

let seqColor1=null, seqColor2=null, seqColor3=null;
let potentialOrbitals=[]; // {mesh, mat, sub} — the gray dashed "unoccupied" 2p orbitals
let grayConvertedOrbitals=[]; // orbitals converted TO gray-dashed (e.g. 2s once its electron is promoted)
let promotedPxRef=null; // the colored 2p_x mesh+electron created by the promotion, so it can be removed if undone

// Generic opacity fade for plain Three.js materials (no CSS transitions apply
// to WebGL materials, so this drives it frame-by-frame over `duration` ms).

// Flashes materials on-off twice before settling at finalOpacity — used to
// draw the eye to an orbital an electron just landed on.

// Draws one 2p sub-orbital as a dashed gray outline with no electron on it —
// reused both to show all three "potential" orbitals at once and to rebuild
// just one of them if a promotion gets undone later.
function buildOnePotentialOrbital(subIdx){
  const layer=viewerA.currentLayer;
  const sub=P_SUBS[subIdx];
  const key='2p|'+sub;
  const r=bohrKeyRadius(key);
  const rot=subIdx*(Math.PI/3);
  const a=r, gap=Math.max(0.1, r*0.07);
  const cosr=Math.cos(rot), sinr=Math.sin(rot);
  const segsN=120, pts=[];
  for(let j=0;j<=segsN;j++){
    const p=lemniscatePoint(j/segsN, a, gap);
    pts.push(new THREE.Vector3(p.x*cosr-p.y*sinr, p.x*sinr+p.y*cosr, 0));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineDashedMaterial({color:0x888888, dashSize:0.16, gapSize:0.11, transparent:true, opacity:0});
  const line=new THREE.Line(geo, mat);
  line.computeLineDistances();
  layer.group.add(line);
  return {mesh:line, mat, sub};
}

// Draws the three 2p sub-orbitals as dashed gray outlines with no electrons
// on them — these aren't part of Lithium's ground-state configuration, just
// shown as the "next available" orbitals nobody is occupying yet.
function showPotentialOrbitals(){
  const layer=viewerA.currentLayer;
  if(!layer || potentialOrbitals.length) return;
  const mats=[];
  for(let i=0;i<P_SUBS.length;i++){
    const entry=buildOnePotentialOrbital(i);
    potentialOrbitals.push(entry);
    mats.push(entry.mat);
  }
  fadeMaterialsOpacity(mats, 0, 0.85, 1200);
}

function hidePotentialOrbitals(){
  if(!potentialOrbitals.length) return;
  const layer=viewerA.currentLayer;
  const mats=potentialOrbitals.map(o=>o.mat);
  fadeMaterialsOpacity(mats, 0.85, 0, 1400, ()=>{
    for(const o of potentialOrbitals){
      if(layer) layer.group.remove(o.mesh);
    }
    potentialOrbitals=[];
  });
}

// The box5 ray sequence: 2 seconds after box5 appears (no click needed), the

    const layer=viewerA.currentLayer;

    showLightRayTo(targetPos, ()=>{
      ed.pulsing=true; // the ray has "arrived" — the electron starts pulsing to show it's absorbing energy
    });

// Undoes the box5 ray sequence: cancels the pending timer if it hasn't
// fired yet, or — if it already had — removes the ray, stops the pulsing,
// and lets the electron resume moving normally.
function resetBox5RaySequence(){
  if(excitedStateTimeout){ clearTimeout(excitedStateTimeout); excitedStateTimeout=null; }
  if(excitedStateTriggered){
    excitedStateTriggered=false;
    hideLightRayInstant();
    const layer=viewerA.currentLayer;
    if(layer){
      const ed=layer.electronObjects.find(e=>e.orb==='2s' && e.type==='bohr');
      if(ed){ ed.pulsing=false; ed.mesh.scale.setScalar(1); }

    electronsFrozen=false;

}

// ── BOX 6 + the excited-electron scene change ────────────────────────────────
let sceneChangeTimeout1=null, sceneChangeTimeout2=null;
let rayHasDisappeared=false, orbitalsReshownAfterRay=false, hasPromoted=false;

function startBox6SceneChanges(){
  rayHasDisappeared=false; orbitalsReshownAfterRay=false; hasPromoted=false;

  sceneChangeTimeout1=setTimeout(()=>{
    sceneChangeTimeout1=null;
    hideLightRayInstant();
    rayHasDisappeared=true;
    showPotentialOrbitals();
    orbitalsReshownAfterRay=true;

    sceneChangeTimeout2=setTimeout(()=>{
      sceneChangeTimeout2=null;

}

// ── LIGHT RAY (dashed, moving, genuinely thick) ──────────────────────────────
// WebGL ignores line-width entirely on native THREE.Line, so real 3D tube
// segments are the only reliable way to get genuine thickness. Rebuilding
// the small dash segments every frame with a shifting phase gives the
// "marching" moving-dash look on top of that real thickness.






// Incoming ray: grows from off-screen toward a fixed target, firing
// onArrive once it lands, then keeps its dashes marching while it stays put.
let incomingRayRec=null, incomingRayState=null;

// Outgoing ray: grows outward from the electron's position (like a real
// emission), then — once fully grown — detaches and keeps flying on its own.
// Always points radially outward from the atom's center through wherever
// the electron fired from — this reads as "the same line the electron was
// on, heading away from the atom" even when the electron's own path (e.g.
// returning from a p orbital) isn't perfectly radial itself.
let outgoingRayRec=null, outgoingRayState=null;

// Called every frame from animateAll — drives both rays' growth, the
// outgoing ray's free flight, and the marching-dash phase for both.

// box6's back button: undoes box6's own scene-change chain (promotion,
// reshown orbitals), then fully replays the box5 ray scene from scratch —
// exactly as if box5 had just appeared again.
function backFromBox6(){
  if(sceneChangeTimeout1){ clearTimeout(sceneChangeTimeout1); sceneChangeTimeout1=null; }
  if(sceneChangeTimeout2){ clearTimeout(sceneChangeTimeout2); sceneChangeTimeout2=null; }
  if(hasPromoted){ undoPromotion(); hasPromoted=false; }
  if(orbitalsReshownAfterRay){ hidePotentialOrbitals(); orbitalsReshownAfterRay=false; }
  rayHasDisappeared=false;

  document.getElementById('seq-box6').classList.remove('show');
  document.getElementById('seq-box5').classList.add('show'); // safety net — box5 should already be visible, but make sure
  document.getElementById('seq-box5-ok').style.visibility='visible';
  document.getElementById('seq-box5-back').style.visibility='visible';

  resetBox5RaySequence();
  startBox5RaySequence();
}

// ── BOX 7, 8, 9: instability and the fall back to the ground state ──────────
let box7Timeout=null, box8Timeout=null;
let demotionCancelled=false;
let groundStateSRef=null; // the freshly-rebuilt colored 2s ring+electrons, once the ball returns

// box6's own OK button — starts the automatic instability chain up through
// box8; from there the person clicks OK themselves to release the energy.
function advanceToBox7(){
  document.getElementById('seq-box6-ok').style.visibility='hidden';
  document.getElementById('seq-box6-back').style.visibility='hidden';
  showSequenceBox('seq-box7', 'Ma lo stato eccitato è instabile...', seqColor1);

  box7Timeout=setTimeout(()=>{
    box7Timeout=null;
    intensifyPulse();

    box8Timeout=setTimeout(()=>{
      box8Timeout=null;
      showSequenceBox('seq-box8', '...e dopo poco, l\'elettrone torna al proprio stato fondamentale...', seqColor2);
    }, 3000);
  }, 2000);
}

// box8's own OK button — starts the return journey + releases the ray.
function skipToReleaseEnergy(){
  document.getElementById('seq-box8-ok').style.visibility='hidden';
  document.getElementById('seq-box8-back').style.visibility='hidden';
  demoteElectronToGroundOrbital();
  showSequenceBox('seq-box9', '...E RILASCIA l\'energia che aveva ricevuto', seqColor3);
}

// box8's back button: cancels the pulse-intensify step if still pending,
// undoes it if it already happened, and returns to box6.
function backFromBox8(){
  if(box7Timeout){ clearTimeout(box7Timeout); box7Timeout=null; }
  if(box8Timeout){ clearTimeout(box8Timeout); box8Timeout=null; }
  if(promotedPxRef){
    const ed=promotedPxRef.electrons[0];
    if(ed){ ed.pulseAmp=0.35; ed.pulseBase=1; }
  }
  document.getElementById('seq-box7').classList.remove('show');
  document.getElementById('seq-box8').classList.remove('show');
  document.getElementById('seq-box6-ok').style.visibility='visible';
  document.getElementById('seq-box6-back').style.visibility='visible';
}

// Makes the excited electron's pulse more pronounced and its resting size
// bigger, signaling growing instability before it falls back down.
function intensifyPulse(){
  if(!promotedPxRef) return;
  const ed=promotedPxRef.electrons[0];
  if(ed){ ed.pulseAmp=0.55; ed.pulseBase=1.3; }
}

// Builds one 's' orbital as a normal colored ring with its electrons — used
// to rebuild the real 2s once the excited electron returns to it.
function buildColoredSCircle(key, count){
  const layer=viewerA.currentLayer;
  const color=ORB_COLORS[key];
  const r=bohrKeyRadius(key);
  const tube=visualStyle==='flat'?0.03:0.015;
  const ringGeo=new THREE.TorusGeometry(r, tube, 8, 64);
  const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0});
  const mesh=new THREE.Mesh(ringGeo, mat);
  layer.group.add(mesh);
  const electrons=[];
  for(let i=0;i<count;i++){
    const e=makeElectron(color);
    e.material.transparent=true; e.material.opacity=0;
    layer.group.add(e);
    const ed={mesh:e, orb:key, r, theta:(i/count)*Math.PI*2, speed:0.35+0.15*Math.random(), type:'bohr'};
    layer.electronObjects.push(ed);
    electrons.push(ed);
  }
  return {mesh, mat, electrons};
}

// The excited electron travels slowly back to 2s (visible, ~1.8s), emitting
// an outward ray the moment it starts moving. Once it arrives, 2s turns
// colored; only after THAT finishes does the p orbital it left turn gray.
function demoteElectronToGroundOrbital(){
  demotionCancelled=false;
  const layer=viewerA.currentLayer;
  if(!layer || !promotedPxRef) return;
  const ed=promotedPxRef.electrons[0];
  if(!ed) return;

  electronsFrozen=true; // stop all rotation first — everything settles wherever it currently is

  const cosr=Math.cos(ed.rot), sinr=Math.sin(ed.rot);
  const p=lemniscatePoint(((ed.t%1)+1)%1, ed.a, ed.gap);
  const startPos=new THREE.Vector3(p.x*cosr-p.y*sinr, p.x*sinr+p.y*cosr, 0);

  const idxLE=layer.electronObjects.indexOf(ed);
  if(idxLE>=0) layer.electronObjects.splice(idxLE,1);
  ed.pulsing=false;
  ed.mesh.scale.setScalar(1);
  travelingBallMesh=ed.mesh;

  const r2s=bohrKeyRadius('2s');
  const returnAngle=Math.atan2(startPos.y, startPos.x); // land at the closest point — same direction, smaller radius
  const targetPos=new THREE.Vector3(r2s*Math.cos(returnAngle), r2s*Math.sin(returnAngle), 0);

  const travelStart=performance.now(), travelDuration=1800;
  (function travel(){
    if(demotionCancelled) return;
    const now=performance.now();
    const t=Math.min(1,(now-travelStart)/travelDuration);
    const ease=t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
    const pos=startPos.clone().lerp(targetPos, ease);
    ed.mesh.position.copy(pos);
    if(t<1){ requestAnimationFrame(travel); }
    else onReturned();
  })();

  function onReturned(){
    if(demotionCancelled) return;
    showOutwardRayFrom(targetPos.clone()); // fires exactly at the landing spot, no earlier
    setTimeout(()=>{
      if(demotionCancelled) return;
      electronsFrozen=false; // only now does rotation resume
      if(promotedPxRef){ layer.group.remove(promotedPxRef.mesh); promotedPxRef=null; }
      for(const g of grayConvertedOrbitals) layer.group.remove(g.mesh);
      grayConvertedOrbitals=[];

      const count=viewerA.currentCfg['2s'];
      const color=ORB_COLORS['2s'];
      const tube=visualStyle==='flat'?0.03:0.015;
      const ringGeo=new THREE.TorusGeometry(r2s, tube, 8, 64);
      const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0});
      const mesh=new THREE.Mesh(ringGeo, mat);
      layer.group.add(mesh);

      // The returning electron resumes exactly where it landed — reuse its
      // own mesh rather than discarding it for a fresh one at a default angle.
      const electrons=[];
      travelingBallMesh.material.color.set(color);
      const firstEd={mesh:travelingBallMesh, orb:'2s', r:r2s, theta:returnAngle, speed:0.35+0.15*Math.random(), type:'bohr'};
      layer.electronObjects.push(firstEd);
      electrons.push(firstEd);
      travelingBallMesh=null; // no longer "traveling" — now a normal tracked electron

      for(let i=1;i<count;i++){
        const e=makeElectron(color);
        e.material.transparent=true; e.material.opacity=0;
        layer.group.add(e);
        const ed={mesh:e, orb:'2s', r:r2s, theta:returnAngle+(i/count)*Math.PI*2, speed:0.35+0.15*Math.random(), type:'bohr'};
        layer.electronObjects.push(ed);
        electrons.push(ed);
      }

      groundStateSRef={mesh, mat, electrons};
      layer.rendered['2s']={meshes:[mesh], electrons};

      const mats=[mat, ...electrons.map(e=>e.mesh.material)];
      fadeMaterialsOpacity(mats, 0, 1, 900, ()=>{
        if(demotionCancelled) return;
        const grayP=buildOnePotentialOrbital(P_SUBS.indexOf(EXCITED_TARGET_SUB));
        potentialOrbitals.push(grayP);
        fadeMaterialsOpacity([grayP.mat], 0, 0.85, 1000);
      });
    }, 2000); // the electron sits still on the gray orbital while the ray flies off, before recoloring and resuming
  }
}

// Instantly rebuilds whatever the box6 "just arrived, excited" state looked
// like, regardless of how far the box7-8-9 chain had progressed — removes
// any ground-state rebuild or in-flight ball, and reconstructs the colored,
// pulsing p orbital and gray 2s if they're missing.
function instantRestorePromotedState(){
  const layer=viewerA.currentLayer;
  if(!layer) return;
  electronsFrozen=false;

  if(groundStateSRef){
    layer.group.remove(groundStateSRef.mesh);
    for(const ed of groundStateSRef.electrons){
      layer.group.remove(ed.mesh);
      const idx=layer.electronObjects.indexOf(ed);
      if(idx>=0) layer.electronObjects.splice(idx,1);
    }
    groundStateSRef=null;
  }
  if(travelingBallMesh){ layer.group.remove(travelingBallMesh); travelingBallMesh=null; }

  const gpIdx=potentialOrbitals.findIndex(o=>o.sub===EXCITED_TARGET_SUB);
  if(gpIdx>=0){
    layer.group.remove(potentialOrbitals[gpIdx].mesh);
    potentialOrbitals.splice(gpIdx,1);
  }

  if(!grayConvertedOrbitals.length){
    const grayS=buildGrayDashedCircle(bohrKeyRadius('2s'));
    grayS.mat.opacity=0.85;
    grayConvertedOrbitals.push(grayS);
  }

  if(!promotedPxRef){
    const targetIdx=P_SUBS.indexOf(EXCITED_TARGET_SUB);
    const key='2p|'+EXCITED_TARGET_SUB;
    const r=bohrKeyRadius(key);
    const rot=targetIdx*(Math.PI/3);
    const a=r, gap=Math.max(0.1, r*0.07);
    const cosr=Math.cos(rot), sinr=Math.sin(rot);
    const segs=120, pts=[];
    for(let j=0;j<=segs;j++){
      const p=lemniscatePoint(j/segs, a, gap);
      pts.push(new THREE.Vector3(p.x*cosr-p.y*sinr, p.x*sinr+p.y*cosr, 0));
    }
    const curve=new THREE.CatmullRomCurve3(pts, true);
    const tubeGeo=new THREE.TubeGeometry(curve, 160, visualStyle==='flat'?0.03:0.015, 8, true);
    const color=ORB_COLORS['2p'];
    const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:1});
    const mesh=new THREE.Mesh(tubeGeo, mat);
    layer.group.add(mesh);
    const e=makeElectron(color);
    layer.group.add(e);
    const newEd={mesh:e, orb:key, a, gap, rot, t:0, speed:0.14+0.05*Math.random(), type:'bohr8', pulsing:true, pulseAmp:0.35, pulseBase:1};
    layer.electronObjects.push(newEd);
    promotedPxRef={mesh, mat, electrons:[newEd]};
  } else {
    const ed=promotedPxRef.electrons[0];
    if(ed){ ed.pulsing=true; ed.pulseAmp=0.35; ed.pulseBase=1; ed.mesh.scale.setScalar(1); ed.mesh.material.opacity=1; }
    promotedPxRef.mat.opacity=1;
  }

  hideLightRayInstant();
}

// box9's back button: cancels the whole box7-8-9 chain, instantly restores
// the excited state exactly as box6 left it, and returns to box6.
function backFromBox9(){
  demotionCancelled=true;

  instantRestorePromotedState();
  // box8's own state includes the pulse-intensify step from box7 — reapply it
  if(promotedPxRef){
    const ed=promotedPxRef.electrons[0];
    if(ed){ ed.pulseAmp=0.55; ed.pulseBase=1.3; }
  }

  document.getElementById('seq-box9').classList.remove('show');
  document.getElementById('seq-box8-ok').style.visibility='visible';
  document.getElementById('seq-box8-back').style.visibility='visible';
}

// Draws one 's' orbital as a plain gray dashed circle, no electrons — the
// same "unoccupied" visual language as the potential p orbitals.
function buildGrayDashedCircle(r){
  const layer=viewerA.currentLayer;
  const segs=80, pts=[];
  for(let j=0;j<=segs;j++){
    const t=j/segs*Math.PI*2;
    pts.push(new THREE.Vector3(r*Math.cos(t), r*Math.sin(t), 0));
  }
  const geo=new THREE.BufferGeometry().setFromPoints(pts);
  const mat=new THREE.LineDashedMaterial({color:0x888888, dashSize:0.16, gapSize:0.11, transparent:true, opacity:0});
  const line=new THREE.Line(geo, mat);
  line.computeLineDistances();
  layer.group.add(line);
  return {mesh:line, mat};
}

// Draws one colored, solid p-orbital lemniscate with its own electron(s) —
// built the same way addBohrOrbitalRing's 'p' branch does, just reusable
// standalone since Lithium's own configuration has no 2p to draw from.
function buildColoredLemniscate(key, electronCount){
  const layer=viewerA.currentLayer;
  const [orb,sub]=key.split('|');
  const color=ORB_COLORS[orb];
  const r=bohrKeyRadius(key);
  const idx=P_SUBS.indexOf(sub);
  const rot=idx*(Math.PI/3);
  const a=r, gap=Math.max(0.1, r*0.07);
  const cosr=Math.cos(rot), sinr=Math.sin(rot);
  const segs=120, pts=[];
  for(let j=0;j<=segs;j++){
    const p=lemniscatePoint(j/segs, a, gap);
    pts.push(new THREE.Vector3(p.x*cosr-p.y*sinr, p.x*sinr+p.y*cosr, 0));
  }
  const curve=new THREE.CatmullRomCurve3(pts, true);
  const tubeGeo=new THREE.TubeGeometry(curve, 160, visualStyle==='flat'?0.03:0.015, 8, true);
  const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0});
  const mesh=new THREE.Mesh(tubeGeo, mat);
  layer.group.add(mesh);
  const electrons=[];
  for(let i=0;i<electronCount;i++){
    const e=makeElectron(color);
    e.material.transparent=true; e.material.opacity=0;
    layer.group.add(e);
    const ed={mesh:e, orb:key, a, gap, rot, t:i/electronCount, speed:0.14+0.05*Math.random(), type:'bohr8'};
    layer.electronObjects.push(ed);
    electrons.push(ed);
  }
  return {mesh, mat, electrons};
}

// The excited electron settles into 2p_y — the "diagonal toward the right"
// orbital, not the horizontal 2p_x — via a visible traveling ball: it moves
// from its old position to the new orbital first; only once it arrives does
// that orbital turn colored; only once THAT finishes does the old 2s ring
// turn gray. Each step waits for the previous one to visually complete.
const EXCITED_TARGET_SUB='y';
let travelingBallMesh=null;
let promotionCancelled=false;

function promoteElectronToExcitedOrbital(){
  promotionCancelled=false;
  const layer=viewerA.currentLayer;
  if(!layer) return;

  const rec2s=layer.rendered['2s'];
  const ed2s=layer.electronObjects.find(e=>e.orb==='2s' && e.type==='bohr');
  if(!ed2s) return;

  const startPos=new THREE.Vector3(ed2s.r*Math.cos(ed2s.theta), ed2s.r*Math.sin(ed2s.theta), 0);

  // Detach this one electron from the normal 2s bookkeeping — its mesh keeps
  // existing (we're about to drive it manually), but it stops being "one of
  // 2s's electrons" so later cleanup doesn't remove or move it unexpectedly.
  const idxLE=layer.electronObjects.indexOf(ed2s);
  if(idxLE>=0) layer.electronObjects.splice(idxLE,1);
  if(rec2s){
    const idxRec=rec2s.electrons.indexOf(ed2s);
    if(idxRec>=0) rec2s.electrons.splice(idxRec,1);
  }
  ed2s.pulsing=false;
  ed2s.mesh.scale.setScalar(1);
  travelingBallMesh=ed2s.mesh;

  const targetIdx=P_SUBS.indexOf(EXCITED_TARGET_SUB);
  const key='2p|'+EXCITED_TARGET_SUB;
  const r=bohrKeyRadius(key);
  const rot=targetIdx*(Math.PI/3);
  const a=r, gap=Math.max(0.1, r*0.07);
  const cosr=Math.cos(rot), sinr=Math.sin(rot);
  const p0=lemniscatePoint(0, a, gap);
  const targetPos=new THREE.Vector3(p0.x*cosr-p0.y*sinr, p0.x*sinr+p0.y*cosr, 0);

  const travelStart=performance.now(), travelDuration=1800;
  (function travel(){
    if(promotionCancelled) return;
    const now=performance.now();
    const t=Math.min(1,(now-travelStart)/travelDuration);
    const ease=t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2; // ease-in-out, so it starts and ends gently
    ed2s.mesh.position.copy(startPos.clone().lerp(targetPos, ease));
    if(t<1){ requestAnimationFrame(travel); }
    else onArrived();
  })();

  function onArrived(){
    if(promotionCancelled) return;
    travelingBallMesh=null;

    const pIdx=potentialOrbitals.findIndex(o=>o.sub===EXCITED_TARGET_SUB);
    if(pIdx>=0){
      layer.group.remove(potentialOrbitals[pIdx].mesh);
      potentialOrbitals.splice(pIdx,1);
    }

    const segs=120, pts=[];
    for(let j=0;j<=segs;j++){
      const p=lemniscatePoint(j/segs, a, gap);
      pts.push(new THREE.Vector3(p.x*cosr-p.y*sinr, p.x*sinr+p.y*cosr, 0));
    }
    const curve=new THREE.CatmullRomCurve3(pts, true);
    const tubeGeo=new THREE.TubeGeometry(curve, 160, visualStyle==='flat'?0.03:0.015, 8, true);
    const color=ORB_COLORS['2p'];
    const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0});
    const mesh=new THREE.Mesh(tubeGeo, mat);
    layer.group.add(mesh);

    ed2s.mesh.material.color.set(color); // the ball itself takes on its new orbital's color
    const newEd={mesh:ed2s.mesh, orb:key, a, gap, rot, t:0, speed:0.14+0.05*Math.random(), type:'bohr8', pulsing:true, pulseAmp:0.35, pulseBase:1};
    layer.electronObjects.push(newEd);
    promotedPxRef={mesh, mat, electrons:[newEd]};

    fadeMaterialsOpacity([mat], 0, 1, 900, ()=>{
      if(promotionCancelled) return;
      removePart(layer, '2s'); // only the ring + the one remaining original electron now
      const grayS=buildGrayDashedCircle(bohrKeyRadius('2s'));
      grayConvertedOrbitals.push(grayS);
      fadeMaterialsOpacity([grayS.mat], 0, 0.85, 1000);
    });
  }
}

// Fully undoes promoteElectronToExcitedOrbital, however far it got: cancels
// an in-flight ball, removes the colored target orbital, rebuilds the real
// 2s ring, and makes sure the target's gray "potential" version exists again
// (so the wider rewind's hidePotentialOrbitals call fades it out along with
// the other two, rather than leaving it missing).
function undoPromotion(){
  promotionCancelled=true;
  const layer=viewerA.currentLayer;
  if(!layer) return;

  if(travelingBallMesh){
    layer.group.remove(travelingBallMesh);
    travelingBallMesh=null;
  }

  for(const g of grayConvertedOrbitals) layer.group.remove(g.mesh);
  grayConvertedOrbitals=[];
  if(!layer.rendered['2s']){
    addBohrOrbitalRing(layer, '2s', viewerA.currentCfg);
  }

  if(promotedPxRef){
    layer.group.remove(promotedPxRef.mesh);
    for(const ed of promotedPxRef.electrons){
      layer.group.remove(ed.mesh);
      const idx=layer.electronObjects.indexOf(ed);
      if(idx>=0) layer.electronObjects.splice(idx,1);
    }
    promotedPxRef=null;
  }

  if(!potentialOrbitals.find(o=>o.sub===EXCITED_TARGET_SUB)){
    const entry=buildOnePotentialOrbital(P_SUBS.indexOf(EXCITED_TARGET_SUB));
    entry.mat.opacity=potentialOrbitals.length ? potentialOrbitals[0].mat.opacity : 0.85;
    potentialOrbitals.push(entry);
  }
}

// Smoothly rotates one specific electron to a target angle (shortest way
// round), then freezes ALL electrons in place once it arrives.
function freezeWithElectronAt(orbKey, targetAngle, duration, onDone){
  const layer=viewerA.currentLayer;
  const ed=layer && layer.electronObjects.find(e=>e.orb===orbKey && e.type==='bohr');
  if(!ed){ electronsFrozen=true; if(onDone) onDone(); return; }
  let current=((ed.theta%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  let target=((targetAngle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  let diff=target-current;
  if(diff>Math.PI) diff-=Math.PI*2;
  if(diff<-Math.PI) diff+=Math.PI*2;
  const startTheta=ed.theta;
  electronsFrozen=true; // every other electron stops right where it is, now
  const start=performance.now();
  (function step(){
    const now=performance.now();
    const t=Math.min(1,(now-start)/duration);
    const ease=1-Math.pow(1-t,3);
    ed.theta=startTheta+diff*ease;
    if(t<1) requestAnimationFrame(step);
    else if(onDone) onDone();
  })();
}

  const bgHex=(getComputedStyle(document.documentElement).getPropertyValue('--flat-bg')||BG_PALETTE[0]).trim();
  const [bgHue]=hexToHsl(bgHex);

  const color2raw=nearestPaletteColor((bgHue+90)%360, [color1raw]);
  const color3raw=nearestPaletteColor((bgHue+270)%360, [color1raw, color2raw]);
  seqColor1=muteColor(color1raw);
  seqColor2=muteColor(color2raw);
  seqColor3=muteColor(color3raw);

  setTimeout(()=>{
    showSequenceBox('seq-box1', 'Ogni atomo ha uno stato FONDAMENTALE', seqColor1);

    setTimeout(()=>{
      document.getElementById('canvas-area').classList.remove('seq-hidden');
      viewerA.selectElement(3); // Lithium — sidebar config stays hidden for now, electrons stay frozen until OK is clicked
    }, 2000);
  }, 2000);
}
