<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chemverse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 24px 40px;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
  }
  .title {
    letter-spacing: 0.22em;
    font-size: clamp(34px, 7vw, 52px);
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .subtitle {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 52px;
    font-size: 13px;
    letter-spacing: 0.18em;
    font-family: Arial, sans-serif;
    font-weight: 700;
    flex-wrap: wrap;
    justify-content: center;
  }
  .sub-esplora { color: #2dd4c4; }
  .sub-costruisci { color: #f97316; }
  .sub-comprendi { color: #a855f7; }
  .dot { color: #555; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 140px);
    gap: 32px 28px;
    justify-content: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    text-decoration: none;
  }
  .icon-box {
    width: 140px;
    height: 140px;
    border-radius: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover .icon-box {
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
  }
  .card:focus-visible .icon-box {
    outline: 2px solid #fff;
    outline-offset: 3px;
  }
  .icon-box svg { width: 86px; height: 86px; display: block; }
  .label {
    color: #fff;
    font-size: 13px;
    font-family: Arial, sans-serif;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.01em;
    max-width: 130px;
  }

  .footer {
    margin-top: 48px;
    border-top: 1px solid #2a2a2a;
    width: 100%;
    max-width: 680px;
    padding-top: 16px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #555;
    font-family: Arial, sans-serif;
    font-weight: 600;
    text-transform: uppercase;
  }

  @media (max-width: 620px) {
    .grid { grid-template-columns: repeat(2, 140px); }
  }
</style>
</head>
<body>

<div class="title">Chemverse</div>
<div class="subtitle">
  <span class="sub-esplora">ESPLORA</span>
  <span class="dot">·</span>
  <span class="sub-costruisci">COSTRUISCI</span>
  <span class="dot">·</span>
  <span class="sub-comprendi">COMPRENDI</span>
</div>

<div class="grid" id="card-grid"></div>

<svg width="0" height="0" style="position:absolute">
  <defs>
    <filter id="dropShadow" x="-30%" y="-30%" width="170%" height="170%">
      <feDropShadow dx="2.5" dy="4" stdDeviation="0.8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
</svg>

<div class="footer">Chemverse — un laboratorio di chimica da esplorare</div>

  },
  {
    label: 'Molecole',
    bg: '#d6336c',
    svg: `<g filter="url(#dropShadow)">
      <g stroke="#fff" stroke-width="4" stroke-linecap="round">
        <line x1="43" y1="40" x2="43" y2="18"/>
        <line x1="43" y1="40" x2="22" y2="58"/>
        <line x1="43" y1="40" x2="64" y2="58"/>
      </g>
      <circle cx="43" cy="18" r="10" fill="#f5a623"/>
      <circle cx="22" cy="58" r="10" fill="#f5a623"/>
      <circle cx="64" cy="58" r="10" fill="#f5a623"/>
      <circle cx="43" cy="40" r="13" fill="#c0392b"/>
    </g>`
  }
];

const grid = document.getElementById('card-grid');
for (const s of SECTIONS) {
  const card = document.createElement(s.href ? 'a' : 'button');
  card.className = 'card';
  if (s.href) {
    card.href = s.href;
    card.target = '_blank';
    card.rel = 'noopener';
  } else {
    card.type = 'button';
  }
  card.innerHTML = `
    <div class="icon-box" style="background:${s.bg}">
      <svg viewBox="0 0 86 86" xmlns="http://www.w3.org/2000/svg">${s.svg}</svg>
    </div>
    <div class="label">${s.label}</div>
  `;
  grid.appendChild(card);
}
</script>

</body>
</html>
