<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chemverse</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #000;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 56px 24px 40px;
    font-family: 'Arial Black', 'Helvetica Neue', Arial, sans-serif;
  }
  .title {
    letter-spacing: 0.22em;
    font-size: clamp(34px, 7vw, 52px);
    font-weight: 900;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: center;
  }
  .subtitle {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 52px;
    font-size: 13px;
    letter-spacing: 0.18em;
    font-family: Arial, sans-serif;
    font-weight: 700;
    flex-wrap: wrap;
    justify-content: center;
  }
  .sub-esplora { color: #2dd4c4; }
  .sub-costruisci { color: #f97316; }
  .sub-comprendi { color: #a855f7; }
  .dot { color: #555; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 140px);
    gap: 32px 28px;
    justify-content: center;
  }
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 0;
    font: inherit;
    text-decoration: none;
  }
  .icon-box {
    width: 140px;
    height: 140px;
    border-radius: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover .icon-box {
    transform: translateY(-4px);
    box-shadow: 0 10px 26px rgba(0,0,0,0.5);
  }
  .card:focus-visible .icon-box {
    outline: 2px solid #fff;
    outline-offset: 3px;
  }
  .icon-box svg { width: 86px; height: 86px; display: block; }
  .label {
    color: #fff;
    font-size: 13px;
    font-family: Arial, sans-serif;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.01em;
    max-width: 130px;
  }

  .footer {
    margin-top: 48px;
    border-top: 1px solid #2a2a2a;
    width: 100%;
    max-width: 680px;
    padding-top: 16px;
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: #555;
    font-family: Arial, sans-serif;
    font-weight: 600;
    text-transform: uppercase;
  }

  @media (max-width: 620px) {
    .grid { grid-template-columns: repeat(2, 140px); }
  }
</style>
</head>
<body>

<div class="title">Chemverse</div>
<div class="subtitle">
  <span class="sub-esplora">ESPLORA</span>
  <span class="dot">·</span>
  <span class="sub-costruisci">COSTRUISCI</span>
  <span class="dot">·</span>
  <span class="sub-comprendi">COMPRENDI</span>
</div>

<div class="grid" id="card-grid"></div>

<div class="footer">Chemverse — un laboratorio di chimica da esplorare</div>

<script>
const SECTIONS = [
  {
    label: 'Misure e grandezze',
    bg: '#e8811a',
    svg: `<g fill="none" stroke="#fff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="43" y1="16" x2="43" y2="70"/>
      <line x1="16" y1="26" x2="70" y2="26"/>
      <path d="M16 26 L8 46 Q8 54 20 54 Q32 54 32 46 Z"/>
      <path d="M70 26 L62 46 Q62 54 74 54 Q86 54 86 46 Z" transform="translate(-16,0)"/>
      <line x1="26" y1="70" x2="60" y2="70"/>
      <circle cx="43" cy="16" r="4" fill="#fff" stroke="none"/>
    </g>`
  },
  {
    label: 'Materia e trasformazioni',
    bg: '#1a9e8f',
    svg: `<g>
      <g stroke="#fff" stroke-width="3" fill="none" opacity="0.95">
        <rect x="14" y="14" width="14" height="14" rx="2"/>
        <rect x="30" y="14" width="14" height="14" rx="2"/>
        <rect x="14" y="30" width="14" height="14" rx="2"/>
        <rect x="30" y="30" width="14" height="14" rx="2"/>
      </g>
      <path d="M50 30 Q62 24 72 32" stroke="#fff" stroke-width="3.5" fill="none" stroke-linecap="round" marker-end="url(#arrow)"/>
      <path d="M64 46 C64 58 78 58 78 46 C78 40 71 32 71 32 C71 32 64 40 64 46 Z" fill="#fff" opacity="0.95"/>
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 Z" fill="#fff"/>
        </marker>
      </defs>
    </g>`
  },
  {
    label: 'Gas',
    bg: '#2f6fd6',
    svg: `<g>
      <circle cx="26" cy="24" r="7" fill="#ef4444"/>
      <circle cx="60" cy="18" r="6" fill="#22c55e"/>
      <circle cx="70" cy="40" r="6.5" fill="#f5c518"/>
      <circle cx="24" cy="52" r="6" fill="#a855f7"/>
      <circle cx="46" cy="58" r="7" fill="#ec4899"/>
      <circle cx="66" cy="66" r="5.5" fill="#22c55e"/>
      <g stroke="#fff" stroke-width="2.4" stroke-linecap="round" opacity="0.8">
        <line x1="38" y1="14" x2="44" y2="14"/><line x1="41" y1="11" x2="41" y2="17"/>
        <line x1="12" y1="38" x2="18" y2="38"/><line x1="15" y1="35" x2="15" y2="41"/>
        <line x1="52" y1="76" x2="58" y2="76"/><line x1="55" y1="73" x2="55" y2="79"/>
      </g>
    </g>`
  },
  {
    label: 'Mole e stechiometria',
    bg: '#2f9e4f',
    svg: `<g>
      <path d="M36 12 h14 v14 l16 30 q4 8 -6 8 H26 q-10 0 -6 -8 l16 -30 Z" fill="#fdf6e3" stroke="#0a3a1a" stroke-width="2.5"/>
      <text x="43" y="34" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="900" fill="#0a3a1a">MOL</text>
      <circle cx="34" cy="52" r="3.4" fill="#ef4444"/>
      <circle cx="46" cy="58" r="3" fill="#22c55e"/>
      <circle cx="38" cy="63" r="3.2" fill="#f5c518"/>
      <circle cx="52" cy="50" r="2.8" fill="#a855f7"/>
      <circle cx="30" cy="60" r="2.6" fill="#ec4899"/>
      <circle cx="48" cy="66" r="2.6" fill="#38bdf8"/>
    </g>`
  },
  {
    label: 'Atomo',
    href: 'chemverse-orbital.html',
    bg: '#1a9e8f',
    svg: `<g fill="none">
      <ellipse cx="43" cy="43" rx="34" ry="13" stroke="#f5c518" stroke-width="4" transform="rotate(-20 43 43)"/>
      <ellipse cx="43" cy="43" rx="34" ry="13" stroke="#ef4444" stroke-width="4" transform="rotate(40 43 43)"/>
      <ellipse cx="43" cy="43" rx="34" ry="13" stroke="#22c55e" stroke-width="4" transform="rotate(100 43 43)"/>
      <circle cx="43" cy="43" r="9" fill="#ec4899"/>
      <circle cx="43" cy="43" r="4" fill="#fff" opacity="0.8"/>
      <circle cx="72" cy="34" r="4.5" fill="#f5c518"/>
      <circle cx="18" cy="52" r="4" fill="#ef4444"/>
    </g>`
  },
  {
    label: 'Tavola periodica',
    bg: '#e8811a',
    svg: `<g>
      <g font-family="Arial, sans-serif" font-weight="900" text-anchor="middle">
        <rect x="12" y="12" width="30" height="30" rx="5" fill="#f5c518"/>
        <text x="27" y="33" font-size="16" fill="#3a2a00">K</text>
        <rect x="46" y="12" width="30" height="30" rx="5" fill="#ef4444"/>
        <text x="61" y="33" font-size="16" fill="#fff">Au</text>
        <rect x="12" y="46" width="30" height="30" rx="5" fill="#3b82f6"/>
        <text x="27" y="67" font-size="16" fill="#fff">Ca</text>
        <rect x="46" y="46" width="30" height="30" rx="5" fill="#1e293b"/>
        <text x="61" y="67" font-size="16" fill="#fff">N</text>
      </g>
    </g>`
  },
  {
    label: 'Legami e molecole',
    bg: '#7c3aed',
    svg: `<g>
      <rect x="18" y="34" width="52" height="16" rx="8" fill="#fff" opacity="0.95"/>
      <circle cx="22" cy="42" r="16" fill="#ef4444"/>
      <text x="22" y="47" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="900" fill="#fff">H</text>
      <circle cx="66" cy="42" r="18" fill="#38bdf8"/>
      <text x="66" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="900" fill="#0a2a3a">O</text>
      <circle cx="38" cy="42" r="2.6" fill="#7c3aed"/>
      <circle cx="46" cy="42" r="2.6" fill="#7c3aed"/>
      <circle cx="54" cy="42" r="2.6" fill="#7c3aed"/>
    </g>`
  },
  {
    label: 'Molecole',
    bg: '#d6336c',
    svg: `<g stroke="#fff" stroke-width="3" stroke-linecap="round">
      <line x1="30" y1="30" x2="52" y2="24"/>
      <line x1="30" y1="30" x2="26" y2="54"/>
      <line x1="52" y1="24" x2="66" y2="40"/>
      <line x1="26" y1="54" x2="46" y2="64"/>
      <line x1="46" y1="64" x2="66" y2="40"/>
      <g stroke="none">
        <circle cx="30" cy="30" r="9" fill="#f5c518"/>
        <circle cx="52" cy="24" r="7" fill="#22c55e"/>
        <circle cx="66" cy="40" r="8" fill="#a855f7"/>
        <circle cx="26" cy="54" r="7.5" fill="#38bdf8"/>
        <circle cx="46" cy="64" r="8.5" fill="#ec4899"/>
      </g>
    </g>`
  }
];

const grid = document.getElementById('card-grid');
for (const s of SECTIONS) {
  const card = document.createElement(s.href ? 'a' : 'button');
  card.className = 'card';
  if (s.href) {
    card.href = s.href;
    card.target = '_blank';
    card.rel = 'noopener';
  } else {
    card.type = 'button';
  }
  card.innerHTML = `
    <div class="icon-box" style="background:${s.bg}">
      <svg viewBox="0 0 86 86" xmlns="http://www.w3.org/2000/svg">${s.svg}</svg>
    </div>
    <div class="label">${s.label}</div>
  `;
  grid.appendChild(card);
}
</script>

</body>
</html>
