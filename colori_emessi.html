// Deferred to the next frame: the canvas was just created via innerHTML,
// and reading its size before the browser has laid it out would give a
// stale/zero measurement, leaving the renderer stuck at a tiny default size.
requestAnimationFrame(()=>{
  viewerA=createViewer(document.getElementById('c'), document.getElementById('pane-a'));
  viewerA.camera.position.z=CAM_Z_DEFAULT; // apply the closer default zoom from the start, not just as a later animation target
  viewerA.rotX=0; viewerA.rotY=0; // no default tilt — this scene stays perfectly flat
  // This project keeps the atom fixed — no dragging to rotate it.
  document.getElementById('c').addEventListener('mousedown', e=>e.stopPropagation(), true);
  document.getElementById('c').addEventListener('wheel', e=>e.stopPropagation(), true);
  activeViewer=viewerA;
  animateAll();
  runIntroSequence();
});

// showSequenceBox now lives in chemverse-engine.js.

let seqColor1=null, seqColor2=null, seqColor3=null;

// ── BOX 1 — looping "energy in, jump, energy out" cycle ─────────────────────
// A stylized, non-physical demo: straight horizontal motion instead of the
// orbital-following path used elsewhere, built entirely from the shared
// engine's generalized ray functions (showLightRayTo/showOutwardRayFrom now
// accept explicit start positions/directions) and the new animateLinearMove
// helper — so this whole cycle is itself a reusable pattern, not a one-off.
let box1LoopActive=false;
let currentGrayOrbital=null;   // the gray dashed 2p preview, if one currently exists
let currentColoredRing=null;   // the colored 2p ring mesh, if the electron is currently there
let currentJumpElectron=null;  // the electron currently mid-cycle, even while detached from 2s
let box1Timeouts=[];

function clearBox1Timeouts(){
  for(const t of box1Timeouts) clearTimeout(t);
  box1Timeouts=[];
}

function getJumpElectron(){
  const layer=viewerA.currentLayer;
  if(!layer) return null;
  const rec=layer.rendered['2s'];
  if(!rec || rec.electrons.length<2) return null;
  return rec.electrons[1];
}

function startBox1Loop(){
  box1LoopActive=true;
  runBox1Cycle();
}

function stopBox1Loop(){
  box1LoopActive=false;
  clearBox1Timeouts();
}

function runBox1Cycle(){
  if(!box1LoopActive) return;
  const r2s=bohrKeyRadius('2s');
  const r2p=bohrKeyRadius('2p|x');
  const p2Gap=Math.max(0.1, r2p*0.07);
  const groundPos=new THREE.Vector3(r2s,0,0); // the rightmost point of the 2s ring
  const excitedPos=new THREE.Vector3(r2p+p2Gap,0,0); // the tip of the 2p|x lobe — the lemniscate formula adds the gap here, so this must match exactly to land on the real orbital
  const rayStart=new THREE.Vector3(-5,3.5,0); // arrives from up and to the left

  function buildColored2pTube(){
    const segs=120, pts=[];
    for(let j=0;j<=segs;j++){
      const p=lemniscatePoint(j/segs, r2p, p2Gap);
      pts.push(new THREE.Vector3(p.x, p.y, 0));
    }
    const curve=new THREE.CatmullRomCurve3(pts, true);
    const tube=visualStyle==='flat'?0.03:0.015;
    return new THREE.TubeGeometry(curve, 160, tube, 8, true);
  }

  const layer=viewerA.currentLayer;
  const ed=getJumpElectron();
  if(!ed || !layer) return;
  currentJumpElectron=ed;

  // The electron is pinned at the target FIRST — a real, visible electron
  // is already sitting there for the ray's whole flight, so the ray reads
  // as hitting an actual electron, not conjuring one on impact.
  ed.type='manual';
  ed.mesh.position.copy(groundPos);
  const originRec=layer.rendered['2s'];
  if(originRec){
    const idx=originRec.electrons.indexOf(ed);
    if(idx>=0) originRec.electrons.splice(idx,1);
  }

  showFloatingLabel('box1-label', "L'elettrone riceve energia...");
  showLightRayTo(groundPos.clone(), ()=>{
    if(!box1LoopActive) return;
    hideLightRayInstant(); // the received ray disappears the instant it hits

    // The "invisible" (not-yet-occupied) 2p orbital appears, previewing
    // where the jump is headed — exactly like Stati's empty-orbital preview.
    const grayColor=contrastingGrayColor();
    currentGrayOrbital=buildEmptyPOrbital(layer, '2p', 0, grayColor);
    fadeMaterialsOpacity([currentGrayOrbital.mat], 0, 0.85, 500);

    // The jump itself, timed exactly like a promotion in Stati.
    showFloatingLabel('box1-label', '...salta di livello...');
    const jumpArrow=showDirectionArrowLine(layer.group, groundPos, excitedPos, 0xffe27a);
    animateLinearMove(ed.mesh, groundPos, excitedPos, 2000, ()=>{
      jumpArrow.remove(1000);
      if(!box1LoopActive) return;

      // Lands on the 2p orbital, which turns from gray to colored.
      layer.group.remove(currentGrayOrbital.mesh);
      currentGrayOrbital=null;
      const color2p=ORB_COLORS['2p'];
      currentColoredRing=new THREE.Mesh(buildColored2pTube(), new THREE.MeshBasicMaterial({color:color2p, transparent:true, opacity:0}));
      layer.group.add(currentColoredRing);
      ed.mesh.material.color.set(color2p);
      layer.rendered['2p|x']={meshes:[currentColoredRing], electrons:[{mesh:ed.mesh, orb:'2p|x', a:r2p, gap:p2Gap, rot:0, t:0, speed:0, type:'manual'}]};
      fadeMaterialsOpacity([currentColoredRing.material, ed.mesh.material], 0, 1, 500);
      blinkMaterialsTwice([currentColoredRing.material], 1);
      showFloatingLabel('box1-label', '...diventa instabile...');
      ed.pulsing=true; ed.pulseAmp=0.35; ed.pulseBase=1; // same pulsing mechanic as Stati's excited electron

      // The 2s origin only turns gray if it's now genuinely empty — same
      // rule Stati uses. Beryllium's 2s still has its other electron, so
      // this normally stays colored.
      let originGrayedOut=false;
      if(originRec && originRec.electrons.length===0){
        originGrayedOut=true;
        for(const m of originRec.meshes) layer.group.remove(m);
        delete layer.rendered['2s'];
        const grayS=buildEmptySOrbital(layer, '2s', grayColor);
        fadeMaterialsOpacity([grayS.mat], 0, 0.85, 500);
      }

      const t1=setTimeout(()=>{
        if(!box1LoopActive) return;
        ed.pulsing=false; ed.mesh.scale.setScalar(1);
        showFloatingLabel('box1-label', '...torna allo stato di riposo...');
        // Falls back to the ground orbital, but stays on the right side
        // (groundPos IS the rightmost point of 2s — no separate move needed).
        const fallArrow=showDirectionArrowLine(layer.group, excitedPos, groundPos, 0xffe27a);
        animateLinearMove(ed.mesh, excitedPos, groundPos, 2000, ()=>{
          fallArrow.remove(1000);
          if(!box1LoopActive) return;

          // Settles for a beat before the orbital empties out and the next
          // packet fires — the emission follows the settling, not the landing.
          const t1c=setTimeout(()=>{
            if(!box1LoopActive) return;
            showOutwardRayFrom(groundPos.clone(), null, new THREE.Vector3(1,0,0));
            showFloatingLabel('box1-label', "...e rilascia l'energia che aveva ricevuto");
            document.getElementById('seq-box1-ok').style.visibility='visible';

            // The 2p orbital empties back out (gray again); the 2s origin
            // regains its color (rebuilding it if it had been grayed out).
            layer.group.remove(currentColoredRing);
            currentColoredRing=null;
            delete layer.rendered['2p|x'];
            currentGrayOrbital=buildEmptyPOrbital(layer, '2p', 0, contrastingGrayColor());
            fadeMaterialsOpacity([currentGrayOrbital.mat], 0, 0.85, 500);

            ed.mesh.material.color.set(ORB_COLORS['2s']);
            // (if the origin had been fully grayed out above, a complete
            // rebuild of its colored ring would be needed here too — not
            // exercised for Beryllium, since its 2s always keeps its other
            // electron, but noted for reuse with single-electron origins.)
            const rec2s=layer.rendered['2s'];
            if(rec2s){
              ed.orb='2s';
              ed.r=r2s;
              ed.theta=0;
              ed.type='bohr';
              rec2s.electrons.push(ed);
            }

            // The jump happens once — from here on, all electron motion
            // stops and the atom just keeps emitting, until OK is pressed.
            electronsFrozen=true;
            startEnergyPacketStream();
          }, 2000);
          box1Timeouts.push(t1c);
        });
      }, 2000);
      box1Timeouts.push(t1);
    });
  }, null, rayStart);
}

// ── BOX 2 — the jump settles, energy keeps leaving in repeated bursts ───────
let box2Timeouts=[];
let box2StreamActive=false;

function clearBox2Timeouts(){
  for(const t of box2Timeouts) clearTimeout(t);
  box2Timeouts=[];
}

// Once the jump settles, the whole atom stops (no more orbiting) and the
// electron stays put, but it keeps releasing energy — shown as repeated,
// separate ray bursts (rather than one continuous ray) to read as discrete
// "packets". Once the eye has been revealed, each packet is redirected to
// fly straight to the pupil and disappear there instead of flying off.
function startEnergyPacketStream(){
  if(box2StreamActive) return; // already running — don't start a second overlapping chain
  box2StreamActive=true;
  fireOnePacket();
}

function stopEnergyPacketStream(){
  box2StreamActive=false;
}

let rayTargetsEye=false;

// ── SLOW PULSING RAY (box2 onward) ──────────────────────────────────────────
// A row of dashes drifting slowly to the right, with a single dash lit up
// brighter at a time, sweeping from the first dash to the last, looping.
let pulsingRayActive=false;
let pulsingRayGroup=null;
let pulsingRayDashMats=[];
let pulsingRayFrame=null;
let pulsingRayStopX=null; // world x where the ray should stop (box3: in front of the eye); null = flies indefinitely

function stopPulsingRay(){
  pulsingRayActive=false;
  if(pulsingRayFrame){ cancelAnimationFrame(pulsingRayFrame); pulsingRayFrame=null; }
  if(pulsingRayGroup){
    const layer=viewerA.currentLayer;
    if(layer) layer.group.remove(pulsingRayGroup);
    for(const child of pulsingRayGroup.children) child.geometry.dispose();
    pulsingRayGroup=null;
  }
  pulsingRayDashMats=[];
}

// ── WAVE RAY (box4 onward) — the same energy shown as a continuous wave
// instead of discrete "packet" dashes, traveling from the electron to the
// eye and staying there, phase-animated so it visibly ripples along.
let waveRayActive=false;
let waveRayMesh=null;
let waveRayFrame=null;

function stopWaveRay(){
  waveRayActive=false;
  if(waveRayFrame){ cancelAnimationFrame(waveRayFrame); waveRayFrame=null; }
  if(waveRayMesh){
    const layer=viewerA.currentLayer;
    if(layer) layer.group.remove(waveRayMesh);
    for(const child of waveRayMesh.children) child.geometry.dispose();
    waveRayMesh=null;
  }
}

// ── BRAIN COLOR + PULSE (box6) ───────────────────────────────────────────────
// The 26 paths that make up the brain in the head illustration were tagged
// with class="brain-part" when the SVG was built (identified by their
// original pink/magenta fill, distinct from the skin tone). Each one
// recolors and pulses around its own center — not a single rigid shape, but
// close enough for a synchronized-looking pulse at this scale.
function setBrainColor(colorHex){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts) p.setAttribute('fill', colorHex);
}

function restoreBrainColors(){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts){
    const orig=p.getAttribute('data-orig-fill');
    if(orig) p.setAttribute('fill', orig);
  }
}

function pulseBrainOnce(){
  const parts=document.querySelectorAll('#eye-head .brain-part');
  for(const p of parts){
    p.classList.remove('brain-pulse');
    void p.offsetWidth; // restart the animation even if it's still playing
    p.classList.add('brain-pulse');
  }
}


let waveTargetProps={amplitude:0.16, wavelength:0.55, color:new THREE.Color(0xffd76b)};
let waveSnapRequested=false;

function setWaveStyle(amplitude, wavelength, color, instant){
  if(amplitude!==undefined) waveTargetProps.amplitude=amplitude;
  if(wavelength!==undefined) waveTargetProps.wavelength=wavelength;
  if(color!==undefined) waveTargetProps.color=new THREE.Color(color);
  if(instant) waveSnapRequested=true;
}

function startWaveRay(fromX, toX){
  stopWaveRay();
  const layer=viewerA.currentLayer;
  if(!layer) return;
  waveRayActive=true;

  waveProps={amplitude:waveTargetProps.amplitude, wavelength:waveTargetProps.wavelength, color:waveTargetProps.color.getHex()};
  const tubeRadius=0.035;
  const pointsPerDash=4;
  const currentColor=new THREE.Color(waveProps.color);
  const mat=new THREE.MeshBasicMaterial({color:currentColor, transparent:true, opacity:0.9});

  function waveY(x, phase){
    return waveProps.amplitude*Math.sin((x-fromX)/waveProps.wavelength*Math.PI*2 - phase);
  }

  function buildWaveGeometry(phase){
    const group=new THREE.Group();
    // dash size scales with the current wavelength — a tight, high-frequency
    // wave needs much smaller dashes to still read clearly as a wave shape
    const dashLen=Math.max(0.008, waveProps.wavelength*0.05);
    const gapLen=Math.max(0.006, waveProps.wavelength*0.04);
    let x=fromX;
    while(x<toX){
      const dashEnd=Math.min(x+dashLen, toX);
      const pts=[];
      for(let i=0;i<=pointsPerDash;i++){
        const px=x+(dashEnd-x)*(i/pointsPerDash);
        pts.push(new THREE.Vector3(px, waveY(px,phase), 0));
      }
      if(pts.length>=2){
        const curve=new THREE.CatmullRomCurve3(pts);
        const geo=new THREE.TubeGeometry(curve, pointsPerDash, tubeRadius, 6, false);
        group.add(new THREE.Mesh(geo, mat));
      }
      x+=dashLen+gapLen;
    }
    return group;
  }

  waveRayMesh=buildWaveGeometry(0);
  waveRayMesh.position.y=0;
  layer.group.add(waveRayMesh);

  const startTime=performance.now();
  (function step(){
    if(!waveRayActive) return;
    const elapsed=(performance.now()-startTime)/1000;
    const phase=elapsed*3.2; // travel speed of the ripple

    // smoothly drift the live properties toward whatever was last requested
    // — unless an instant snap was requested, which jumps straight there
    if(waveSnapRequested){
      waveProps.amplitude=waveTargetProps.amplitude;
      waveProps.wavelength=waveTargetProps.wavelength;
      currentColor.copy(waveTargetProps.color);
      waveSnapRequested=false;
    } else {
      waveProps.amplitude+=(waveTargetProps.amplitude-waveProps.amplitude)*0.015;
      waveProps.wavelength+=(waveTargetProps.wavelength-waveProps.wavelength)*0.015;
      currentColor.lerp(waveTargetProps.color, 0.015);
    }
    waveProps.color=currentColor.getHex();
    mat.color.copy(currentColor);

    const oldMesh=waveRayMesh;
    waveRayMesh=buildWaveGeometry(phase);
    waveRayMesh.position.y=0;
    layer.group.add(waveRayMesh);
    layer.group.remove(oldMesh);
    for(const child of oldMesh.children) child.geometry.dispose();
    waveRayFrame=requestAnimationFrame(step);
  })();
}

function startPulsingRay(stopX){
  stopPulsingRay();
  const layer=viewerA.currentLayer;
  if(!layer) return;
  pulsingRayActive=true;
  pulsingRayStopX=(stopX===undefined)?null:stopX;
  pulsingRayGroup=new THREE.Group();
  pulsingRayGroup.position.y=0; // starts exactly at the electron's height, no gap
  layer.group.add(pulsingRayGroup);

  const r2s=bohrKeyRadius('2s');
  const originX=r2s;
  const dashLen=0.28, gapLen=0.14, radius=0.042;
  const targetX=(pulsingRayStopX!==null) ? pulsingRayStopX : originX+7; // longer flow
  const totalSpan=Math.max(dashLen, targetX-originX);
  const dashCount=Math.max(2, Math.round(totalSpan/(dashLen+gapLen)));
  const goldColor=new THREE.Color(0xffd700), orangeColor=new THREE.Color(0xff8c00);
  pulsingRayDashMats=[];
  for(let i=0;i<dashCount;i++){
    const x0=originX+i*(dashLen+gapLen);
    const x1=Math.min(x0+dashLen, targetX);
    if(x1<=x0) break;
    const geo=new THREE.TubeGeometry(new THREE.LineCurve3(new THREE.Vector3(x0,0,0), new THREE.Vector3(x1,0,0)), 2, radius, 8, false);
    const mat=new THREE.MeshBasicMaterial({color:goldColor.clone(), transparent:true, opacity:0.25});
    pulsingRayGroup.add(new THREE.Mesh(geo, mat));
    pulsingRayDashMats.push(mat);
  }

  const pulseCycleMs=2200; // time for one full left-to-right sweep

  (function step(){
    if(!pulsingRayActive) return;
    const now=performance.now();

    const t=(now/pulseCycleMs)%1;
    const activeIdx=Math.floor(t*pulsingRayDashMats.length);
    for(let i=0;i<pulsingRayDashMats.length;i++){
      const isActive=(i===activeIdx);
      pulsingRayDashMats[i].opacity=isActive?1:0.25;
      pulsingRayDashMats[i].color.copy(isActive?orangeColor:goldColor);
    }

    pulsingRayFrame=requestAnimationFrame(step);
  })();
}

const EYE_WORLD_TARGET=new THREE.Vector3(6.5,0,0); // roughly where the eye overlay sits once zoomed/panned — pulled back again, still overshooting the head at 7.6

function fireOnePacket(){
  if(!box2StreamActive) return;
  const r2s=bohrKeyRadius('2s');
  const origin=new THREE.Vector3(r2s,0,0);
  if(rayTargetsEye){
    showLightRayTo(EYE_WORLD_TARGET.clone(), ()=>{
      hideLightRayInstant(); // absorbed by the eye — doesn't travel any further
    }, null, origin);
  } else {
    showOutwardRayFrom(origin, null, new THREE.Vector3(1,0,0));
  }
  const t=setTimeout(fireOnePacket, 1600);
  box2Timeouts.push(t);
}

function settleJumpAtGround(){
  stopBox1Loop();
  hideLightRayInstant();
  hideFloatingLabel('box1-label');
  electronsFrozen=true; // the whole atom settles into stillness
  const layer=viewerA.currentLayer;
  const ed=currentJumpElectron || getJumpElectron();

  // Clean up anything left over from an interrupted cycle: a gray preview
  // orbital, a colored 2p ring, or the electron still parked in 2p|x.
  if(layer){
    if(currentGrayOrbital){
      layer.group.remove(currentGrayOrbital.mesh);
      currentGrayOrbital=null;
    }
    if(currentColoredRing){
      layer.group.remove(currentColoredRing);
      currentColoredRing=null;
    }
    delete layer.rendered['2p|x'];
  }

  if(ed){
    const r2s=bohrKeyRadius('2s');
    ed.type='bohr';
    ed.theta=0;
    ed.r=r2s;
    ed.mesh.position.set(r2s,0,0);
    ed.mesh.material.color.set(ORB_COLORS['2s']); // in case it was mid-jump and still colored as 2p
    const rec2s=layer && layer.rendered['2s'];
    if(rec2s && rec2s.electrons.indexOf(ed)===-1){
      ed.orb='2s'; ed.r=r2s;
      rec2s.electrons.push(ed); // put it back if the interruption caught it mid-flight, detached from 2s
    }
  }
  currentJumpElectron=null;
  startEnergyPacketStream();
}

// ── CAMERA ZOOM + PAN (frames only the left portion of the atom) ────────────
const CAM_Z_DEFAULT=9.5, CAM_X_DEFAULT=0;
const CAM_Z_ZOOMED=6.5, CAM_X_ZOOMED=3.2;

// Bohr-type electrons get their mesh position recomputed from ed.r/ed.theta
// every single frame in the render loop, regardless of electronsFrozen —
// so animating ed.mesh.position directly gets silently overwritten each
// frame. This tweens ed.r itself (with ed.theta pinned to 0, matching the
// rightmost point of the ring) so the jump is actually visible.
// Swaps which orbital ring looks "active" (colored, like a real occupied
// orbital) versus "empty" (gray/dashed) — toExcited=true means the outer
// (2p) ring becomes the colored one and 2s fades to gray; false reverses it.
let solid2pRing=null, dashed2sRing=null;

function buildSolidLemniscateTube(layer, radius, color){
  const gap=Math.max(0.1, radius*0.07);
  const segs=160, pts=[];
  for(let i=0;i<=segs;i++){
    const p=lemniscatePoint(i/segs, radius, gap);
    pts.push(new THREE.Vector3(p.x,p.y,0));
  }
  const curve=new THREE.CatmullRomCurve3(pts, true);
  const geo=new THREE.TubeGeometry(curve, 160, 0.028, 8, true);
  const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.7});
  const mesh=new THREE.Mesh(geo, mat);
  mesh.visible=false;
  layer.group.add(mesh);
  return {mesh, mat};
}

function buildDashedCircleTube(layer, radius, color){
  const group=new THREE.Group();
  const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0.5, depthWrite:false});
  const segs=180, dashOn=3, dashOff=2, tubeRadius=0.028;
  let i=0;
  while(i<segs){
    if((i%(dashOn+dashOff))<dashOn){
      const a0=(i/segs)*Math.PI*2, a1=((i+1)/segs)*Math.PI*2;
      const v0=new THREE.Vector3(radius*Math.cos(a0), radius*Math.sin(a0), 0);
      const v1=new THREE.Vector3(radius*Math.cos(a1), radius*Math.sin(a1), 0);
      const geo=new THREE.TubeGeometry(new THREE.LineCurve3(v0,v1), 1, tubeRadius, 6, false);
      group.add(new THREE.Mesh(geo, mat));
    }
    i++;
  }
  group.visible=false;
  layer.group.add(group);
  return {mesh:group, mat};
}

function getContrastGray(){
  const bgHex=(getComputedStyle(document.documentElement).getPropertyValue('--flat-bg')||'#0e6b78').trim();
  const [,,l]=hexToHsl(bgHex);
  return l>0.55 ? 0x555b60 : 0xe8ecef; // dark gray on light backgrounds, light gray on dark ones
}

function ensureSwapRingsBuilt(layer){
  const grayColor=getContrastGray();
  if(!solid2pRing){
    const r2pRaw=bohrKeyRadius('2p|x');
    solid2pRing=buildSolidLemniscateTube(layer, r2pRaw, 0xff4488);
  }
  if(!dashed2sRing){
    const r2s=bohrKeyRadius('2s');
    dashed2sRing=buildDashedCircleTube(layer, r2s, grayColor);
  }
}

function swapOrbitalActive(layer, toExcited){
  ensureSwapRingsBuilt(layer);
  const rec2s=layer.rendered['2s'];
  const solidRing2s=rec2s && rec2s.meshes[0];
  // when excited: hide the solid 2s ring, show the dashed 2s ring instead;
  // hide the dashed 2p (potential) ring, show the solid 2p ring instead
  if(solidRing2s) solidRing2s.visible=!toExcited;
  if(dashed2sRing) dashed2sRing.mesh.visible=toExcited;
  if(potentialOrbital && potentialOrbital.mesh) potentialOrbital.mesh.visible=!toExcited;
  if(solid2pRing) solid2pRing.mesh.visible=toExcited;
}

// showFloatingLabel animates left/top along with opacity, which slides the
// label in from its previous position if it differs — this jumps straight
// to the target position first, then only fades opacity in.
function showFloatingLabelNoSlide(id, text, color, left, top){
  const el=document.getElementById(id);
  if(!el) return;
  const prevTransition=el.style.transition;
  el.style.transition='none';
  el.style.left=left;
  el.style.top=top;
  el.style.opacity='0';
  void el.offsetWidth; // force reflow so the position change above applies before we restore the transition
  el.style.transition=prevTransition;
  showFloatingLabel(id, text, color, left, top);
}

function animateElectronRadius(ed, fromR, toR, duration, onDone){
  ed.theta=0;
  ed.r=fromR;
  const start=performance.now();
  (function step(){
    const now=performance.now();
    const t=Math.min(1,(now-start)/duration);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    ed.r=fromR+(toR-fromR)*ease;
    if(t<1) requestAnimationFrame(step);
    else if(onDone) onDone();
  })();
}

function animateCamera(targetZ, targetX, duration, onDone){
  const cam=viewerA.camera;
  const startZ=cam.position.z, startX=cam.position.x;
  const t0=performance.now();
  (function step(){
    const now=performance.now();
    const t=Math.min(1,(now-t0)/duration);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    cam.position.z=startZ+(targetZ-startZ)*ease;
    cam.position.x=startX+(targetX-startX)*ease;
    if(t<1) requestAnimationFrame(step);
    else if(onDone) onDone();
  })();
}

// ── BOX NAVIGATION ────────────────────────────────────────────────────────
function startEnlargeSequence(){
  document.getElementById('seq-box1-ok').style.visibility='hidden';
  electronsFrozen=true; // the electrons stop spinning for this close-up
  stopPulsingRay();
  stopWaveRay();

  const layer=viewerA.currentLayer;
  if(!layer) return;

  const rec1s=layer.rendered['1s'];
  if(rec1s && rec1s.electrons[1]) rec1s.electrons[1].mesh.visible=false;

  ensureSwapRingsBuilt(layer); // built now, well ahead of the jump, to avoid any hitch right when it lands

  // enlarge the atom a bit more, panned further right so it sits toward the
  // left side of the frame — all three orbitals (including the outer 2p)
  // stay comfortably in view
  const r2p=bohrKeyRadius('2p|x');
  animateCamera(3.5, r2p*0.85, 2600);

  // the two scenes (normal, then enlarged) run straight into each other —
  // no box interrupts in between, but the photon stream still plays
  const t=setTimeout(()=>{
    showSequenceBox('seq-box4', 'L\'elettrone compie il salto solo quando riceve l\'esatta differenza di energia che c\'è fra i due orbitali', seqColor2);
    document.getElementById('seq-box4-ok').style.visibility='visible';
    document.getElementById('seq-box4-back').style.visibility='visible';
    startBigPhotonRay(layer);
    showFloatingLabelNoSlide('box1-label', 'I fotoni portano quantità di energia diverse', '#fff', '78%', '30%');
  }, 2600);
  box2Timeouts.push(t);
}

function backFromEnlarge(){
  clearBox2Timeouts();
  hideFloatingLabel('box1-label');
  const layer=viewerA.currentLayer;
  if(layer){
    stopBigPhotonRay(layer);
    swapOrbitalActive(layer, false);
    const rec1s=layer.rendered['1s'];
    if(rec1s && rec1s.electrons[1]) rec1s.electrons[1].mesh.visible=true;
  }
  document.getElementById('seq-box4').classList.remove('show');
  document.getElementById('seq-box1').classList.add('show');
  document.getElementById('seq-box1-ok').style.visibility='visible';
  electronsFrozen=false;
  animateCamera(CAM_Z_DEFAULT, CAM_X_DEFAULT, 1500);
}

// ── box4's OK: the energy bar appears, sitting still — the electron hasn't
// jumped yet, this is just showing the energy that a jump will require ────
let photonBeamGroup=null, photonBeamFrame=null;
function advanceToBox5(){
  document.getElementById('seq-box4-ok').style.visibility='hidden';
  document.getElementById('seq-box4-back').style.visibility='hidden';

  const layer=viewerA.currentLayer;
  if(!layer) return;
  freezeBigPhotonRay(layer);
  hideFloatingLabel('box1-label');
  // clear any pulsing state left over from the photon stream — a stray
  // reset timeout from that loop could otherwise leave the wrong electron
  // visibly pulsing into this next scene
  const rec2sClear=layer.rendered['2s'];
  if(rec2sClear) for(const e of rec2sClear.electrons){ e.pulsing=false; e.mesh.scale.setScalar(1); }
  const ed=getJumpElectron();
  if(ed){
    currentJumpElectron=ed;
    const r2s=bohrKeyRadius('2s');
    ed.type='bohr';
    ed.theta=0;
    ed.r=r2s;
    ed.mesh.position.set(r2s,0,0);
  }
  const r2s=bohrKeyRadius('2s'), r2pRaw=bohrKeyRadius('2p|x'), r2p=r2pRaw+Math.max(0.1, r2pRaw*0.07);
  const groundPos=new THREE.Vector3(r2s,0,0);
  const excitedPos=new THREE.Vector3(r2p,0,0);
  photonBeamGroup=startBlinkingPhotonBeam(layer, groundPos, excitedPos);

  showSequenceBox('seq-box5', 'Il fotone con la quantità "giusta" di energia si dice <b>RISONANTE</b>.<br>Ora l\'elettrone può "saltare"', seqColor3);
  document.getElementById('seq-box5-ok').style.visibility='visible';
  document.getElementById('seq-box5-back').style.visibility='visible';
}

function backFromBox5(){
  const layer=viewerA.currentLayer;
  if(layer){
    stopBlinkingPhotonBeam(layer);
    unfreezeBigPhotonRay(layer); // box4's scene includes the photon stream — restart it, fresh and fully visible
  }
  showFloatingLabelNoSlide('box1-label', 'I fotoni portano quantità di energia diverse', '#fff', '78%', '30%');
  document.getElementById('seq-box5').classList.remove('show');
  document.getElementById('seq-box4-ok').style.visibility='visible';
  document.getElementById('seq-box4-back').style.visibility='visible';
}

// ── box5's OK: the energy bar disappears, the electron actually jumps now,
// and pulses once it lands ───────────────────────────────────────────────
function advanceToBox6(){
  document.getElementById('seq-box5-ok').style.visibility='hidden';
  document.getElementById('seq-box5-back').style.visibility='hidden';

  const layer=viewerA.currentLayer;
  if(!layer) return;
  stopBlinkingPhotonBeam(layer);
  stopBigPhotonRay(layer);

  // re-fetch a valid electron if the stored reference has gone stale
  // (detached from the current 2s ring)
  let ed=currentJumpElectron;
  const rec2s=layer.rendered['2s'];
  if(!ed || !rec2s || !rec2s.electrons.includes(ed)){
    ed=getJumpElectron();
    currentJumpElectron=ed;
  }

  const r2s=bohrKeyRadius('2s'), r2pRaw=bohrKeyRadius('2p|x'), r2p=r2pRaw+Math.max(0.1, r2pRaw*0.07);
  const groundPos=new THREE.Vector3(r2s,0,0);
  const excitedPos=new THREE.Vector3(r2p,0,0);

  function showBox6(){
    showSequenceBox('seq-box6', 'Quando l\'elettrone torna all\'orbitale di partenza, rilascia esattamente <b>QUELLA</b> quantità di energia', seqColor1);
    document.getElementById('seq-box6-ok').style.visibility='visible';
    document.getElementById('seq-box6-back').style.visibility='visible';
  }

  if(!ed){ showBox6(); return; } // no electron found — still advance the story

  ed.type='bohr'; ed.theta=0; ed.r=r2s;
  ed.mesh.position.copy(groundPos);
  const jumpArrow=showDirectionArrowLine(layer.group, groundPos, excitedPos, 0xffe27a);
  animateElectronRadius(ed, r2s, r2p, 1600, ()=>{
    jumpArrow.remove(600);
    ed.pulsing=true; // pulses right as it lands
    swapOrbitalActive(layer, true); // the departure orbital fades, the arrival one lights up
    if(rec2s) for(const other of rec2s.electrons){ if(other!==ed) other.mesh.visible=false; } // the departure orbital shows no electrons at all
    showBox6();
  });
}

function backFromBox6(){
  const layer=viewerA.currentLayer;
  document.getElementById('seq-box6').classList.remove('show');
  const ed=currentJumpElectron;
  if(ed){
    ed.pulsing=false; ed.mesh.scale.setScalar(1);
    const r2s=bohrKeyRadius('2s');
    ed.theta=0;
    ed.r=r2s;
    ed.mesh.position.set(r2s,0,0);
  }
  if(layer){
    swapOrbitalActive(layer, false);
    const rec2sBack=layer.rendered['2s'];
    if(rec2sBack) for(const other of rec2sBack.electrons){ other.mesh.visible=true; }
    const r2s=bohrKeyRadius('2s'), r2pRaw=bohrKeyRadius('2p|x'), r2p=r2pRaw+Math.max(0.1, r2pRaw*0.07);
    photonBeamGroup=startBlinkingPhotonBeam(layer, new THREE.Vector3(r2s,0,0), new THREE.Vector3(r2p,0,0));
    startBigPhotonRay(layer);
    freezeBigPhotonRay(layer);
  }
  document.getElementById('seq-box5-ok').style.visibility='visible';
  document.getElementById('seq-box5-back').style.visibility='visible';
}

// A thick yellow beam between two points, the same height as the earlier
// photon stream's rectangles, that blinks steadily.
function makeFotoneTextSprite(){
  const canvas=document.createElement('canvas');
  canvas.width=320; canvas.height=110;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#111';
  ctx.font='bold 38px Manrope, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('FOTONE', 160, 38);
  ctx.fillText('RISONANTE', 160, 80);
  return new THREE.CanvasTexture(canvas);
}

function startBlinkingPhotonBeam(layer, fromPos, toPos){
  const group=new THREE.Group();
  const dx=toPos.x-fromPos.x, dy=toPos.y-fromPos.y;
  const dist=Math.hypot(dx,dy);
  const angle=Math.atan2(dy,dx);
  const beamHeight=0.28; // matches the earlier photon stream's rectangle height

  const beamGeo=new THREE.PlaneGeometry(dist, beamHeight);
  const beamMat=new THREE.MeshBasicMaterial({color:0xffd700, transparent:true, opacity:0.9, depthWrite:false});
  const beam=new THREE.Mesh(beamGeo, beamMat);
  beam.position.set((fromPos.x+toPos.x)/2, (fromPos.y+toPos.y)/2, 0.03);
  beam.rotation.z=angle;
  group.add(beam);

  // "ENERGIA" in black, centered directly on the beam — a real in-scene
  // sprite, not a floating HTML label, so it naturally travels with the
  // beam (including later, when it flies away)
  const textTex=makeFotoneTextSprite();
  const textMat=new THREE.SpriteMaterial({map:textTex, transparent:true, depthWrite:false});
  const textSprite=new THREE.Sprite(textMat);
  textSprite.scale.set(dist*0.85, dist*0.85*(110/320), 1);
  textSprite.position.set((fromPos.x+toPos.x)/2, (fromPos.y+toPos.y)/2, 0.035);
  group.add(textSprite);

  layer.group.add(group);

  const startTime=performance.now();
  (function step(){
    if(!group.parent) return;
    const elapsed=(performance.now()-startTime)/1000;
    beamMat.opacity=0.55+0.4*Math.sin(elapsed*5);
    photonBeamFrame=requestAnimationFrame(step);
  })();

  return group;
}

function stopBlinkingPhotonBeam(layer){
  if(photonBeamFrame){ cancelAnimationFrame(photonBeamFrame); photonBeamFrame=null; }
  if(photonBeamGroup){
    layer.group.remove(photonBeamGroup);
    photonBeamGroup.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); });
    photonBeamGroup=null;
  }
}

// ── box6's OK: the electron falls back, and when it lands, releases the
// same energy again — this time flying away ─────────────────────────────
function advanceFromBox6(){
  const layer=viewerA.currentLayer;
  if(!layer) return;
  document.getElementById('seq-box6-ok').style.visibility='hidden';
  document.getElementById('seq-box6-back').style.visibility='hidden';

  const ed=currentJumpElectron;
  if(!ed) return;
  const r2s=bohrKeyRadius('2s'), r2pRaw=bohrKeyRadius('2p|x'), r2p=r2pRaw+Math.max(0.1, r2pRaw*0.07);
  const excitedPos=new THREE.Vector3(r2p,0,0);
  const groundPos=new THREE.Vector3(r2s,0,0);
  ed.theta=0; ed.r=r2p;
  ed.mesh.position.copy(excitedPos);
  ed.pulsing=false; ed.mesh.scale.setScalar(1);

  const fallArrow=showDirectionArrowLine(layer.group, excitedPos, groundPos, 0xffe27a);
  animateElectronRadius(ed, r2p, r2s, 1600, ()=>{
    fallArrow.remove(1000);
    swapOrbitalActive(layer, false); // the arrival (ground) orbital lights back up, the excited one fades
    const rec2sBack=layer.rendered['2s'];
    if(rec2sBack) for(const other of rec2sBack.electrons){ other.mesh.visible=true; }
    // the energy starts exactly at the electron, extending toward its flight direction
    const flightDir=new THREE.Vector3(1,0.7,0).normalize();
    const shortEnd=groundPos.clone().addScaledVector(flightDir, 0.6);
    const emitBeam=startBlinkingPhotonBeam(layer, groundPos, shortEnd);
    photonBeamGroup=emitBeam;

    setTimeout(()=>{
      flyAwayPhotonBeam(layer, emitBeam);
    }, 2000);
  });
}

function flyAwayPhotonBeam(layer, beamGroup){
  const dir=new THREE.Vector3(1,0.7,0).normalize();
  const flightAngle=Math.atan2(dir.y, dir.x);
  beamGroup.rotation.z=flightAngle; // orient the beam along its own flight path
  const startTime=performance.now();
  (function step(){
    if(!beamGroup.parent) return;
    const elapsed=(performance.now()-startTime)/1000;
    const dist=elapsed*1.6;
    beamGroup.position.set(dir.x*dist, dir.y*dist, 0);
    beamGroup.traverse(obj=>{ if(obj.material) obj.material.opacity=Math.max(0, obj.material.opacity-0.012); });
    if(elapsed<2.2){
      requestAnimationFrame(step);
    } else {
      stopBlinkingPhotonBeam(layer);
    }
  })();
}

// A photon ray, arriving from the right, with much bigger photon markers —
// each one carrying the word "FOTONE" — aimed at the electron sitting on
// the 1s orbital.
let bigPhotonGroup=null, bigPhotonFrame=null, pulseResetTimeout=null;
function makeFotoneSprite(){
  const canvas=document.createElement('canvas');
  canvas.width=320; canvas.height=180;
  const ctx=canvas.getContext('2d');
  const r=18;
  ctx.fillStyle='#ffd76b';
  ctx.beginPath();
  ctx.moveTo(r,0);
  ctx.arcTo(320,0,320,180,r);
  ctx.arcTo(320,180,0,180,r);
  ctx.arcTo(0,180,0,0,r);
  ctx.arcTo(0,0,320,0,r);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle='#5a3d00';
  ctx.font='bold 58px Manrope, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('FOTONE', 160, 90);
  const tex=new THREE.CanvasTexture(canvas);
  return tex;
}

function startBigPhotonRay(layer){
  if(bigPhotonGroup) return;
  const rec2s=layer.rendered['2s'];
  const targetEd=rec2s && rec2s.electrons[0];
  const r2s=bohrKeyRadius('2s');
  // pin the target electron to the rightmost point of its ring — the ray
  // only travels along y=0, so the target needs to actually sit there too
  if(targetEd){
    targetEd.theta=0;
    targetEd.r=r2s;
    targetEd.mesh.position.set(r2s,0,0);
  }
  const targetPos=new THREE.Vector3(r2s,0,0);

  const r2p=bohrKeyRadius('2p|x');
  const startX=r2p*1.8; // off to the right, outside the enlarged view
  const travelSpan=startX-targetPos.x;
  const tex=makeFotoneSprite();
  bigPhotonGroup=new THREE.Group();
  const photons=[];
  const photonH=0.28, gap=0.04;
  const lengthMultipliers=[1.6, 0.55, 1.0, 0.75, 1.35, 0.5, 1.15, 0.85, 0.65, 1.2, 0.45]; // long, short, medium mixed
  const count=lengthMultipliers.length;
  const widths=lengthMultipliers.map(m=>0.5*m);
  // queue chain: each photon's offset is built directly on the previous
  // one's actual width, so the small gap between them is always the same
  // regardless of how long or short each piece is
  let cumOffset=0;
  for(let i=0;i<count;i++){
    const w=widths[i];
    cumOffset+=w/2;
    const mat=new THREE.SpriteMaterial({map:tex, transparent:true});
    const sprite=new THREE.Sprite(mat);
    sprite.scale.set(w,photonH,1);
    sprite.position.z=0.02;
    bigPhotonGroup.add(sprite);
    photons.push({mesh:sprite, mat, offset:cumOffset, halfWidth:w/2});
    cumOffset+=w/2+gap;
  }
  const loopPeriod=cumOffset*1.05;
  layer.group.add(bigPhotonGroup);

  const speed=travelSpan/3.2; // each lap takes ~3.2s — slower
  const startTime=performance.now();
  let lastHitPulse=0;
  (function step(){
    if(!bigPhotonGroup) return;
    const elapsed=(performance.now()-startTime)/1000;
    for(const p of photons){
      const traveled=((elapsed*speed+p.offset)%loopPeriod);
      const x=startX-traveled;
      p.mesh.position.x=x;
      // the electron is always the true endpoint — instantly invisible the
      // moment it would reach or pass it, instead of piling up there or
      // drifting past it
      p.mat.opacity=(x-p.halfWidth>targetPos.x) ? 1 : 0;
    }
    // pulse the target electron periodically, roughly every lap, as photons keep arriving
    if(elapsed-lastHitPulse>loopPeriod/speed){
      lastHitPulse=elapsed;
      if(targetEd){
        targetEd.pulsing=true;
        pulseResetTimeout=setTimeout(()=>{ if(targetEd){ targetEd.pulsing=false; targetEd.mesh.scale.setScalar(1); } }, 300);
      }
    }
    bigPhotonFrame=requestAnimationFrame(step);
  })();
}

function stopBigPhotonRay(layer){
  if(bigPhotonFrame){ cancelAnimationFrame(bigPhotonFrame); bigPhotonFrame=null; }
  if(pulseResetTimeout){ clearTimeout(pulseResetTimeout); pulseResetTimeout=null; }
  if(bigPhotonGroup){
    layer.group.remove(bigPhotonGroup);
    bigPhotonGroup.traverse(obj=>{ if(obj.material){ if(obj.material.map) obj.material.map.dispose(); obj.material.dispose(); } });
    bigPhotonGroup=null;
  }
}

// Stops the stream's motion but leaves the photons visible, faded — used
// when the ENERGIA bar takes over as the focal point but the stream should
// still be seen sitting frozen underneath it.
function freezeBigPhotonRay(layer){
  if(bigPhotonFrame){ cancelAnimationFrame(bigPhotonFrame); bigPhotonFrame=null; }
  if(pulseResetTimeout){ clearTimeout(pulseResetTimeout); pulseResetTimeout=null; }
  if(bigPhotonGroup){
    bigPhotonGroup.traverse(obj=>{ if(obj.material && obj.material.opacity>0) obj.material.opacity=0.2; });
  }
}

function unfreezeBigPhotonRay(layer){
  stopBigPhotonRay(layer); // clears the frozen, dimmed group
  startBigPhotonRay(layer); // and starts a fresh one
}

// ── INIT ──────────────────────────────────────────────────────────────────
// Beryllium only ever needs these two orbitals — shown explicitly and
// immediately (no staggering) once the nucleus has finished forming, rather
// than relying on the generic desiredParts()/staggered-reveal flow.
let potentialOrbital=null;
function buildThickDashedPOrbital(layer, orb, subIdx, color){
  const sub=P_SUBS[subIdx];
  const key=orb+'|'+sub;
  const r=bohrKeyRadius(key);
  const rot=subIdx*(Math.PI/3);
  const a=r, gap=Math.max(0.1, r*0.07);
  const group=new THREE.Group();
  const mat=new THREE.MeshBasicMaterial({color, transparent:true, opacity:0, depthWrite:false});
  const segs=240, dashOn=2, dashOff=1, tubeRadius=0.028; // matches the visible orbitals' apparent thickness
  const cosr=Math.cos(rot), sinr=Math.sin(rot);
  let i=0;
  while(i<segs){
    if((i%(dashOn+dashOff))<dashOn){
      const p0=lemniscatePoint(i/segs, a, gap);
      const p1=lemniscatePoint((i+1)/segs, a, gap);
      const v0=new THREE.Vector3(p0.x*cosr-p0.y*sinr, p0.x*sinr+p0.y*cosr, 0);
      const v1=new THREE.Vector3(p1.x*cosr-p1.y*sinr, p1.x*sinr+p1.y*cosr, 0);
      const geo=new THREE.TubeGeometry(new THREE.LineCurve3(v0,v1), 1, tubeRadius, 6, false);
      group.add(new THREE.Mesh(geo, mat));
    }
    i++;
  }
  layer.group.add(group);
  return {mesh:group, mat, group:layer.group, key, type:'p', subIdx, a, gap, rot};
}

function ensureBothOrbitalsShown(){
  const layer=viewerA.currentLayer;
  if(!layer || !layer.nucleusReady){
    setTimeout(ensureBothOrbitalsShown, 150);
    return;
  }
  viewerA.applyPartsSet(new Set(['1s','2s']), false);
  if(!potentialOrbital){
    potentialOrbital=buildThickDashedPOrbital(layer, '2p', 0, getContrastGray());
    fadeMaterialsOpacity([potentialOrbital.mat], 0, 0.5, 1200);
  }
}

function runIntroSequence(){
  const bgHex=(getComputedStyle(document.documentElement).getPropertyValue('--flat-bg')||BG_PALETTE[0]).trim();
  const [bgHue]=hexToHsl(bgHex);
  const color1raw=nearestPaletteColor((bgHue+180)%360);
  const color2raw=nearestPaletteColor((bgHue+90)%360, [color1raw]);
  const color3raw=nearestPaletteColor((bgHue+270)%360, [color1raw, color2raw]);
  seqColor1=muteColor(color1raw);
  seqColor2=muteColor(color2raw);
  seqColor3=muteColor(color3raw);

  viewerA.selectElement(4); // Beryllium
  ensureBothOrbitalsShown();

  setTimeout(runEmitEnergyOnce, 800);
}

// A brief, one-shot version of the jump-and-release cycle: the electron
// jumps out, pulses, falls back, and releases a burst of energy — then
// box1's text and OK button appear.
function runEmitEnergyOnce(){
  const layer=viewerA.currentLayer;
  if(!layer) return;
  const ed=getJumpElectron();
  if(!ed){
    showSequenceBox('seq-box1', 'L\'elettrone cambia orbitale solo se riceve energia.<br>Ma i fotoni possono trasportare quantità di <b>ENERGIA</b> diverse.', seqColor1);
    document.getElementById('seq-box1-ok').style.visibility='visible';
    return;
  }
  const r2s=bohrKeyRadius('2s'), r2pRaw=bohrKeyRadius('2p|x'), r2p=r2pRaw+Math.max(0.1, r2pRaw*0.07);
  const groundPos=new THREE.Vector3(r2s,0,0);
  const excitedPos=new THREE.Vector3(r2p,0,0);
  ed.type='bohr';
  ed.theta=0; ed.r=r2s;

  const jumpArrow=showDirectionArrowLine(layer.group, groundPos, excitedPos, 0xffe27a);
  animateElectronRadius(ed, r2s, r2p, 1400, ()=>{
    jumpArrow.remove(800);
    ed.pulsing=true;
    setTimeout(()=>{
      ed.pulsing=false; ed.mesh.scale.setScalar(1);
      const fallArrow=showDirectionArrowLine(layer.group, excitedPos, groundPos, 0xffe27a);
      animateElectronRadius(ed, r2p, r2s, 1400, ()=>{
        fallArrow.remove(800);
        showOutwardRayFrom(groundPos, 0.05, new THREE.Vector3(1,0.3,0).normalize());
        setTimeout(()=>{
          showSequenceBox('seq-box1', 'L\'elettrone cambia orbitale solo se riceve energia.<br>Ma i fotoni possono trasportare quantità di <b>ENERGIA</b> diverse.', seqColor1);
          document.getElementById('seq-box1-ok').style.visibility='visible';
        }, 800);
      });
    }, 1200);
  });
}
